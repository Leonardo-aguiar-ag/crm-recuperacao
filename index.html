<script>

/* ===================================================== */
/* FIREBASE */
/* ===================================================== */

const firebaseConfig = {

apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
authDomain: "crm-recuperacao.firebaseapp.com",
projectId: "crm-recuperacao",
storageBucket: "crm-recuperacao.firebasestorage.app",
messagingSenderId: "347011763386",
appId: "1:347011763386:web:62073679ac76ef08e1c683",
measurementId: "G-XXZFJXHEF6"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

let clients = [];

let statuses = [
'Em negociação',
'Fechou o plano',
'Não tem interesse'
];

/* ===================================================== */
/* LOGIN */
/* ===================================================== */

auth.onAuthStateChanged(user=>{

if(user){

currentUser=user;

document.getElementById('loginScreen').style.display='none';

loadClients();

}

});

function login(){

auth.signInWithEmailAndPassword(

document.getElementById('loginEmail').value,
document.getElementById('loginPassword').value

).catch(err=>{

document.getElementById('loginError').innerText =
err.message;

});

}

function register(){

auth.createUserWithEmailAndPassword(

document.getElementById('loginEmail').value,
document.getElementById('loginPassword').value

);

}

function googleLogin(){

const provider =
new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

}

function logout(){

auth.signOut();

location.reload();

}

function recoverPassword(){

auth.sendPasswordResetEmail(

document.getElementById('loginEmail').value

).then(()=>{

alert('Email enviado');

});

}

function togglePassword(){

const input =
document.getElementById('loginPassword');

input.type =
input.type === 'password'
? 'text'
: 'password';

}

/* ===================================================== */
/* DARK MODE */
/* ===================================================== */

function toggleTheme(){

document.body.classList.toggle('dark-mode');

const isDark =
document.body.classList.contains('dark-mode');

localStorage.setItem(
'crm-theme',
isDark ? 'dark' : 'light'
);

}

if(localStorage.getItem('crm-theme') === 'dark'){

document.body.classList.add('dark-mode');

}

/* ===================================================== */
/* CLIENTES */
/* ===================================================== */

function saveClient(){

const id =
document.getElementById('clientId').value
|| db.collection('clients').doc().id;

const client={

userId:currentUser.uid,

nome:document.getElementById('cNome').value,
empresa:document.getElementById('cEmpresa').value,
telefones:document.getElementById('cTelefones').value,
status:document.getElementById('cStatus').value,
retorno:document.getElementById('cRetorno').value,
cpf:document.getElementById('cCPF').value

};

db.collection('clients').doc(id).set(client);

alert('Cliente salvo');

}

function loadClients(){

db.collection('clients')
.where('userId','==',currentUser.uid)
.onSnapshot(snapshot=>{

clients=[];

snapshot.forEach(doc=>{

clients.push({

id:doc.id,
...doc.data()

});

});

renderTable();
renderAgenda();
updateDashboard();

});

}

/* ===================================================== */
/* TABELA */
/* ===================================================== */

function renderTable(){

const tbody =
document.getElementById('tableBody');

tbody.innerHTML='';

const search =
document.getElementById('search').value.toLowerCase();

const statusFilter =
document.getElementById('filterStatus').value;

clients
.filter(c=>{

const matchSearch =
(c.nome || '')
.toLowerCase()
.includes(search);

const matchStatus =
statusFilter === 'ALL'
|| c.status === statusFilter;

return matchSearch && matchStatus;

})
.forEach(c=>{

tbody.innerHTML += `

<tr>

<td>

<div class="fw-bold">
${c.nome || '-'}
</div>

<div class="small text-muted">
${c.cpf || ''}
</div>

</td>

<td>${c.empresa || '-'}</td>

<td>${c.telefones || '-'}</td>

<td>

<span class="badge bg-primary">

${c.status || '-'}

</span>

</td>

<td>${c.retorno || '-'}</td>

<td>

<div class="d-flex gap-2">

<button
class="btn btn-warning btn-sm">

<i class="bi bi-pencil"></i>

</button>

<a
target="_blank"
href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}"

class="btn btn-success btn-sm">

<i class="bi bi-whatsapp"></i>

</a>

</div>

</td>

</tr>

`;

});

}

/* ===================================================== */
/* AGENDA */
/* ===================================================== */

function renderAgenda(){

const tbody =
document.getElementById('agendaBody');

tbody.innerHTML='';

clients.forEach(c=>{

tbody.innerHTML += `

<tr>

<td>${c.nome}</td>
<td>${c.telefones}</td>
<td>${c.retorno}</td>
<td>${c.status}</td>

<td>

<a
target="_blank"
href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}"

class="btn btn-success btn-sm">

WhatsApp

</a>

</td>

</tr>

`;

});

}

/* ===================================================== */
/* DASHBOARD */
/* ===================================================== */

function updateDashboard(){

document.getElementById('dashTotal').innerText =
clients.length;

}

/* ===================================================== */
/* STATUS */
/* ===================================================== */

function addStatus(){

const novo =
prompt('Novo status');

if(!novo) return;

statuses.push(novo);

renderStatuses();

}

function renderStatuses(){

const list =
document.getElementById('statusList');

const select =
document.getElementById('cStatus');

const filter =
document.getElementById('filterStatus');

list.innerHTML='';
select.innerHTML='';
filter.innerHTML='<option value="ALL">Todos status</option>';

statuses.forEach((status,index)=>{

select.innerHTML += `
<option>${status}</option>
`;

filter.innerHTML += `
<option>${status}</option>
`;

list.innerHTML += `

<div class="status-item">

<div class="d-flex justify-content-between align-items-center">

<strong>${status}</strong>

<button
class="btn btn-danger btn-sm"
onclick="deleteStatus(${index})">

Excluir

</button>

</div>

</div>

`;

});

}

function deleteStatus(index){

statuses.splice(index,1);

renderStatuses();

}

/* ===================================================== */
/* BACKUP - EXPORTAR */
/* ===================================================== */

function exportBackup(){

const blob =
new Blob(
[JSON.stringify(clients)],
{type:'application/json'}
);

const a =
document.createElement('a');

a.href=
URL.createObjectURL(blob);

a.download='backup-crm.json';

a.click();

}

/* ===================================================== */
/* IMPORTAR BACKUP (CORRIGIDO - ACEITA VÁRIOS FORMATOS) */
/* ===================================================== */

function importBackup() {
  document.getElementById('backupFileInput').click();
}

function handleBackupFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      let clientsArray;

      // 1. Se já for um array
      if (Array.isArray(data)) {
        clientsArray = data;
      }
      // 2. Se for objeto, procura por chaves comuns que contenham array
      else if (data && typeof data === 'object') {
        const possibleKeys = ['clientes', 'clients', 'data', 'registros', 'backup', 'items'];
        for (const key of possibleKeys) {
          if (Array.isArray(data[key])) {
            clientsArray = data[key];
            break;
          }
        }
        // 3. Último recurso: pega o primeiro array que aparecer nos valores
        if (!clientsArray) {
          clientsArray = Object.values(data).find(val => Array.isArray(val));
        }
      }

      if (!clientsArray || !Array.isArray(clientsArray)) {
        throw new Error('Não foi possível encontrar um array de clientes no arquivo. Verifique o formato.');
      }

      if (!confirm(`Importar ${clientsArray.length} clientes? Isso pode sobrescrever dados existentes.`)) {
        // Limpa o input para permitir selecionar novamente
        event.target.value = '';
        return;
      }

      importClients(clientsArray);
    } catch (err) {
      alert('Erro ao ler arquivo: ' + err.message);
    } finally {
      // Limpa o campo de arquivo para permitir reimportar o mesmo arquivo se necessário
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

async function importClients(clientsArray) {
  const batch = db.batch();
  for (const client of clientsArray) {
    const { id, ...clientData } = client;
    // Garante que o cliente importado pertença ao usuário atual
    clientData.userId = currentUser.uid;
    const docRef = id ? db.collection('clients').doc(id) : db.collection('clients').doc();
    batch.set(docRef, clientData, { merge: true });
  }
  try {
    await batch.commit();
    alert('Importação concluída!');
  } catch (err) {
    alert('Erro ao importar: ' + err.message);
  }
}

return match ? match[1].trim() : '';

};
