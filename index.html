<!-- CRM RECUPERAÇÃO COMPLETO FINAL - REDESENHO CSS + DASHBOARD ANALÍTICO -->
<!-- ===================================================== -->

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Recuperação - Analítico</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CHART -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    /* ===================================================== */
    /* TEMA MODERNO COM DESIGN SYSTEM */
    /* ===================================================== */
    :root {
      --bg: #f8fafb;
      --bg-secondary: #f0f4f8;
      --card: #ffffff;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --text: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-light: #dbeafe;
      --primary-dark: #1e40af;
      --success: #10b981;
      --success-light: #d1fae5;
      --warning: #f59e0b;
      --warning-light: #fef3c7;
      --danger: #ef4444;
      --danger-light: #fee2e2;
      --input: #ffffff;
      --table-head: #f9fafb;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    body.dark-mode {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --card: #1e293b;
      --border: #334155;
      --border-light: #475569;
      --text: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --input: #0f172a;
      --table-head: #0f172a;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.2);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===================================================== */
    /* NAVBAR */
    /* ===================================================== */
    .navbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar h4 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .navbar .btn {
      border-radius: var(--radius-md);
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      transition: all 0.2s ease;
      border: none;
    }

    .navbar .btn-outline-primary {
      color: var(--primary);
      border: 1.5px solid var(--primary);
      background: transparent;
    }

    .navbar .btn-outline-primary:hover {
      background: var(--primary-light);
      color: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    /* ===================================================== */
    /* CARDS */
    /* ===================================================== */
    .card-custom {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      height: 100%;
    }

    .card-custom:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary-light);
    }

    body.dark-mode .card-custom {
      box-shadow: var(--shadow-sm);
    }

    /* ===================================================== */
    /* DASHBOARD CARDS */
    /* ===================================================== */
    .dashboard-card {
      padding: 2rem;
      border-radius: var(--radius-lg);
      color: white;
      box-shadow: var(--shadow-md);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      height: 100%;
    }

    .dashboard-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
      animation: pulse 15s ease-in-out infinite;
    }

    .dashboard-card h6 {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }

    .dashboard-card h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-top: 0.5rem;
      position: relative;
      z-index: 1;
    }

    .dashboard-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .dashboard-card.bg-success {
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
    }

    .dashboard-card.bg-warning {
      background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
    }

    .dashboard-card.bg-danger {
      background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* ===================================================== */
    /* FORM CONTROLS */
    /* ===================================================== */
    .form-control,
    .form-select {
      background: var(--input);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .form-control:focus,
    .form-select:focus {
      background: var(--input);
      color: var(--text);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
      outline: none;
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      display: block;
    }

    /* ===================================================== */
    /* BUTTONS */
    /* ===================================================== */
    .btn {
      border-radius: var(--radius-md);
      padding: 0.625rem 1.25rem;
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      transition: all 0.2s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
      color: white;
    }

    .btn-warning {
      background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
      color: white;
    }

    .btn-outline-primary {
      color: var(--primary);
      border: 1.5px solid var(--primary);
      background: transparent;
    }

    .btn-outline-primary:hover {
      background: var(--primary-light);
      color: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .btn-sm {
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
    }

    /* ===================================================== */
    /* TABS */
    /* ===================================================== */
    .nav-tabs {
      border: none;
      gap: 0.75rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
    }

    .nav-tabs .nav-link {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .nav-tabs .nav-link.active {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
    }

    /* ===================================================== */
    /* TABELAS */
    /* ===================================================== */
    .table {
      color: var(--text);
      margin: 0;
      border-collapse: collapse;
    }

    .table thead th {
      padding: 1rem;
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: none;
      color: var(--text-secondary);
      background: var(--table-head);
    }

    .table tbody td {
      padding: 1rem;
      vertical-align: middle;
      border-color: var(--border);
    }

    .table tbody tr:hover {
      background: var(--bg-secondary);
    }

    .table-responsive {
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    /* ===================================================== */
    /* LOGIN */
    /* ===================================================== */
    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      z-index: 9999;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 3rem;
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
    }

    .login-box h3 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    /* ===================================================== */
    /* CHART CONTAINERS */
    /* ===================================================== */
    .chart-container {
      position: relative;
      height: 300px;
      width: 100%;
    }

    /* ===================================================== */
    /* CONTAINER & LAYOUT */
    /* ===================================================== */
    .container-fluid {
      padding: 2rem;
    }

    .status-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #preview {
      max-width: 100%;
      height: auto;
      margin-top: 1rem;
      border-radius: var(--radius-lg);
      display: none;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .container-fluid { padding: 1rem; }
      .navbar { padding: 1rem; }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h3>CRM Recuperação</h3>
      <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Seu email">
      <div class="input-group mb-3">
        <input type="password" id="loginPassword" class="form-control" placeholder="Senha">
        <button class="btn btn-outline-secondary" onclick="togglePassword()">
          <i class="bi bi-eye"></i>
        </button>
      </div>
      <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>
      <button class="btn btn-danger w-100 mb-2" onclick="googleLogin()">
        <i class="bi bi-google"></i> Entrar com Google
      </button>
      <button class="btn btn-outline-primary w-100 mb-2" onclick="register()">Criar Conta</button>
      <button class="btn btn-link w-100" onclick="recoverPassword()">Esqueci minha senha</button>
      <div id="loginError" class="text-danger text-center mt-3"></div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <h4 class="m-0 fw-bold">CRM Recuperação</h4>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary" onclick="toggleTheme()" id="themeBtn">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button class="btn btn-success" onclick="exportBackup()">Backup</button>
        <button class="btn btn-danger" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <!-- CONTAINER -->
  <div class="container-fluid">
    <!-- ABAS -->
    <ul class="nav nav-tabs">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboardTab">Dashboard</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientesTab">Ficha Cliente</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisaTab">Pesquisar</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#agendaTab">Agenda</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#configTab">Configurações</button></li>
    </ul>

    <div class="tab-content">
      <!-- DASHBOARD -->
      <div class="tab-pane fade show active" id="dashboardTab">
        <div class="row g-4 mb-4">
          <div class="col-md-3"><div class="dashboard-card bg-primary"><h6>Total Clientes</h6><h2 id="dashTotal">0</h2></div></div>
          <div class="col-md-3"><div class="dashboard-card bg-success"><h6>Fechados</h6><h2 id="dashFechados">0</h2></div></div>
          <div class="col-md-3"><div class="dashboard-card bg-warning"><h6>Negociação</h6><h2 id="dashNegociacao">0</h2></div></div>
          <div class="col-md-3"><div class="dashboard-card bg-danger"><h6>Sem Interesse</h6><h2 id="dashSemInteresse">0</h2></div></div>
        </div>
        
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card card-custom p-4">
              <h5 class="mb-4">Distribuição por Status</h5>
              <div class="chart-container">
                <canvas id="statusChart"></canvas>
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card card-custom p-4">
              <h5 class="mb-4">Top 5 Empresas</h5>
              <div class="chart-container">
                <canvas id="companyChart"></canvas>
              </div>
            </div>
          </div>
          <div class="col-12">
            <div class="card card-custom p-4">
              <h5 class="mb-4">Evolução de Clientes (Últimos 7 dias)</h5>
              <div class="chart-container">
                <canvas id="timeChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- CLIENTES -->
      <div class="tab-pane fade" id="clientesTab">
        <div class="card card-custom p-4 mb-4">
          <h5 class="mb-3">Campo Mágico</h5>
          <textarea id="smartPaste" class="form-control mb-3" rows="5" placeholder="Cole aqui os dados do PDF"></textarea>
          <button class="btn btn-primary" onclick="autoFill()">Auto preencher</button>
        </div>
        <div class="card card-custom p-4">
          <input type="hidden" id="clientId">
          <div class="row g-3">
            <div class="col-md-4"><label>Nome do usuário</label><input type="text" id="cNome" class="form-control"></div>
            <div class="col-md-4"><label>Nome social</label><input type="text" id="cNomeSocial" class="form-control"></div>
            <div class="col-md-4"><label>CPF do titular</label><input type="text" id="cCPF" class="form-control"></div>
            <div class="col-md-4"><label>Data nascimento</label><input type="text" id="cNascimento" class="form-control"></div>
            <div class="col-md-8"><label>Endereço</label><input type="text" id="cEndereco" class="form-control"></div>
            <div class="col-md-5"><label>Cidade</label><input type="text" id="cCidade" class="form-control"></div>
            <div class="col-md-1"><label>UF</label><input type="text" id="cUF" class="form-control"></div>
            <div class="col-md-6"><label>Empresa</label><input type="text" id="cEmpresa" class="form-control"></div>
            <div class="col-md-6"><label>Ade emp</label><input type="text" id="cAdeEmp" class="form-control"></div>
            <div class="col-md-6"><label>Rede/plano</label><input type="text" id="cRedePlano" class="form-control"></div>
            <div class="col-md-6"><label>Plano atual</label><input type="text" id="cPlanoAtual" class="form-control"></div>
            <div class="col-md-4"><label>Acomodação</label><input type="text" id="cAcomodacao" class="form-control"></div>
            <div class="col-md-4"><label>Situação</label><input type="text" id="cSituacao" class="form-control"></div>
            <div class="col-md-4"><label>Status CRM</label><select id="cStatus" class="form-select"></select></div>
            <div class="col-md-4"><label>Data adesão</label><input type="text" id="cAdesao" class="form-control"></div>
            <div class="col-md-4"><label>Cancelamento</label><input type="text" id="cCancelamento" class="form-control"></div>
            <div class="col-md-4"><label>Tempo</label><input type="text" id="cTempo" class="form-control"></div>
            <div class="col-md-6"><label>Telefones</label><input type="text" id="cTelefones" class="form-control"></div>
            <div class="col-md-6"><label>Emails</label><input type="text" id="cEmails" class="form-control"></div>
            <div class="col-md-6"><label>Agenda retorno</label><input type="date" id="cRetorno" class="form-control"></div>
            <div class="col-md-6">
              <label>Foto</label>
              <input type="file" class="form-control" onchange="previewImage(event)">
              <input type="hidden" id="fotoBase64">
              <img id="preview">
            </div>
          </div>
          <button class="btn btn-success mt-4" onclick="saveClient()">Salvar Cliente</button>
        </div>
      </div>

      <!-- PESQUISA -->
      <div class="tab-pane fade" id="pesquisaTab">
        <div class="card card-custom p-4">
          <div class="row g-3 mb-4">
            <div class="col-lg-6"><input type="text" id="search" class="form-control" placeholder="Pesquisar cliente..." onkeyup="renderTable()"></div>
            <div class="col-lg-3"><select id="filterStatus" class="form-select" onchange="renderTable()"><option value="ALL">Todos status</option></select></div>
          </div>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead><tr><th>Cliente</th><th>Empresa</th><th>Telefone</th><th>Status</th><th>Retorno</th><th>Ações</th></tr></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- AGENDA -->
      <div class="tab-pane fade" id="agendaTab">
        <div class="card card-custom p-4">
          <div class="table-responsive">
            <table class="table">
              <thead><tr><th>Cliente</th><th>Telefone</th><th>Retorno</th><th>Status</th><th>WhatsApp</th></tr></thead>
              <tbody id="agendaBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- CONFIG -->
      <div class="tab-pane fade" id="configTab">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card card-custom p-4">
              <div class="d-flex justify-content-between mb-4">
                <h4>Etiquetas CRM</h4>
                <button class="btn btn-success" onclick="addStatus()">Adicionar</button>
              </div>
              <div id="statusList"></div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card card-custom p-4">
              <h4 class="mb-4">Backup</h4>
              <div class="d-grid gap-3">
                <button class="btn btn-primary" onclick="exportBackup()">Exportar Backup</button>
                <button class="btn btn-outline-primary" onclick="importBackup()">Importar Backup</button>
              </div>
              <input type="file" id="backupFileInput" accept=".json" style="display:none" onchange="handleBackupFile(event)">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ===================================================== */
    /* FIREBASE - CONFIGURAÇÃO CORRIGIDA */
    /* ===================================================== */
    const firebaseConfig = {
      apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
      authDomain: "crm-recuperacao.firebaseapp.com",
      projectId: "crm-recuperacao",
      storageBucket: "crm-recuperacao.firebasestorage.app",
      messagingSenderId: "347011763386",
      appId: "1:347011763386:web:158c1ca6f512a1cde1c683",
      measurementId: "G-1XHHFXHN4G"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let clients = [];
    let statuses = ['Em negociação', 'Fechou o plano', 'Não tem interesse'];
    
    // Gráficos globais
    let charts = {
      status: null,
      company: null,
      time: null
    };

    /* LOGIN */
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        loadClients();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
      }
    });

    function login() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      auth.signInWithEmailAndPassword(email, password).catch(err => {
        document.getElementById('loginError').innerText = err.message;
      });
    }

    function googleLogin() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err => {
        document.getElementById('loginError').innerText = err.message;
      });
    }

    function register() {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      auth.createUserWithEmailAndPassword(email, password).catch(err => {
        document.getElementById('loginError').innerText = err.message;
      });
    }

    function recoverPassword() {
      const email = document.getElementById('loginEmail').value;
      if (!email) {
        alert('Digite seu email');
        return;
      }
      auth.sendPasswordResetEmail(email).then(() => {
        alert('Email de recuperação enviado!');
      }).catch(err => {
        document.getElementById('loginError').innerText = err.message;
      });
    }

    function togglePassword() {
      const input = document.getElementById('loginPassword');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function logout() {
      auth.signOut();
    }

    /* TEMA */
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
      updateThemeButton();
      updateChartsTheme();
    }

    function updateThemeButton() {
      const btn = document.getElementById('themeBtn');
      if (document.body.classList.contains('dark-mode')) {
        btn.innerHTML = '<i class="bi bi-sun-fill"></i>';
      } else {
        btn.innerHTML = '<i class="bi bi-moon-stars-fill"></i>';
      }
    }

    function updateChartsTheme() {
      const isDark = document.body.classList.contains('dark-mode');
      const textColor = isDark ? '#cbd5e1' : '#6b7280';
      const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

      Object.values(charts).forEach(chart => {
        if (chart) {
          if (chart.options.scales) {
            if (chart.options.scales.x) {
              chart.options.scales.x.ticks.color = textColor;
              chart.options.scales.x.grid.color = gridColor;
            }
            if (chart.options.scales.y) {
              chart.options.scales.y.ticks.color = textColor;
              chart.options.scales.y.grid.color = gridColor;
            }
          }
          if (chart.options.plugins.legend) {
            chart.options.plugins.legend.labels.color = textColor;
          }
          chart.update();
        }
      });
    }

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
      updateThemeButton();
    }

    /* CLIENTES */
    async function loadClients() {
      const snapshot = await db.collection('clients').where('userId', '==', currentUser.uid).get();
      clients = snapshot.docs.map(doc => {
        const data = doc.data();
        // Garantir que temos uma data de criação para o gráfico de tempo
        if (!data.createdAt) {
          data.createdAt = new Date().toISOString();
        }
        return { id: doc.id, ...data };
      });
      renderTable();
      renderAgenda();
      updateDashboard();
      renderStatuses();
    }

    async function saveClient() {
      const clientData = {
        nome: document.getElementById('cNome').value,
        nomeSocial: document.getElementById('cNomeSocial').value,
        cpf: document.getElementById('cCPF').value,
        nascimento: document.getElementById('cNascimento').value,
        endereco: document.getElementById('cEndereco').value,
        cidade: document.getElementById('cCidade').value,
        uf: document.getElementById('cUF').value,
        empresa: document.getElementById('cEmpresa').value,
        adeEmp: document.getElementById('cAdeEmp').value,
        redePlano: document.getElementById('cRedePlano').value,
        planoAtual: document.getElementById('cPlanoAtual').value,
        acomodacao: document.getElementById('cAcomodacao').value,
        situacao: document.getElementById('cSituacao').value,
        status: document.getElementById('cStatus').value,
        adesao: document.getElementById('cAdesao').value,
        cancelamento: document.getElementById('cCancelamento').value,
        tempo: document.getElementById('cTempo').value,
        telefones: document.getElementById('cTelefones').value,
        emails: document.getElementById('cEmails').value,
        retorno: document.getElementById('cRetorno').value,
        userId: currentUser.uid,
        updatedAt: new Date().toISOString()
      };

      const clientId = document.getElementById('clientId').value;
      try {
        if (clientId) {
          await db.collection('clients').doc(clientId).update(clientData);
        } else {
          clientData.createdAt = new Date().toISOString();
          await db.collection('clients').add(clientData);
        }
        alert('Cliente salvo com sucesso!');
        document.getElementById('clientId').value = '';
        document.querySelector('[data-bs-target="#pesquisaTab"]').click();
        loadClients();
      } catch (err) {
        alert('Erro ao salvar: ' + err.message);
      }
    }

    function editClient(id) {
      const client = clients.find(c => c.id === id);
      if (!client) return;
      document.getElementById('clientId').value = id;
      document.getElementById('cNome').value = client.nome || '';
      document.getElementById('cNomeSocial').value = client.nomeSocial || '';
      document.getElementById('cCPF').value = client.cpf || '';
      document.getElementById('cNascimento').value = client.nascimento || '';
      document.getElementById('cEndereco').value = client.endereco || '';
      document.getElementById('cCidade').value = client.cidade || '';
      document.getElementById('cUF').value = client.uf || '';
      document.getElementById('cEmpresa').value = client.empresa || '';
      document.getElementById('cAdeEmp').value = client.adeEmp || '';
      document.getElementById('cRedePlano').value = client.redePlano || '';
      document.getElementById('cPlanoAtual').value = client.planoAtual || '';
      document.getElementById('cAcomodacao').value = client.acomodacao || '';
      document.getElementById('cSituacao').value = client.situacao || '';
      document.getElementById('cStatus').value = client.status || '';
      document.getElementById('cAdesao').value = client.adesao || '';
      document.getElementById('cCancelamento').value = client.cancelamento || '';
      document.getElementById('cTempo').value = client.tempo || '';
      document.getElementById('cTelefones').value = client.telefones || '';
      document.getElementById('cEmails').value = client.emails || '';
      document.getElementById('cRetorno').value = client.retorno || '';
      document.querySelector('[data-bs-target="#clientesTab"]').click();
    }

    async function deleteClient(id) {
      if (!confirm('Tem certeza?')) return;
      try {
        await db.collection('clients').doc(id).delete();
        loadClients();
      } catch (err) {
        alert('Erro ao deletar: ' + err.message);
      }
    }

    /* TABELA */
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const search = document.getElementById('search').value.toLowerCase();
      const filterStatus = document.getElementById('filterStatus').value;
      tbody.innerHTML = '';
      clients.filter(c => {
        const matchSearch = (c.nome || '').toLowerCase().includes(search) || (c.empresa || '').toLowerCase().includes(search);
        const matchStatus = filterStatus === 'ALL' || c.status === filterStatus;
        return matchSearch && matchStatus;
      }).forEach(c => {
        tbody.innerHTML += `
          <tr>
            <td><strong>${c.nome}</strong></td>
            <td>${c.empresa}</td>
            <td>${c.telefones}</td>
            <td><span class="badge bg-primary">${c.status}</span></td>
            <td>${c.retorno}</td>
            <td>
              <div class="d-flex gap-2">
                <button class="btn btn-warning btn-sm" onclick="editClient('${c.id}')"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')"><i class="bi bi-trash"></i></button>
                <a target="_blank" href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}" class="btn btn-success btn-sm"><i class="bi bi-whatsapp"></i></a>
              </div>
            </td>
          </tr>`;
      });
    }

    /* AGENDA */
    function renderAgenda() {
      const tbody = document.getElementById('agendaBody');
      tbody.innerHTML = '';
      clients.forEach(c => {
        tbody.innerHTML += `
          <tr>
            <td>${c.nome}</td>
            <td>${c.telefones}</td>
            <td>${c.retorno}</td>
            <td>${c.status}</td>
            <td><a target="_blank" href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}" class="btn btn-success btn-sm">WhatsApp</a></td>
          </tr>`;
      });
    }

    /* DASHBOARD */
    function updateDashboard() {
      // Atualizar Cards
      const total = clients.length;
      const fechados = clients.filter(c => c.status === 'Fechou o plano').length;
      const negociacao = clients.filter(c => c.status === 'Em negociação').length;
      const semInteresse = clients.filter(c => c.status === 'Não tem interesse').length;

      document.getElementById('dashTotal').innerText = total;
      document.getElementById('dashFechados').innerText = fechados;
      document.getElementById('dashNegociacao').innerText = negociacao;
      document.getElementById('dashSemInteresse').innerText = semInteresse;

      renderCharts();
    }

    function renderCharts() {
      const isDark = document.body.classList.contains('dark-mode');
      const textColor = isDark ? '#cbd5e1' : '#6b7280';
      
      // 1. Gráfico de Status (Doughnut)
      const statusCounts = {};
      statuses.forEach(s => statusCounts[s] = 0);
      clients.forEach(c => {
        if (statusCounts[c.status] !== undefined) statusCounts[c.status]++;
      });

      if (charts.status) charts.status.destroy();
      charts.status = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(statusCounts),
          datasets: [{
            data: Object.values(statusCounts),
            backgroundColor: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { color: textColor, padding: 20 } }
          },
          cutout: '70%'
        }
      });

      // 2. Top 5 Empresas (Bar)
      const companyCounts = {};
      clients.forEach(c => {
        if (c.empresa) companyCounts[c.empresa] = (companyCounts[c.empresa] || 0) + 1;
      });
      const topCompanies = Object.entries(companyCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      if (charts.company) charts.company.destroy();
      charts.company = new Chart(document.getElementById('companyChart'), {
        type: 'bar',
        data: {
          labels: topCompanies.map(t => t[0]),
          datasets: [{
            label: 'Clientes',
            data: topCompanies.map(t => t[1]),
            backgroundColor: '#3b82f6',
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { color: textColor, stepSize: 1 }, grid: { display: false } },
            x: { ticks: { color: textColor }, grid: { display: false } }
          }
        }
      });

      // 3. Evolução de Clientes (Line)
      const last7Days = [...Array(7)].map((_, i) => {
        const d = new Date();
        d.setDate(d.getDate() - i);
        return d.toISOString().split('T')[0];
      }).reverse();

      const timeData = last7Days.map(date => {
        return clients.filter(c => (c.createdAt || '').split('T')[0] === date).length;
      });

      if (charts.time) charts.time.destroy();
      charts.time = new Chart(document.getElementById('timeChart'), {
        type: 'line',
        data: {
          labels: last7Days.map(d => d.split('-').reverse().slice(0,2).join('/')),
          datasets: [{
            label: 'Novos Clientes',
            data: timeData,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#3b82f6'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { color: textColor, stepSize: 1 }, grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } },
            x: { ticks: { color: textColor }, grid: { display: false } }
          }
        }
      });
    }

    /* STATUS */
    function addStatus() {
      const novo = prompt('Novo status');
      if (!novo) return;
      statuses.push(novo);
      renderStatuses();
    }

    function renderStatuses() {
      const list = document.getElementById('statusList');
      const select = document.getElementById('cStatus');
      const filter = document.getElementById('filterStatus');
      list.innerHTML = '';
      select.innerHTML = '';
      filter.innerHTML = '<option value="ALL">Todos status</option>';
      statuses.forEach((status, index) => {
        select.innerHTML += `<option>${status}</option>`;
        filter.innerHTML += `<option>${status}</option>`;
        list.innerHTML += `
          <div class="status-item">
            <strong>${status}</strong>
            <button class="btn btn-danger btn-sm" onclick="deleteStatus(${index})">Excluir</button>
          </div>`;
      });
    }

    function deleteStatus(index) {
      statuses.splice(index, 1);
      renderStatuses();
    }

    /* BACKUP - EXPORTAR */
    function exportBackup() {
      const blob = new Blob([JSON.stringify(clients)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'backup-crm.json';
      a.click();
    }

    /* IMPORTAR BACKUP */
    function importBackup() {
      document.getElementById('backupFileInput').click();
    }

    function handleBackupFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          let clientsArray;
          if (Array.isArray(data)) {
            clientsArray = data;
          } else if (data && typeof data === 'object') {
            const possibleKeys = ['clientes', 'clients', 'data', 'registros', 'backup', 'items'];
            for (const key of possibleKeys) {
              if (Array.isArray(data[key])) { clientsArray = data[key]; break; }
            }
            if (!clientsArray) clientsArray = Object.values(data).find(val => Array.isArray(val));
          }
          if (!clientsArray || !Array.isArray(clientsArray)) {
            throw new Error('Não foi possível encontrar um array de clientes no arquivo.');
          }
          if (!confirm(`Importar ${clientsArray.length} clientes? Isso pode sobrescrever dados existentes.`)) {
            event.target.value = '';
            return;
          }
          importClients(clientsArray);
        } catch (err) {
          alert('Erro ao ler arquivo: ' + err.message);
        } finally {
          event.target.value = '';
        }
      };
      reader.readAsText(file);
    }

    async function importClients(clientsArray) {
      const batch = db.batch();
      for (const client of clientsArray) {
        const { id, ...clientData } = client;
        clientData.userId = currentUser.uid;
        const docRef = id ? db.collection('clients').doc(id) : db.collection('clients').doc();
        batch.set(docRef, clientData, { merge: true });
      }
      try {
        await batch.commit();
        alert('Importação concluída!');
        loadClients();
      } catch (err) {
        alert('Erro ao importar: ' + err.message);
      }
    }

    /* FOTO */
    function previewImage(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('preview').src = e.target.result;
        document.getElementById('preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    /* CAMPO MÁGICO - ROBUSTO */
    function autoFill() {
      const text = document.getElementById('smartPaste').value;
      const fieldMap = [
        { regex: /^Nome\s+do\s+usuário\s*:\s*(.*)$/im, field: 'cNome' },
        { regex: /^Nome\s+social\s*:\s*(.*)$/im, field: 'cNomeSocial' },
        { regex: /^CPF\s+do\s+titular\s*:\s*(.*)$/im, field: 'cCPF' },
        { regex: /^CPF\s*:\s*(.*)$/im, field: 'cCPF' },
        { regex: /^Data\s+de\s+nascimento\s*:\s*(.*)$/im, field: 'cNascimento' },
        { regex: /^Endereço\s*:\s*(.*)$/im, field: 'cEndereco' },
        { regex: /^Empresa\s*:\s*(.*)$/im, field: 'cEmpresa' },
        { regex: /^Ade\s+emp\s*:\s*(.*)$/im, field: 'cAdeEmp' },
        { regex: /^Rede\/plano\s*:\s*(.*)$/im, field: 'cRedePlano' },
        { regex: /^Plano\s+atual\s*:\s*(.*)$/im, field: 'cPlanoAtual' },
        { regex: /^Acomodação\s*:\s*(.*)$/im, field: 'cAcomodacao' },
        { regex: /^Situação\s*:\s*(.*)$/im, field: 'cSituacao' },
        { regex: /^Data\s+da\s+adesão\s*:\s*(.*)$/im, field: 'cAdesao' },
        { regex: /^Data\s+do\s+cancelamento\s*:\s*(.*)$/im, field: 'cCancelamento' },
        { regex: /^Tempo\s*:\s*(.*)$/im, field: 'cTempo' },
        { regex: /^Telefones?\s+cadastrados?\s*:\s*(.*)$/im, field: 'cTelefones' },
        { regex: /^Endereços?\s+eletr[ôo]nicos?\s*:\s*(.*)$/im, field: 'cEmails' }
      ];

      const fields = ['cNome','cNomeSocial','cCPF','cNascimento','cEndereco','cCidade','cUF','cEmpresa','cAdeEmp','cRedePlano','cPlanoAtual','cAcomodacao','cSituacao','cAdesao','cCancelamento','cTempo','cTelefones','cEmails'];
      fields.forEach(f => document.getElementById(f).value = '');

      for (const map of fieldMap) {
        const match = text.match(map.regex);
        if (match && match[1]) document.getElementById(map.field).value = match[1].trim();
      }

      const cityMatch = text.match(/^Cidade\s*:\s*(.*)$/im);
      if (cityMatch) {
        const full = cityMatch[1].trim();
        const parts = full.split(/[|\-–]/);
        document.getElementById('cCidade').value = (parts[0] || '').trim();
        let uf = '';
        if (parts[1]) {
          const ufMatch = parts[1].match(/UF\s*:\s*(.*)/i);
          uf = ufMatch ? ufMatch[1].trim() : parts[1].trim();
        }
        document.getElementById('cUF').value = uf;
      }
    }

    /* INIT */
    renderStatuses();
  </script>
