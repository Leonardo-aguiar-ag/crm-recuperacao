<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Recuperação</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- CHART -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #f8fafb; --card: #ffffff; --border: #e5e7eb; --text: #111827;
      --text-secondary: #6b7280; --primary: #3b82f6; --primary-dark: #1e40af;
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --input: #ffffff;
      --table-head: #f9fafb; --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.1); --radius-md: 12px; --radius-lg: 16px;
    }
    body.dark-mode {
      --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9;
      --text-secondary: #cbd5e1; --input: #0f172a; --table-head: #0f172a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; transition: 0.3s; }
    .navbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
    .card-custom { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); transition: 0.3s; }
    .card-custom:hover { box-shadow: var(--shadow-md); }
    .dashboard-card { padding: 1.5rem; border-radius: var(--radius-lg); color: white; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .dashboard-card.bg-success { background: linear-gradient(135deg, var(--success), #059669); }
    .dashboard-card.bg-warning { background: linear-gradient(135deg, var(--warning), #d97706); }
    .dashboard-card.bg-info { background: linear-gradient(135deg, #06b6d4, #0891b2); }
    .form-control, .form-select { background: var(--input); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--radius-md); padding: 0.75rem 1rem; transition: 0.2s; }
    .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); outline: none; }
    label { font-size: 0.875rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; display: block; }
    .btn { border-radius: var(--radius-md); padding: 0.625rem 1.25rem; font-weight: 600; border: none; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
    .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }
    .btn-warning { background: linear-gradient(135deg, var(--warning), #d97706); color: white; }
    .btn-info { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
    .btn-outline-danger { border: 1.5px solid var(--danger); color: var(--danger); background: transparent; }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8125rem; }
    .nav-tabs { border: none; gap: 0.5rem; display: flex; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .nav-tabs .nav-link { background: var(--card); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.6rem 1.2rem; border-radius: var(--radius-md); font-weight: 600; font-size: 0.85rem; cursor: pointer; }
    .nav-tabs .nav-link.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .table { color: var(--text); border-collapse: collapse; width: 100%; }
    .table thead th { background: var(--table-head); padding: 0.75rem; font-weight: 700; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; }
    .table tbody td { padding: 0.75rem; border-color: var(--border); }
    .table tbody tr:hover { background: var(--bg); }
    .login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); z-index: 9999; }
    .login-box { width: 100%; max-width: 420px; padding: 3rem; background: var(--card); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
    #preview { max-width: 100%; margin-top: 1rem; border-radius: var(--radius-lg); display: none; }
    .container-fluid { padding: 1.5rem; }
    .status-item { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.75rem; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .mini-calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; font-size: 0.8rem; }
    .mini-calendar .day { padding: 0.5rem; border-radius: 6px; cursor: pointer; }
    .mini-calendar .day:hover { background: var(--primary); color: white; }
    .mini-calendar .day.today { background: var(--primary); color: white; font-weight: bold; }
    .mini-calendar .day.has-event { border: 2px solid var(--warning); }
    .badge { padding: 0.35em 0.65em; border-radius: 20px; font-size: 0.75em; }
    @media (max-width: 768px) { .container-fluid { padding: 1rem; } }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h3 class="text-center mb-4">CRM Recuperação</h3>
      <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Seu email">
      <div class="input-group mb-3">
        <input type="password" id="loginPassword" class="form-control" placeholder="Senha">
        <button class="btn btn-outline-secondary" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
      </div>
      <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>
      <button class="btn btn-danger w-100 mb-2" onclick="googleLogin()"><i class="bi bi-google"></i> Entrar com Google</button>
      <button class="btn btn-outline-primary w-100 mb-2" onclick="register()">Criar Conta</button>
      <button class="btn btn-link w-100" onclick="recoverPassword()">Esqueci minha senha</button>
      <div id="loginError" class="text-danger text-center mt-3"></div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <h4 class="m-0 fw-bold">CRM Recuperação</h4>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill"></i></button>
        <button class="btn btn-success" onclick="exportBackup()">Backup</button>
        <button class="btn btn-danger" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <!-- CONTAINER -->
  <div class="container-fluid">
    <ul class="nav nav-tabs" id="mainTabs">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboardTab">Dashboard</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientesTab">Ficha Cliente</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisaTab">Pesquisar</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#agendaTab">Agenda</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#configTab">Configurações</button></li>
    </ul>

    <div class="tab-content">
      <!-- DASHBOARD (mantido como estava) -->
      <div class="tab-pane fade show active" id="dashboardTab">
        <!-- ... exatamente igual ao último código fornecido ... -->
      </div>

      <!-- ==================== NOVA FICHA CLIENTE ==================== -->
      <div class="tab-pane fade" id="clientesTab">
        <div class="card card-custom p-4 mb-4">
          <h5 class="mb-3">Campo Mágico</h5>
          <textarea id="smartPaste" class="form-control mb-3" rows="3" placeholder="Cole aqui os dados da proposta"></textarea>
          <button class="btn btn-primary" onclick="autoFill()">Auto preencher</button>
        </div>
        <div class="card card-custom p-4">
          <input type="hidden" id="clientId">
          <ul class="nav nav-tabs mb-4" id="fichaTabs">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dadosPrincipais">Dados da Proposta</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#dependentesTab">Dependentes</button></li>
          </ul>
          <div class="tab-content">
            <!-- DADOS PRINCIPAIS -->
            <div class="tab-pane fade show active" id="dadosPrincipais">
              <div class="row g-3">
                <div class="col-md-3"><label>Data</label><input type="date" id="cData" class="form-control"></div>
                <div class="col-md-3"><label>Número da Proposta</label><input type="text" id="cNumeroProposta" class="form-control"></div>
                <div class="col-md-6"><label>Nome do Titular</label><input type="text" id="cNomeTitular" class="form-control"></div>
                <div class="col-md-3"><label>CPF do Titular</label><input type="text" id="cCpfTitular" class="form-control"></div>
                <div class="col-md-3"><label>CNPJ/CAEPF do Titular</label><input type="text" id="cCnpjTitular" class="form-control"></div>
                <div class="col-md-3"><label>Telefone do Titular</label><input type="text" id="cTelefoneTitular" class="form-control"></div>
                <div class="col-md-3"><label>Email do Titular</label><input type="email" id="cEmailTitular" class="form-control"></div>
                <div class="col-md-2"><label>Qtd. Vidas</label><input type="number" id="cQtdVidas" class="form-control" min="1" value="1"></div>
                <div class="col-md-4"><label>Modalidade do Plano</label><input type="text" id="cModalidadePlano" class="form-control"></div>
                <div class="col-md-3"><label>Coparticipação</label><input type="text" id="cCoparticipacao" class="form-control"></div>
                <div class="col-md-3"><label>Status</label><select id="cStatus" class="form-select"></select></div>
                <div class="col-md-3"><label>Data da Implantação</label><input type="date" id="cDataImplantacao" class="form-control"></div>
                <div class="col-md-3"><label>Data do Pagamento</label><input type="date" id="cDataPagamento" class="form-control"></div>
                <div class="col-md-3"><label>Fonte da Venda</label><input type="text" id="cFonteVenda" class="form-control"></div>
                <div class="col-md-3"><label>Valor s/ Desconto</label><input type="number" id="cValorSemDesconto" class="form-control" step="0.01"></div>
                <div class="col-md-3"><label>Valor c/ Desconto</label><input type="number" id="cValorComDesconto" class="form-control" step="0.01"></div>
                <div class="col-md-3"><label>Praça</label><select id="cPraca" class="form-select"></select></div>
                <div class="col-md-3"><label>Administradora</label><select id="cAdministradora" class="form-select"></select></div>
                <div class="col-md-2"><label>Código</label><input type="text" id="cCodigo" class="form-control"></div>
                <div class="col-md-2"><label>Acomodação</label><input type="text" id="cAcomodacao" class="form-control"></div>
                <div class="col-md-2"><label>Vigência</label><input type="text" id="cVigencia" class="form-control" placeholder="dd/mm/aaaa"></div>
                <div class="col-12"><label>Anotações</label><textarea id="cAnotacoes" class="form-control" rows="2"></textarea></div>
              </div>
            </div>
            <!-- DEPENDENTES -->
            <div class="tab-pane fade" id="dependentesTab">
              <div class="row g-3 mb-4">
                <div class="col-md-3"><input type="text" id="depNome" class="form-control" placeholder="Nome"></div>
                <div class="col-md-2"><input type="text" id="depCPF" class="form-control" placeholder="CPF"></div>
                <div class="col-md-3"><input type="text" id="depTelefone" class="form-control" placeholder="Telefone"></div>
                <div class="col-md-3"><input type="email" id="depEmail" class="form-control" placeholder="Email"></div>
                <div class="col-md-1"><button class="btn btn-primary w-100" onclick="addDependente()"><i class="bi bi-plus"></i></button></div>
              </div>
              <div class="table-responsive">
                <table class="table"><thead><tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>Email</th><th>Ação</th></tr></thead><tbody id="dependentesBody"></tbody></table>
              </div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-success" onclick="saveClient()">Salvar Proposta</button>
            <button class="btn btn-outline-danger" onclick="clearForm()">Limpar Campos</button>
          </div>
        </div>
      </div>

      <!-- PESQUISA (com busca por proposta) -->
      <div class="tab-pane fade" id="pesquisaTab">
        <div class="card card-custom p-4">
          <div class="row g-3 mb-4">
            <div class="col-lg-3"><input type="text" id="search" class="form-control" placeholder="Buscar por nome, proposta..." onkeyup="renderTable()"></div>
            <div class="col-lg-2"><select id="filterStatus" class="form-select" onchange="renderTable()"><option value="ALL">Status</option></select></div>
            <div class="col-lg-2"><select id="filterModalidade" class="form-select" onchange="renderTable()"><option value="ALL">Modalidade</option></select></div>
            <div class="col-lg-2"><select id="filterPraca" class="form-select" onchange="renderTable()"><option value="ALL">Praça</option></select></div>
            <div class="col-lg-2"><select id="filterAdministradora" class="form-select" onchange="renderTable()"><option value="ALL">Administradora</option></select></div>
          </div>
          <div class="table-responsive">
            <table class="table"><thead><tr><th>Proposta</th><th>Titular</th><th>CPF</th><th>Modalidade</th><th>Status</th><th>Valor</th><th>Praça</th><th>Admin.</th><th>Ações</th></tr></thead><tbody id="tableBody"></tbody></table>
          </div>
        </div>
      </div>

      <!-- AGENDA (inalterado) -->
      <div class="tab-pane fade" id="agendaTab">
        <!-- ... igual ao anterior ... -->
      </div>

      <!-- CONFIGURAÇÃO (com Praças e Administradoras) -->
      <div class="tab-pane fade" id="configTab">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card card-custom p-4">
              <h4>Etiquetas CRM</h4>
              <button class="btn btn-success mb-3" onclick="addStatus()">Adicionar</button>
              <div id="statusList"></div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card card-custom p-4">
              <h4>Praças</h4>
              <div class="input-group mb-3">
                <input type="text" id="novaPraca" class="form-control" placeholder="Nova praça">
                <button class="btn btn-primary" onclick="addPraca()">Adicionar</button>
              </div>
              <div id="pracasList"></div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card card-custom p-4">
              <h4>Administradoras</h4>
              <div class="input-group mb-3">
                <input type="text" id="novaAdministradora" class="form-control" placeholder="Nova administradora">
                <button class="btn btn-primary" onclick="addAdministradora()">Adicionar</button>
              </div>
              <div id="administradorasList"></div>
            </div>
          </div>
          <div class="col-12">
            <div class="card card-custom p-4">
              <h4>Backup / Planilha</h4>
              <div class="d-flex gap-3">
                <button class="btn btn-primary" onclick="exportBackup()">Exportar Backup</button>
                <button class="btn btn-outline-primary" onclick="importBackup()">Importar Backup</button>
                <div class="ms-auto d-flex gap-2 align-items-end">
                  <input type="month" id="exportMes" class="form-control" style="width:auto;">
                  <button class="btn btn-success" onclick="exportarExcel()">Exportar Excel</button>
                </div>
              </div>
              <input type="file" id="backupFileInput" accept=".json" style="display:none" onchange="handleBackupFile(event)">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Tarefa (inalterado) -->
  <div class="modal fade" id="modalTarefa" tabindex="-1">
    <!-- ... igual ao anterior ... -->
  </div>

  <script>
    // Firebase (mesma config)
    const firebaseConfig = { ... };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let clients = [];
    let tarefas = [];
    let dependentesTemp = [];
    let statuses = ['Em análise', 'Implantada', 'Cancelada', 'Pendente'];
    let pracas = [];          // lista carregada do Firestore
    let administradoras = []; // idem

    // Charts, calendário...
    let charts = { status: null, company: null, time: null };
    let calendarioMes = new Date().getMonth();
    let calendarioAno = new Date().getFullYear();
    let diaSelecionado = new Date().toISOString().split('T')[0];

    // Auth
    auth.onAuthStateChanged(user => {
      if (user) { currentUser = user; document.getElementById('loginScreen').style.display = 'none'; loadAll(); }
      else { document.getElementById('loginScreen').style.display = 'flex'; }
    });
    // ... funções de login/registro iguais ...

    async function loadAll() {
      await Promise.all([loadClients(), loadTarefas(), loadPracas(), loadAdministradoras()]);
      updateDashboard();
      renderCalendario();
      renderCompromissos(diaSelecionado);
      renderStatuses();
      renderPracasList();
      renderAdministradorasList();
    }

    async function loadClients() {
      const snap = await db.collection('clients').where('userId', '==', currentUser.uid).get();
      clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTable();
      updateFilterOptions();
    }

    async function loadPracas() {
      const snap = await db.collection('pracas').where('userId', '==', currentUser.uid).get();
      pracas = snap.docs.map(d => ({ id: d.id, nome: d.data().nome }));
      populateSelect('cPraca', pracas);
      renderPracasList();
    }

    async function loadAdministradoras() {
      const snap = await db.collection('administradoras').where('userId', '==', currentUser.uid).get();
      administradoras = snap.docs.map(d => ({ id: d.id, nome: d.data().nome }));
      populateSelect('cAdministradora', administradoras);
      renderAdministradorasList();
    }

    function populateSelect(elementId, items) {
      const select = document.getElementById(elementId);
      select.innerHTML = '<option value="">Selecione...</option>';
      items.forEach(item => select.innerHTML += `<option value="${item.nome}">${item.nome}</option>`);
    }

    function renderPracasList() {
      const list = document.getElementById('pracasList');
      list.innerHTML = pracas.map(p => `<div class="status-item"><span>${p.nome}</span><button class="btn btn-danger btn-sm" onclick="deletePraca('${p.id}')">Excluir</button></div>`).join('');
    }

    function renderAdministradorasList() {
      const list = document.getElementById('administradorasList');
      list.innerHTML = administradoras.map(a => `<div class="status-item"><span>${a.nome}</span><button class="btn btn-danger btn-sm" onclick="deleteAdministradora('${a.id}')">Excluir</button></div>`).join('');
    }

    async function addPraca() {
      const nome = document.getElementById('novaPraca').value.trim();
      if (!nome) return;
      await db.collection('pracas').add({ nome, userId: currentUser.uid });
      document.getElementById('novaPraca').value = '';
      await loadPracas();
    }

    async function deletePraca(id) {
      if (!confirm('Remover praça?')) return;
      await db.collection('pracas').doc(id).delete();
      await loadPracas();
    }

    async function addAdministradora() {
      const nome = document.getElementById('novaAdministradora').value.trim();
      if (!nome) return;
      await db.collection('administradoras').add({ nome, userId: currentUser.uid });
      document.getElementById('novaAdministradora').value = '';
      await loadAdministradoras();
    }

    async function deleteAdministradora(id) {
      if (!confirm('Remover administradora?')) return;
      await db.collection('administradoras').doc(id).delete();
      await loadAdministradoras();
    }

    // Cliente
    async function saveClient() {
      const data = {
        data: document.getElementById('cData').value,
        numeroProposta: document.getElementById('cNumeroProposta').value,
        nomeTitular: document.getElementById('cNomeTitular').value,
        cpfTitular: document.getElementById('cCpfTitular').value,
        cnpjTitular: document.getElementById('cCnpjTitular').value,
        telefoneTitular: document.getElementById('cTelefoneTitular').value,
        emailTitular: document.getElementById('cEmailTitular').value,
        qtdVidas: document.getElementById('cQtdVidas').value,
        modalidadePlano: document.getElementById('cModalidadePlano').value,
        coparticipacao: document.getElementById('cCoparticipacao').value,
        status: document.getElementById('cStatus').value,
        dataImplantacao: document.getElementById('cDataImplantacao').value,
        dataPagamento: document.getElementById('cDataPagamento').value,
        fonteVenda: document.getElementById('cFonteVenda').value,
        valorSemDesconto: document.getElementById('cValorSemDesconto').value,
        valorComDesconto: document.getElementById('cValorComDesconto').value,
        praca: document.getElementById('cPraca').value,
        administradora: document.getElementById('cAdministradora').value,
        codigo: document.getElementById('cCodigo').value,
        acomodacao: document.getElementById('cAcomodacao').value,
        vigencia: document.getElementById('cVigencia').value,
        anotacoes: document.getElementById('cAnotacoes').value,
        dependentes: dependentesTemp,
        userId: currentUser.uid,
        updatedAt: new Date().toISOString()
      };
      try {
        if (clientId.value) await db.collection('clients').doc(clientId.value).update(data);
        else { data.createdAt = new Date().toISOString(); await db.collection('clients').add(data); }
        alert('Proposta salva!');
        clearForm();
        new bootstrap.Tab(document.querySelector('[data-bs-target="#dashboardTab"]')).show();
        await loadAll();
      } catch (e) { alert('Erro: ' + e.message); console.error(e); }
    }

    function clearForm() {
      clientId.value = ''; dependentesTemp = [];
      const ids = ['cData','cNumeroProposta','cNomeTitular','cCpfTitular','cCnpjTitular','cTelefoneTitular','cEmailTitular','cQtdVidas','cModalidadePlano','cCoparticipacao','cDataImplantacao','cDataPagamento','cFonteVenda','cValorSemDesconto','cValorComDesconto','cCodigo','cAcomodacao','cVigencia','cAnotacoes'];
      ids.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      document.getElementById('cStatus').selectedIndex = 0;
      document.getElementById('cPraca').selectedIndex = 0;
      document.getElementById('cAdministradora').selectedIndex = 0;
      renderDependentes();
    }

    function editClient(id) {
      const c = clients.find(c => c.id === id);
      if (!c) return;
      clientId.value = id;
      dependentesTemp = c.dependentes || [];
      document.getElementById('cData').value = c.data || '';
      document.getElementById('cNumeroProposta').value = c.numeroProposta || '';
      document.getElementById('cNomeTitular').value = c.nomeTitular || '';
      document.getElementById('cCpfTitular').value = c.cpfTitular || '';
      document.getElementById('cCnpjTitular').value = c.cnpjTitular || '';
      document.getElementById('cTelefoneTitular').value = c.telefoneTitular || '';
      document.getElementById('cEmailTitular').value = c.emailTitular || '';
      document.getElementById('cQtdVidas').value = c.qtdVidas || '1';
      document.getElementById('cModalidadePlano').value = c.modalidadePlano || '';
      document.getElementById('cCoparticipacao').value = c.coparticipacao || '';
      document.getElementById('cStatus').value = c.status || '';
      document.getElementById('cDataImplantacao').value = c.dataImplantacao || '';
      document.getElementById('cDataPagamento').value = c.dataPagamento || '';
      document.getElementById('cFonteVenda').value = c.fonteVenda || '';
      document.getElementById('cValorSemDesconto').value = c.valorSemDesconto || '';
      document.getElementById('cValorComDesconto').value = c.valorComDesconto || '';
      document.getElementById('cPraca').value = c.praca || '';
      document.getElementById('cAdministradora').value = c.administradora || '';
      document.getElementById('cCodigo').value = c.codigo || '';
      document.getElementById('cAcomodacao').value = c.acomodacao || '';
      document.getElementById('cVigencia').value = c.vigencia || '';
      document.getElementById('cAnotacoes').value = c.anotacoes || '';
      renderDependentes();
      new bootstrap.Tab(document.querySelector('[data-bs-target="#clientesTab"]')).show();
      new bootstrap.Tab(document.querySelector('[data-bs-target="#dadosPrincipais"]')).show();
    }

    function addDependente() {
      const nome = document.getElementById('depNome').value.trim();
      const cpf = document.getElementById('depCPF').value.trim();
      const telefone = document.getElementById('depTelefone').value.trim();
      const email = document.getElementById('depEmail').value.trim();
      if (!nome) return alert('Nome obrigatório');
      dependentesTemp.push({ nome, cpf, telefone, email });
      document.getElementById('depNome').value = '';
      document.getElementById('depCPF').value = '';
      document.getElementById('depTelefone').value = '';
      document.getElementById('depEmail').value = '';
      renderDependentes();
    }
    function removeDependente(index) { dependentesTemp.splice(index, 1); renderDependentes(); }
    function renderDependentes() {
      const tbody = document.getElementById('dependentesBody');
      tbody.innerHTML = dependentesTemp.map((d, i) => 
        `<tr><td>${d.nome}</td><td>${d.cpf}</td><td>${d.telefone}</td><td>${d.email}</td><td><button class="btn btn-danger btn-sm" onclick="removeDependente(${i})">Remover</button></td></tr>`).join('');
    }

    // Pesquisa (filtros atualizados)
    function renderTable() {
      const s = document.getElementById('search').value.toLowerCase();
      const fs = document.getElementById('filterStatus').value;
      const fm = document.getElementById('filterModalidade').value;
      const fp = document.getElementById('filterPraca').value;
      const fa = document.getElementById('filterAdministradora').value;

      document.getElementById('tableBody').innerHTML = '';
      clients.filter(c => {
        const matchSearch = !s || (c.nomeTitular||'').toLowerCase().includes(s) || (c.numeroProposta||'').toLowerCase().includes(s);
        const matchStatus = fs === 'ALL' || c.status === fs;
        const matchModal = fm === 'ALL' || c.modalidadePlano === fm;
        const matchPraca = fp === 'ALL' || c.praca === fp;
        const matchAdmin = fa === 'ALL' || c.administradora === fa;
        return matchSearch && matchStatus && matchModal && matchPraca && matchAdmin;
      }).forEach(c => {
        document.getElementById('tableBody').innerHTML += `<tr>
          <td>${c.numeroProposta || ''}</td><td>${c.nomeTitular || ''}</td><td>${c.cpfTitular || ''}</td>
          <td>${c.modalidadePlano || ''}</td><td>${c.status || ''}</td><td>R$ ${c.valorComDesconto || c.valorSemDesconto || '0'}</td>
          <td>${c.praca || ''}</td><td>${c.administradora || ''}</td>
          <td><button class="btn btn-warning btn-sm" onclick="editClient('${c.id}')"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')"><i class="bi bi-trash"></i></button></td>
        </tr>`;
      });
    }

    function updateFilterOptions() {
      // Modalidade
      const modSet = new Set();
      clients.forEach(c => { if (c.modalidadePlano) modSet.add(c.modalidadePlano); });
      document.getElementById('filterModalidade').innerHTML = '<option value="ALL">Modalidade</option>' + [...modSet].sort().map(m => `<option>${m}</option>`).join('');
      // Praça
      const pracaSet = new Set();
      clients.forEach(c => { if (c.praca) pracaSet.add(c.praca); });
      document.getElementById('filterPraca').innerHTML = '<option value="ALL">Praça</option>' + [...pracaSet].sort().map(p => `<option>${p}</option>`).join('');
      // Administradora
      const adminSet = new Set();
      clients.forEach(c => { if (c.administradora) adminSet.add(c.administradora); });
      document.getElementById('filterAdministradora').innerHTML = '<option value="ALL">Administradora</option>' + [...adminSet].sort().map(a => `<option>${a}</option>`).join('');
    }

    // ... restante (agenda, backup, exportação, etc.) mantido, mas com adaptações mínimas ...
    // A exportação Excel deve incluir as novas colunas; vou manter a essência.

    // Exportar Excel (atualizado com novos campos)
    function exportarExcel() {
      const mesInput = document.getElementById('exportMes').value;
      if (!mesInput) return alert('Selecione um mês.');
      const [ano, mes] = mesInput.split('-');
      const prefixo = `${ano}-${mes.padStart(2,'0')}`;
      const clientesFiltrados = clients.filter(c => (c.dataPagamento || '').startsWith(prefixo) || (c.dataImplantacao || '').startsWith(prefixo));
      if (!clientesFiltrados.length) { alert('Nenhum cliente para o mês selecionado.'); return; }
      const headers = ['Data','Proposta','Titular','CPF Titular','CNPJ Titular','Tel Titular','Email Titular',
                       'Qtd Vidas','Modalidade','Coparticipação','Status','Implantação','Pagamento','Fonte Venda',
                       'Valor s/ Desc.','Valor c/ Desc.','Praça','Administradora','Código','Acomodação','Vigência','Anotações','Dependentes'];
      const linhas = clientesFiltrados.map(c => {
        const depStr = (c.dependentes||[]).map(d => `${d.nome} (CPF:${d.cpf} Tel:${d.telefone} Email:${d.email})`).join('; ');
        return [c.data,c.numeroProposta,c.nomeTitular,c.cpfTitular,c.cnpjTitular,c.telefoneTitular,c.emailTitular,
                c.qtdVidas,c.modalidadePlano,c.coparticipacao,c.status,c.dataImplantacao,c.dataPagamento,c.fonteVenda,
                c.valorSemDesconto,c.valorComDesconto,c.praca,c.administradora,c.codigo,c.acomodacao,c.vigencia,c.anotacoes,depStr]
                .map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',');
      });
      const csv = '\uFEFF' + headers.join(',') + '\n' + linhas.join('\n');
      const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `propostas_${ano}_${mes}.csv`; a.click();
    }

    // AutoFill (adaptado para novos rótulos)
    function autoFill() {
      const t = document.getElementById('smartPaste').value;
      const map = [
        [/N[úu]mero da proposta\s*:\s*(.*)$/im, 'cNumeroProposta'],
        [/Nome do titular\s*:\s*(.*)$/im, 'cNomeTitular'],
        [/CPF do titular\s*:\s*(.*)$/im, 'cCpfTitular'],
        [/CNPJ[\/]?CAEPF do titular\s*:\s*(.*)$/im, 'cCnpjTitular'],
        [/Telefone do titular\s*:\s*(.*)$/im, 'cTelefoneTitular'],
        [/Email do titular\s*:\s*(.*)$/im, 'cEmailTitular'],
        [/Quantidade de vidas?\s*:\s*(.*)$/im, 'cQtdVidas'],
        [/Modalidade do plano\s*:\s*(.*)$/im, 'cModalidadePlano'],
        [/Coparticipa[çc][ãa]o\s*:\s*(.*)$/im, 'cCoparticipacao'],
        [/Status\s*:\s*(.*)$/im, 'cStatus'],
        [/Data da implanta[çc][ãa]o\s*:\s*(.*)$/im, 'cDataImplantacao'],
        [/Data do pagamento\s*:\s*(.*)$/im, 'cDataPagamento'],
        [/Fonte da venda\s*:\s*(.*)$/im, 'cFonteVenda'],
        [/Valor do plano sem desconto\s*:\s*(.*)$/im, 'cValorSemDesconto'],
        [/Valor do plano com desconto\s*:\s*(.*)$/im, 'cValorComDesconto'],
        [/Pra[çc]a\s*:\s*(.*)$/im, 'cPraca'],
        [/Administradora\s*:\s*(.*)$/im, 'cAdministradora'],
        [/C[óo]digo\s*:\s*(.*)$/im, 'cCodigo'],
        [/Acomoda[çc][ãa]o\s*:\s*(.*)$/im, 'cAcomodacao'],
        [/Vig[êe]ncia\s*:\s*(.*)$/im, 'cVigencia']
      ];
      map.forEach(([r, id]) => { const m = t.match(r); if (m) document.getElementById(id).value = m[1].trim(); });
    }

    // ... funções de tarefas e agenda preservadas ...

    // Init
    loadAll();
  </script>
