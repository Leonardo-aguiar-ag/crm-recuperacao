<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Recuperação - Formatação Corrigida</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <style>
    /* ===================================================== */
    /* VARIÁVEIS E TEMA */
    /* ===================================================== */
    :root {
      --bg: #f8fafb;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-secondary: #6b7280;
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #06b6d4;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    body.dark-mode {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-secondary: #cbd5e1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      transition: background 0.3s, color 0.3s;
      font-size: 14px;
    }

    /* ===================================================== */
    /* NAVBAR */
    /* ===================================================== */
    .navbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .navbar h4 {
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===================================================== */
    /* CARDS */
    /* ===================================================== */
    .card-custom {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .card-custom:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
    }

    /* ===================================================== */
    /* DASHBOARD CARDS */
    /* ===================================================== */
    .dashboard-card {
      padding: 2rem;
      border-radius: 16px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
    }

    .dashboard-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .dashboard-card h6 {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.9;
      margin-bottom: 0.5rem;
    }

    .dashboard-card h2 {
      font-size: 2.5rem;
      font-weight: 700;
    }

    /* ===================================================== */
    /* BOTÕES */
    /* ===================================================== */
    .btn {
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #059669);
      color: white;
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #dc2626);
      color: white;
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      color: white;
    }

    .btn-warning {
      background: linear-gradient(135deg, var(--warning), #d97706);
      color: white;
    }

    .btn-warning:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      color: white;
    }

    .btn-info {
      background: linear-gradient(135deg, var(--info), #0891b2);
      color: white;
    }

    .btn-info:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      color: white;
    }

    .btn-outline-primary {
      color: var(--primary);
      border: 1.5px solid var(--primary);
      background: transparent;
    }

    .btn-outline-primary:hover {
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary-dark);
    }

    .btn-outline-secondary {
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
      background: transparent;
    }

    .btn-outline-secondary:hover {
      background: var(--border);
      color: var(--text);
    }

    .btn-sm {
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
    }

    /* ===================================================== */
    /* ABAS */
    /* ===================================================== */
    .nav-tabs {
      gap: 0.75rem;
      border: none;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .nav-tabs .nav-link {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .nav-tabs .nav-link:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .nav-tabs .nav-link.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
    }

    /* ===================================================== */
    /* FORMULÁRIOS */
    /* ===================================================== */
    .form-control,
    .form-select {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.625rem 0.875rem;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-control:focus,
    .form-select:focus {
      background: var(--card);
      color: var(--text);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      outline: none;
    }

    .form-control::placeholder {
      color: var(--text-secondary);
    }

    label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      display: block;
    }

    /* ===================================================== */
    /* TABELAS */
    /* ===================================================== */
    .table {
      color: var(--text);
      margin: 0;
      border-collapse: collapse;
    }

    .table thead {
      background: rgba(59, 130, 246, 0.05);
    }

    .table thead th {
      padding: 1rem;
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: none;
      color: var(--text-secondary);
    }

    .table tbody td {
      padding: 1rem;
      vertical-align: middle;
      border-color: var(--border);
      border-width: 1px;
    }

    .table tbody tr {
      transition: all 0.2s ease;
      border-bottom: 1px solid var(--border);
    }

    .table tbody tr:hover {
      background: rgba(59, 130, 246, 0.05);
      box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.1);
    }

    .table-responsive {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* ===================================================== */
    /* FILTROS E BUSCAS */
    /* ===================================================== */
    .filter-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background: rgba(59, 130, 246, 0.02);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
      min-width: 200px;
    }

    .filter-group label {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .filter-group .form-control,
    .filter-group .form-select {
      margin: 0;
    }

    /* ===================================================== */
    /* AÇÕES EM MASSA */
    /* ===================================================== */
    .bulk-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1rem;
      background: rgba(59, 130, 246, 0.02);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      align-items: center;
    }

    .bulk-actions .btn {
      white-space: nowrap;
    }

    .bulk-actions .form-select {
      min-width: 200px;
    }

    .bulk-actions .form-control {
      min-width: 150px;
    }

    /* ===================================================== */
    /* LOGIN */
    /* ===================================================== */
    .login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .login-box {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg);
    }

    .login-box h3 {
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ===================================================== */
    /* CONTAINER */
    /* ===================================================== */
    .container-fluid {
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .container-fluid {
        padding: 1rem;
      }

      .filter-section,
      .bulk-actions {
        flex-direction: column;
      }

      .filter-group {
        min-width: 100%;
      }

      .bulk-actions .form-select,
      .bulk-actions .form-control {
        min-width: 100%;
      }

      .table thead th,
      .table tbody td {
        padding: 0.75rem;
        font-size: 0.8rem;
      }

      .btn-sm {
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
      }
    }

    /* ===================================================== */
    /* BADGES */
    /* ===================================================== */
    .badge {
      padding: 0.5rem 0.75rem;
      font-weight: 600;
      border-radius: 6px;
      font-size: 0.8125rem;
    }

    /* ===================================================== */
    /* CHECKBOX */
    /* ===================================================== */
    input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    /* ===================================================== */
    /* UTILITÁRIOS */
    /* ===================================================== */
    .text-center { text-align: center; }
    .text-muted { color: var(--text-secondary); }
    .text-danger { color: var(--danger); }
    .text-success { color: var(--success); }
    .fw-bold { font-weight: 700; }
    .m-0 { margin: 0; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 1rem; }
    .mb-4 { margin-bottom: 1.5rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mt-3 { margin-top: 1rem; }
    .mt-4 { margin-top: 1.5rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-3 { gap: 1rem; }
    .d-flex { display: flex; }
    .d-grid { display: grid; }
    .align-items-center { align-items: center; }
    .justify-content-between { justify-content: space-between; }
    .w-100 { width: 100%; }
  </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h3>CRM Recuperação</h3>
    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
    <div class="input-group mb-3">
      <input type="password" id="loginPassword" class="form-control" placeholder="Senha">
      <button class="btn btn-outline-secondary" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
    </div>
    <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>
    <button class="btn btn-danger w-100 mb-2" onclick="googleLogin()"><i class="bi bi-google"></i> Google</button>
    <button class="btn btn-outline-primary w-100 mb-2" onclick="register()">Criar Conta</button>
    <button class="btn btn-link w-100" onclick="recoverPassword()">Esqueci a senha</button>
    <div id="loginError" class="text-danger text-center mt-3"></div>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <h4 class="m-0 fw-bold">CRM Recuperação</h4>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill"></i></button>
      <button class="btn btn-danger" onclick="logout()">Sair</button>
    </div>
  </div>
</nav>

<!-- CONTEÚDO PRINCIPAL -->
<div class="container-fluid">
  <ul class="nav nav-tabs" id="mainTab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboardTab">Dashboard</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientesTab">Ficha Cliente</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisaTab">Pesquisar</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#agendaTab">Agenda</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#configTab">Configurações</button></li>
  </ul>

  <div class="tab-content">
    <!-- DASHBOARD -->
    <div class="tab-pane fade show active" id="dashboardTab">
      <div class="row g-4 mb-4">
        <div class="col-md-3"><div class="dashboard-card"><h6>Total Clientes</h6><h2 id="dashTotal">0</h2></div></div>
        <div class="col-md-3"><div class="dashboard-card" style="background:linear-gradient(135deg,#10b981,#059669)"><h6>Implantados</h6><h2 id="dashImplantados">0</h2></div></div>
        <div class="col-md-3"><div class="dashboard-card" style="background:linear-gradient(135deg,#ef4444,#dc2626)"><h6>Sem Interesse</h6><h2 id="dashSemInteresse">0</h2></div></div>
        <div class="col-md-3"><div class="dashboard-card" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><h6>Taxa Conversão</h6><h2 id="dashConversao">0%</h2></div></div>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-auto"><label>Período</label><select id="periodSelect" class="form-select"><option value="30">30 dias</option><option value="60">60 dias</option><option value="90">90 dias</option><option value="all">Todo período</option></select></div>
      </div>
      <div class="row g-4">
        <div class="col-lg-6"><div class="card-custom"><h5>Recuperados por Mês</h5><canvas id="recoveryChart"></canvas></div></div>
        <div class="col-lg-6"><div class="card-custom"><h5>Distribuição por Status</h5><canvas id="statusChart"></canvas></div></div>
      </div>
    </div>

    <!-- FICHA CLIENTE -->
    <div class="tab-pane fade" id="clientesTab">
      <div class="card-custom"><h5>Campo Mágico</h5><textarea id="smartPaste" class="form-control mb-3" rows="4" placeholder="Cole aqui os dados do PDF"></textarea><button class="btn btn-primary" onclick="autoFill()">Auto preencher</button></div>
      <div class="card-custom">
        <input type="hidden" id="clientId">
        <div class="row g-3">
          <div class="col-md-4"><label>Nome</label><input id="cNome" class="form-control"></div>
          <div class="col-md-4"><label>Nome social</label><input id="cNomeSocial" class="form-control"></div>
          <div class="col-md-4"><label>CPF</label><input id="cCPF" class="form-control"></div>
          <div class="col-md-4"><label>Nascimento</label><input id="cNascimento" class="form-control"></div>
          <div class="col-md-8"><label>Endereço</label><input id="cEndereco" class="form-control"></div>
          <div class="col-md-5"><label>Cidade</label><input id="cCidade" class="form-control"></div>
          <div class="col-md-1"><label>UF</label><input id="cUF" class="form-control"></div>
          <div class="col-md-6"><label>Empresa</label><input id="cEmpresa" class="form-control"></div>
          <div class="col-md-6"><label>Ade emp</label><input id="cAdeEmp" class="form-control"></div>
          <div class="col-md-6"><label>Rede/plano</label><input id="cRedePlano" class="form-control"></div>
          <div class="col-md-6"><label>Plano atual</label><input id="cPlanoAtual" class="form-control"></div>
          <div class="col-md-4"><label>Acomodação</label><input id="cAcomodacao" class="form-control"></div>
          <div class="col-md-4"><label>Situação</label><input id="cSituacao" class="form-control"></div>
          <div class="col-md-4"><label>Status</label><select id="cStatus" class="form-select"></select></div>
          <div class="col-md-4"><label>Adesão</label><input id="cAdesao" class="form-control"></div>
          <div class="col-md-4"><label>Cancelamento</label><input id="cCancelamento" class="form-control"></div>
          <div class="col-md-4"><label>Tempo</label><input id="cTempo" class="form-control"></div>
          <div class="col-md-6"><label>Telefones</label><input id="cTelefones" class="form-control"></div>
          <div class="col-md-6"><label>Emails</label><input id="cEmails" class="form-control"></div>
          <div class="col-md-6"><label>Retorno</label><input type="date" id="cRetorno" class="form-control"></div>
          <div class="col-md-6"><label>Foto</label><input type="file" id="cFoto" class="form-control" accept="image/*" onchange="previewImage(event)"><img id="preview" style="max-width:100%; margin-top:0.5rem; display:none;"></div>
        </div>
        <div class="mt-3"><label><strong>📝 Anotações</strong></label><textarea id="cAnotacoes" class="form-control" rows="3"></textarea></div>
        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-success" onclick="saveClient()">Salvar Cliente</button>
          <button class="btn btn-outline-danger" onclick="clearForm()">Limpar Campos</button>
        </div>
      </div>
    </div>

    <!-- PESQUISAR - FORMATAÇÃO CORRIGIDA -->
    <div class="tab-pane fade" id="pesquisaTab">
      <div class="card-custom">
        <!-- FILTROS PRINCIPAIS -->
        <div class="filter-section">
          <div class="filter-group" style="flex: 2;">
            <label for="globalSearch">Buscar</label>
            <input type="text" id="globalSearch" class="form-control" placeholder="Nome, CPF, telefone, email ou empresa..." oninput="applyFiltersAndRender()">
          </div>
          <div class="filter-group">
            <label for="filterStatus">Status</label>
            <select id="filterStatus" class="form-select" onchange="applyFiltersAndRender()"><option value="ALL">Todos</option></select>
          </div>
          <div class="filter-group">
            <label for="filterPlano">Plano</label>
            <select id="filterPlano" class="form-select" onchange="applyFiltersAndRender()"><option value="ALL">Todos</option></select>
          </div>
          <div class="filter-group">
            <label>&nbsp;</label>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm" onclick="saveCurrentFilter()"><i class="bi bi-bookmark"></i> Salvar</button>
              <button class="btn btn-outline-secondary btn-sm" onclick="loadSavedFilters()"><i class="bi bi-arrow-counterclockwise"></i> Carregar</button>
            </div>
          </div>
        </div>

        <!-- AÇÕES EM MASSA -->
        <div class="bulk-actions">
          <button class="btn btn-success btn-sm" onclick="bulkWhatsApp()"><i class="bi bi-whatsapp"></i> WhatsApp em massa</button>
          <button class="btn btn-danger btn-sm" onclick="bulkDelete()"><i class="bi bi-trash"></i> Excluir selecionados</button>
          <select id="bulkStatus" class="form-select form-select-sm"><option value="">Alterar status...</option></select>
          <button class="btn btn-warning btn-sm" onclick="bulkChangeStatus()">Aplicar</button>
          <input type="date" id="bulkRetorno" class="form-control form-control-sm">
          <button class="btn btn-info btn-sm" onclick="bulkScheduleReturn()">Agendar retorno</button>
          <button class="btn btn-primary btn-sm" onclick="exportSelectedToCSV()"><i class="bi bi-file-excel"></i> Exportar CSV</button>
        </div>

        <!-- TABELA -->
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th>
                <th>Cliente</th>
                <th>Empresa</th>
                <th>Telefone</th>
                <th>Status</th>
                <th>Retorno</th>
                <th style="width: 120px;">Ações</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- AGENDA -->
    <div class="tab-pane fade" id="agendaTab">
      <div class="card-custom">
        <p class="text-muted">Agenda será implementada aqui.</p>
      </div>
    </div>

    <!-- CONFIGURAÇÕES -->
    <div class="tab-pane fade" id="configTab">
      <div class="card-custom">
        <p class="text-muted">Configurações serão implementadas aqui.</p>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
    authDomain: "crm-recuperacao.firebaseapp.com",
    projectId: "crm-recuperacao",
    storageBucket: "crm-recuperacao.firebasestorage.app",
    messagingSenderId: "347011763386",
    appId: "1:347011763386:web:158c1ca6f512a1cde1c683"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  let currentUser = null;
  let clients = [];
  let statuses = [];

  // ===== AUTH =====
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById('loginScreen').style.display = 'none';
      loadClients();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
    }
  });

  function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    auth.signInWithEmailAndPassword(email, password).catch(err => {
      document.getElementById('loginError').innerText = err.message;
    });
  }

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => {
      document.getElementById('loginError').innerText = err.message;
    });
  }

  function register() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    auth.createUserWithEmailAndPassword(email, password).catch(err => {
      document.getElementById('loginError').innerText = err.message;
    });
  }

  function recoverPassword() {
    const email = document.getElementById('loginEmail').value;
    if (!email) {
      alert('Digite seu email');
      return;
    }
    auth.sendPasswordResetEmail(email).then(() => {
      alert('Email de recuperação enviado!');
    }).catch(err => {
      document.getElementById('loginError').innerText = err.message;
    });
  }

  function togglePassword() {
    const input = document.getElementById('loginPassword');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function logout() {
    auth.signOut();
  }

  // ===== TEMA =====
  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
  }

  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
  }

  // ===== CLIENTES =====
  async function loadClients() {
    const snapshot = await db.collection('clients').where('userId', '==', currentUser.uid).get();
    clients = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderTable();
    updateStatusFilter();
    updatePlanosFilter();
  }

  async function saveClient() {
    const data = {
      nome: document.getElementById('cNome').value,
      nomeSocial: document.getElementById('cNomeSocial').value,
      cpf: document.getElementById('cCPF').value,
      nascimento: document.getElementById('cNascimento').value,
      endereco: document.getElementById('cEndereco').value,
      cidade: document.getElementById('cCidade').value,
      uf: document.getElementById('cUF').value,
      empresa: document.getElementById('cEmpresa').value,
      adeEmp: document.getElementById('cAdeEmp').value,
      redePlano: document.getElementById('cRedePlano').value,
      planoAtual: document.getElementById('cPlanoAtual').value,
      acomodacao: document.getElementById('cAcomodacao').value,
      situacao: document.getElementById('cSituacao').value,
      status: document.getElementById('cStatus').value,
      adesao: document.getElementById('cAdesao').value,
      cancelamento: document.getElementById('cCancelamento').value,
      tempo: document.getElementById('cTempo').value,
      telefones: document.getElementById('cTelefones').value,
      emails: document.getElementById('cEmails').value,
      retorno: document.getElementById('cRetorno').value,
      anotacoes: document.getElementById('cAnotacoes').value,
      userId: currentUser.uid
    };

    const clientId = document.getElementById('clientId').value;
    try {
      if (clientId) {
        await db.collection('clients').doc(clientId).update(data);
      } else {
        await db.collection('clients').add(data);
      }
      alert('Cliente salvo com sucesso!');
      clearForm();
      loadClients();
    } catch (err) {
      alert('Erro ao salvar: ' + err.message);
    }
  }

  function clearForm() {
    document.getElementById('clientId').value = '';
    ['cNome','cNomeSocial','cCPF','cNascimento','cEndereco','cCidade','cUF','cEmpresa','cAdeEmp','cRedePlano','cPlanoAtual','cAcomodacao','cSituacao','cAdesao','cCancelamento','cTempo','cTelefones','cEmails','cRetorno','cAnotacoes'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
  }

  function editClient(id) {
    const c = clients.find(c => c.id === id);
    if (!c) return;
    document.getElementById('clientId').value = id;
    document.getElementById('cNome').value = c.nome || '';
    document.getElementById('cNomeSocial').value = c.nomeSocial || '';
    document.getElementById('cCPF').value = c.cpf || '';
    document.getElementById('cNascimento').value = c.nascimento || '';
    document.getElementById('cEndereco').value = c.endereco || '';
    document.getElementById('cCidade').value = c.cidade || '';
    document.getElementById('cUF').value = c.uf || '';
    document.getElementById('cEmpresa').value = c.empresa || '';
    document.getElementById('cAdeEmp').value = c.adeEmp || '';
    document.getElementById('cRedePlano').value = c.redePlano || '';
    document.getElementById('cPlanoAtual').value = c.planoAtual || '';
    document.getElementById('cAcomodacao').value = c.acomodacao || '';
    document.getElementById('cSituacao').value = c.situacao || '';
    document.getElementById('cStatus').value = c.status || '';
    document.getElementById('cAdesao').value = c.adesao || '';
    document.getElementById('cCancelamento').value = c.cancelamento || '';
    document.getElementById('cTempo').value = c.tempo || '';
    document.getElementById('cTelefones').value = c.telefones || '';
    document.getElementById('cEmails').value = c.emails || '';
    document.getElementById('cRetorno').value = c.retorno || '';
    document.getElementById('cAnotacoes').value = c.anotacoes || '';
    document.querySelector('[data-bs-target="#clientesTab"]').click();
  }

  async function deleteClient(id) {
    if (!confirm('Excluir este cliente?')) return;
    try {
      await db.collection('clients').doc(id).delete();
      loadClients();
    } catch (err) {
      alert('Erro ao deletar: ' + err.message);
    }
  }

  // ===== TABELA =====
  function renderTable() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const plano = document.getElementById('filterPlano').value;

    const filtered = clients.filter(c => {
      const matchSearch = !search || 
        (c.nome && c.nome.toLowerCase().includes(search)) ||
        (c.cpf && c.cpf.includes(search)) ||
        (c.telefones && c.telefones.includes(search)) ||
        (c.emails && c.emails.toLowerCase().includes(search)) ||
        (c.empresa && c.empresa.toLowerCase().includes(search));
      const matchStatus = status === 'ALL' || c.status === status;
      const matchPlano = plano === 'ALL' || c.planoAtual === plano || c.redePlano === plano;
      return matchSearch && matchStatus && matchPlano;
    });

    const tbody = document.getElementById('tableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Nenhum cliente encontrado.</td></tr>';
      return;
    }

    let html = '';
    for (const c of filtered) {
      const whatsLink = `https://wa.me/55${(c.telefones || '').replace(/\D/g, '')}`;
      html += `
        <tr>
          <td><input type="checkbox" class="client-checkbox" value="${c.id}"></td>
          <td><strong>${c.nome || ''}</strong></td>
          <td>${c.empresa || ''}</td>
          <td>${c.telefones || ''}</td>
          <td><span class="badge bg-primary">${c.status || ''}</span></td>
          <td>${c.retorno || ''}</td>
          <td>
            <div class="d-flex gap-2">
              <button class="btn btn-warning btn-sm" onclick="editClient('${c.id}')"><i class="bi bi-pencil"></i></button>
              <a target="_blank" href="${whatsLink}" class="btn btn-success btn-sm"><i class="bi bi-whatsapp"></i></a>
              <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')"><i class="bi bi-trash"></i></button>
            </div>
          </td>
        </tr>
      `;
    }
    tbody.innerHTML = html;
  }

  function updateStatusFilter() {
    const statuses = new Set();
    clients.forEach(c => { if (c.status) statuses.add(c.status); });
    const select = document.getElementById('filterStatus');
    const current = select.value;
    select.innerHTML = '<option value="ALL">Todos</option>' + [...statuses].sort().map(s => `<option>${s}</option>`).join('');
    select.value = current;

    const bulkSelect = document.getElementById('bulkStatus');
    bulkSelect.innerHTML = '<option value="">Alterar status...</option>' + [...statuses].sort().map(s => `<option>${s}</option>`).join('');
  }

  function updatePlanosFilter() {
    const planos = new Set();
    clients.forEach(c => { if (c.planoAtual) planos.add(c.planoAtual); if (c.redePlano) planos.add(c.redePlano); });
    const select = document.getElementById('filterPlano');
    const current = select.value;
    select.innerHTML = '<option value="ALL">Todos</option>' + [...planos].sort().map(p => `<option>${p}</option>`).join('');
    select.value = current;
  }

  // ===== AÇÕES EM MASSA =====
  function getSelectedIds() {
    return Array.from(document.querySelectorAll('.client-checkbox:checked')).map(cb => cb.value);
  }

  function toggleSelectAll() {
    const all = document.getElementById('selectAllCheckbox').checked;
    document.querySelectorAll('.client-checkbox').forEach(cb => cb.checked = all);
  }

  function applyFiltersAndRender() {
    renderTable();
  }

  async function bulkWhatsApp() {
    const ids = getSelectedIds();
    if (!ids.length) return alert('Selecione ao menos um cliente.');
    for (const id of ids) {
      const c = clients.find(c => c.id === id);
      if (c?.telefones) {
        window.open(`https://wa.me/55${(c.telefones || '').replace(/\D/g, '')}`, '_blank');
      }
    }
  }

  async function bulkDelete() {
    const ids = getSelectedIds();
    if (!ids.length) return alert('Selecione ao menos um cliente.');
    if (!confirm(`Excluir ${ids.length} cliente(s)?`)) return;
    for (const id of ids) {
      await db.collection('clients').doc(id).delete();
    }
    loadClients();
  }

  async function bulkChangeStatus() {
    const status = document.getElementById('bulkStatus').value;
    if (!status) return alert('Selecione um status.');
    const ids = getSelectedIds();
    if (!ids.length) return alert('Selecione ao menos um cliente.');
    for (const id of ids) {
      await db.collection('clients').doc(id).update({ status });
    }
    loadClients();
  }

  async function bulkScheduleReturn() {
    const date = document.getElementById('bulkRetorno').value;
    if (!date) return alert('Selecione uma data.');
    const ids = getSelectedIds();
    if (!ids.length) return alert('Selecione ao menos um cliente.');
    for (const id of ids) {
      await db.collection('clients').doc(id).update({ retorno: date });
    }
    loadClients();
  }

  function exportSelectedToCSV() {
    const ids = getSelectedIds();
    if (!ids.length) return alert('Selecione ao menos um cliente.');
    const selected = clients.filter(c => ids.includes(c.id));
    const rows = [['Nome', 'Telefone', 'Email', 'Status', 'Empresa']];
    for (const c of selected) {
      rows.push([
        `"${(c.nome || '').replace(/"/g, '""')}"`,
        `"${(c.telefones || '').replace(/"/g, '""')}"`,
        `"${(c.emails || '').replace(/"/g, '""')}"`,
        `"${(c.status || '').replace(/"/g, '""')}"`,
        `"${(c.empresa || '').replace(/"/g, '""')}"`
      ]);
    }
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `selecionados_${new Date().toISOString().slice(0, 10)}.csv`;
    a.click();
  }

  function saveCurrentFilter() {
    alert('Filtro salvo!');
  }

  function loadSavedFilters() {
    alert('Filtros carregados!');
  }

  function previewImage(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('preview');
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function autoFill() {
    alert('Auto preenchimento será implementado!');
  }
</script>
