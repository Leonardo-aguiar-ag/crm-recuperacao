<!-- ===================================================== -->

<!-- LOGIN OVERLAY -->

<div id="loginOverlay">

    <div class="login-box">

        <h3 class="fw-bold text-center mb-4">
            <i class="bi bi-shield-lock-fill me-2"></i>
            CRM Login
        </h3>

        <!-- EMAIL -->

        <div class="mb-3">

            <label class="form-label text-light">
                E-mail
            </label>

            <input
                type="email"
                id="emailInput"
                class="form-control"
                placeholder="Digite seu e-mail"
            >

        </div>

        <!-- SENHA -->

        <div class="mb-2">

            <label class="form-label text-light">
                Senha
            </label>

            <div class="input-group">

                <input
                    type="password"
                    id="passwordInput"
                    class="form-control"
                    placeholder="Digite sua senha"
                >

                <button
                    class="btn btn-outline-secondary"
                    type="button"
                    onclick="togglePassword()"
                >

                    <i
                        class="bi bi-eye-fill"
                        id="eyeIcon"
                    ></i>

                </button>

            </div>

        </div>

        <!-- ESQUECI SENHA -->

        <div class="text-end mb-4">

            <a
                href="#"
                onclick="recoverPassword()"
                style="
                    color:#60a5fa;
                    text-decoration:none;
                    font-size:.9rem;
                "
            >
                Esqueci minha senha
            </a>

        </div>

        <!-- BOTÕES -->

        <button
            class="btn btn-primary w-100 mb-3 fw-bold"
            onclick="login()"
        >

            <i class="bi bi-box-arrow-in-right me-2"></i>

            Entrar

        </button>

        <button
            class="btn btn-outline-light w-100 fw-bold"
            onclick="register()"
        >

            <i class="bi bi-person-plus-fill me-2"></i>

            Criar Conta

        </button>

        <!-- MENSAGEM -->

        <div
            id="loginError"
            class="mt-4 text-center fw-bold"
            style="min-height:20px;"
        ></div>

    </div>

</div>

<!-- ===================================================== -->
<!-- SCRIPT AUTH COMPLETO -->
<!-- SUBSTITUA O SCRIPT ANTIGO POR ESSE -->
<!-- ===================================================== -->

<script>

/* ===================================================== */
/* FIREBASE */
/* ===================================================== */

const firebaseConfig = {

    apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",

    authDomain: "crm-recuperacao.firebaseapp.com",

    projectId: "crm-recuperacao",

    storageBucket: "crm-recuperacao.firebasestorage.app",

    messagingSenderId: "347011763386",

    appId: "1:347011763386:web:158c1ca6f512a1cde1c683"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const auth = firebase.auth();

/* ===================================================== */
/* TOGGLE PASSWORD */
/* ===================================================== */

function togglePassword(){

    const input =
    document.getElementById('passwordInput');

    const icon =
    document.getElementById('eyeIcon');

    if(input.type === 'password'){

        input.type = 'text';

        icon.classList.remove('bi-eye-fill');

        icon.classList.add('bi-eye-slash-fill');

    }else{

        input.type = 'password';

        icon.classList.remove('bi-eye-slash-fill');

        icon.classList.add('bi-eye-fill');
    }
}

/* ===================================================== */
/* LOGIN */
/* ===================================================== */

function login(){

    const email =
    document.getElementById('emailInput').value.trim();

    const password =
    document.getElementById('passwordInput').value;

    const error =
    document.getElementById('loginError');

    error.style.color = '#ef4444';

    if(!email || !password){

        error.innerText =
        'Preencha e-mail e senha';

        return;
    }

    auth
    .signInWithEmailAndPassword(
        email,
        password
    )

    .then(()=>{

        error.style.color = '#22c55e';

        error.innerText =
        'Login realizado com sucesso';

    })

    .catch((err)=>{

        let msg =
        'Erro ao fazer login';

        if(err.code === 'auth/user-not-found'){

            msg =
            'Usuário não encontrado';
        }

        if(err.code === 'auth/wrong-password'){

            msg =
            'Senha incorreta';
        }

        if(err.code === 'auth/invalid-email'){

            msg =
            'E-mail inválido';
        }

        if(err.code === 'auth/too-many-requests'){

            msg =
            'Muitas tentativas. Tente mais tarde';
        }

        error.innerText = msg;
    });
}

/* ===================================================== */
/* REGISTER */
/* ===================================================== */

function register(){

    const email =
    document.getElementById('emailInput').value.trim();

    const password =
    document.getElementById('passwordInput').value;

    const error =
    document.getElementById('loginError');

    error.style.color = '#ef4444';

    if(!email || !password){

        error.innerText =
        'Preencha todos os campos';

        return;
    }

    if(password.length < 6){

        error.innerText =
        'A senha deve ter no mínimo 6 caracteres';

        return;
    }

    auth
    .createUserWithEmailAndPassword(
        email,
        password
    )

    .then(()=>{

        error.style.color = '#22c55e';

        error.innerText =
        'Conta criada com sucesso';

    })

    .catch((err)=>{

        let msg =
        'Erro ao criar conta';

        if(err.code === 'auth/email-already-in-use'){

            msg =
            'Este e-mail já está cadastrado';
        }

        if(err.code === 'auth/invalid-email'){

            msg =
            'E-mail inválido';
        }

        if(err.code === 'auth/weak-password'){

            msg =
            'Senha muito fraca';
        }

        error.innerText = msg;
    });
}

/* ===================================================== */
/* RECUPERAR SENHA */
/* ===================================================== */

function recoverPassword(){

    const email =
    document.getElementById('emailInput').value.trim();

    const error =
    document.getElementById('loginError');

    if(!email){

        error.style.color = '#f59e0b';

        error.innerText =
        'Digite seu e-mail para recuperar a senha';

        return;
    }

    auth
    .sendPasswordResetEmail(email)

    .then(()=>{

        error.style.color = '#22c55e';

        error.innerText =
        'E-mail de redefinição enviado';

        alert(
            'Foi enviado um link para redefinir sua senha no e-mail informado.'
        );
    })

    .catch((err)=>{

        error.style.color = '#ef4444';

        let msg =
        'Erro ao enviar e-mail';

        if(err.code === 'auth/user-not-found'){

            msg =
            'Nenhum usuário encontrado com esse e-mail';
        }

        if(err.code === 'auth/invalid-email'){

            msg =
            'E-mail inválido';
        }

        error.innerText = msg;
    });
}

/* ===================================================== */
/* LOGOUT */
/* ===================================================== */

function logout(){

    auth.signOut();
}

/* ===================================================== */
/* OBSERVADOR LOGIN */
/* ===================================================== */

auth.onAuthStateChanged(user=>{

    if(user){

        document.getElementById('loginOverlay')
        .style.display = 'none';

        console.log(
            'Usuário logado:',
            user.email
        );

    }else{

        document.getElementById('loginOverlay')
        .style.display = 'flex';
    }
});

</script>
