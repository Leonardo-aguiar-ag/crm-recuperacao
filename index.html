<!-- ===================================================== -->
<!-- CRM RECUPERAÇÃO COMPLETO -->
<!-- ===================================================== -->

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Recuperação</title>

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

:root{

--bg:#020617;
--card:#0f172a;
--border:#1e293b;
--primary:#2563eb;
--text:#f8fafc;
--muted:#94a3b8;

}

body{

background:var(--bg);
color:var(--text);
font-family:Segoe UI;

}

.navbar{

background:#000;
border-bottom:1px solid var(--border);

}

.card-custom{

background:var(--card);
border:1px solid var(--border);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.4);

}

.dashboard-card{

padding:25px;
border-radius:20px;
color:white;

}

.form-control,
.form-select{

background:#020617;
border:1px solid #334155;
color:white;
border-radius:14px;
padding:12px;

}

.form-control:focus,
.form-select:focus{

background:#020617;
color:white;
border-color:#2563eb;
box-shadow:none;

}

.table{

color:white;

}

.table thead{

background:#1e293b;

}

.nav-tabs{

border:none;

}

.nav-tabs .nav-link{

background:#0f172a;
border:none;
color:#cbd5e1;
padding:14px 20px;
border-radius:14px;
margin-right:10px;
font-weight:600;

}

.nav-tabs .nav-link.active{

background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;

}

.login-screen{

position:fixed;
inset:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;

}

.login-box{

width:100%;
max-width:420px;
background:#111827;
padding:35px;
border-radius:20px;
border:1px solid #334155;

}

#preview{

max-width:100%;
border-radius:20px;
margin-top:10px;
display:none;

}

</style>

</head>

<body>

<!-- ===================================================== -->
<!-- LOGIN -->
<!-- ===================================================== -->

<div class="login-screen" id="loginScreen">

<div class="login-box">

<h3 class="text-center mb-4">

CRM Recuperação

</h3>

<input
type="email"
id="loginEmail"
class="form-control mb-3"
placeholder="Seu email">

<div class="input-group mb-3">

<input
type="password"
id="loginPassword"
class="form-control"
placeholder="Senha">

<button
class="btn btn-outline-light"
onclick="togglePassword()">

<i class="bi bi-eye"></i>

</button>

</div>

<button
class="btn btn-primary w-100 mb-2"
onclick="login()">

Entrar

</button>

<button
class="btn btn-danger w-100 mb-2"
onclick="googleLogin()">

<i class="bi bi-google"></i>
Google

</button>

<button
class="btn btn-outline-light w-100 mb-2"
onclick="register()">

Criar conta

</button>

<button
class="btn btn-link text-light w-100"
onclick="recoverPassword()">

Esqueci minha senha

</button>

<div
id="loginError"
class="text-danger text-center mt-2"></div>

</div>

</div>

<!-- ===================================================== -->
<!-- NAVBAR -->
<!-- ===================================================== -->

<nav class="navbar navbar-dark px-4 py-3">

<h4 class="m-0">

CRM Recuperação

</h4>

<div>

<button
class="btn btn-success"
onclick="exportBackup()">

Backup

</button>

</div>

</nav>

<!-- ===================================================== -->
<!-- CONTAINER -->
<!-- ===================================================== -->

<div class="container-fluid p-4">

<!-- ===================================================== -->
<!-- NAV TABS -->
<!-- ===================================================== -->

<ul class="nav nav-tabs mb-4">

<li class="nav-item">

<button
class="nav-link active"
data-bs-toggle="tab"
data-bs-target="#dashboardTab">

Dashboard

</button>

</li>

<li class="nav-item">

<button
class="nav-link"
data-bs-toggle="tab"
data-bs-target="#clientesTab">

Ficha Cliente

</button>

</li>

<li class="nav-item">

<button
class="nav-link"
data-bs-toggle="tab"
data-bs-target="#pesquisaTab">

Pesquisa

</button>

</li>

<li class="nav-item">

<button
class="nav-link"
data-bs-toggle="tab"
data-bs-target="#agendaTab">

Agenda

</button>

</li>

<li class="nav-item">

<button
class="nav-link"
data-bs-toggle="tab"
data-bs-target="#configTab">

Configurações

</button>

</li>

</ul>

<!-- ===================================================== -->
<!-- TAB CONTENT -->
<!-- ===================================================== -->

<div class="tab-content">

<!-- DASHBOARD -->

<div
class="tab-pane fade show active"
id="dashboardTab">

<div class="row g-4 mb-4">

<div class="col-md-3">
<div class="dashboard-card bg-primary">
<h6>Total Clientes</h6>
<h2 id="dashTotal">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card bg-success">
<h6>Fechados</h6>
<h2 id="dashFechados">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card bg-warning">
<h6>Negociação</h6>
<h2 id="dashNegociacao">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card bg-danger">
<h6>Sem Interesse</h6>
<h2 id="dashSemInteresse">0</h2>
</div>
</div>

</div>

<div class="card card-custom p-4">

<canvas id="crmChart"></canvas>

</div>

</div>

<!-- CLIENTES -->

<div
class="tab-pane fade"
id="clientesTab">

<div class="card card-custom p-4 mb-4">

<h5 class="mb-3">

Campo mágico

</h5>

<textarea
id="smartPaste"
class="form-control mb-3"
rows="5"></textarea>

<button
class="btn btn-primary"
onclick="autoFill()">

Auto preencher

</button>

</div>

<div class="card card-custom p-4">

<form>

<input type="hidden" id="clientId">

<div class="row g-3">

<div class="col-md-4">
<label>Nome usuário</label>
<input type="text" id="cNome" class="form-control">
</div>

<div class="col-md-4">
<label>Nome social</label>
<input type="text" id="cNomeSocial" class="form-control">
</div>

<div class="col-md-4">
<label>CPF</label>
<input type="text" id="cCPF" class="form-control">
</div>

<div class="col-md-4">
<label>Nascimento</label>
<input type="text" id="cNascimento" class="form-control">
</div>

<div class="col-md-8">
<label>Endereço</label>
<input type="text" id="cEndereco" class="form-control">
</div>

<div class="col-md-5">
<label>Cidade</label>
<input type="text" id="cCidade" class="form-control">
</div>

<div class="col-md-1">
<label>UF</label>
<input type="text" id="cUF" class="form-control">
</div>

<div class="col-md-6">
<label>Empresa</label>
<input type="text" id="cEmpresa" class="form-control">
</div>

<div class="col-md-6">
<label>Telefones</label>
<input type="text" id="cTelefones" class="form-control">
</div>

<div class="col-md-6">
<label>Email</label>
<input type="text" id="cEmails" class="form-control">
</div>

<div class="col-md-6">
<label>Status</label>
<select id="cStatus" class="form-select"></select>
</div>

<div class="col-md-6">
<label>Retorno</label>
<input type="date" id="cRetorno" class="form-control">
</div>

<div class="col-md-6">
<label>Foto</label>

<input
type="file"
class="form-control"
onchange="previewImage(event)">

<input type="hidden" id="fotoBase64">

<img id="preview">

</div>

</div>

<button
type="button"
class="btn btn-success mt-4"
onclick="saveClient()">

Salvar Cliente

</button>

</form>

</div>

</div>

<!-- PESQUISA -->

<div
class="tab-pane fade"
id="pesquisaTab">

<div class="card card-custom p-4">

<input
type="text"
id="search"
class="form-control mb-4"
placeholder="Pesquisar..."
onkeyup="renderTable()">

<div class="table-responsive">

<table class="table">

<thead>

<tr>

<th>Cliente</th>
<th>Empresa</th>
<th>Telefone</th>
<th>Status</th>
<th>Agenda</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<!-- AGENDA -->

<div
class="tab-pane fade"
id="agendaTab">

<div class="card card-custom p-4">

<table class="table">

<thead>

<tr>

<th>Cliente</th>
<th>Telefone</th>
<th>Retorno</th>
<th>WhatsApp</th>

</tr>

</thead>

<tbody id="agendaBody"></tbody>

</table>

</div>

</div>

<!-- CONFIG -->

<div
class="tab-pane fade"
id="configTab">

<div class="row g-4">

<div class="col-lg-6">

<div class="card card-custom p-4 h-100">

<div class="d-flex justify-content-between mb-4">

<h4>Etiquetas CRM</h4>

<button
class="btn btn-success"
onclick="addStatus()">

Adicionar

</button>

</div>

<div id="statusList"></div>

</div>

</div>

<div class="col-lg-6">

<div class="card card-custom p-4 h-100">

<h4 class="mb-4">

Backup

</h4>

<div class="d-grid gap-3">

<button
class="btn btn-primary"
onclick="exportBackup()">

Exportar Backup

</button>

<button
class="btn btn-success"
onclick="exportExcel()">

Exportar Excel

</button>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
authDomain: "crm-recuperacao.firebaseapp.com",
projectId: "crm-recuperacao",
storageBucket: "crm-recuperacao.firebasestorage.app",
messagingSenderId: "347011763386",
appId: "1:347011763386:web:62073679ac76ef08e1c683",
measurementId: "G-XXZFJXHEF6"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

let clients = [];

let statuses = [
'Em negociação',
'Fechou o plano',
'Não tem interesse'
];

auth.onAuthStateChanged(user=>{

if(user){

currentUser=user;

document.getElementById('loginScreen').style.display='none';

loadClients();

}

});

function togglePassword(){

const input =
document.getElementById('loginPassword');

input.type =
input.type === 'password'
? 'text'
: 'password';

}

function login(){

auth.signInWithEmailAndPassword(

document.getElementById('loginEmail').value,
document.getElementById('loginPassword').value

).catch(err=>{

document.getElementById('loginError').innerText =
err.message;

});

}

function register(){

auth.createUserWithEmailAndPassword(

document.getElementById('loginEmail').value,
document.getElementById('loginPassword').value

);

}

function googleLogin(){

const provider =
new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

}

function recoverPassword(){

auth.sendPasswordResetEmail(

document.getElementById('loginEmail').value

).then(()=>{

alert('Email enviado');

});

}

function saveClient(){

const id =
document.getElementById('clientId').value
|| db.collection('clients').doc().id;

const client={

userId:currentUser.uid,

nome:document.getElementById('cNome').value,
empresa:document.getElementById('cEmpresa').value,
telefones:document.getElementById('cTelefones').value,
status:document.getElementById('cStatus').value,
retorno:document.getElementById('cRetorno').value

};

db.collection('clients').doc(id).set(client);

}

function loadClients(){

db.collection('clients')
.where('userId','==',currentUser.uid)
.onSnapshot(snapshot=>{

clients=[];

snapshot.forEach(doc=>{

clients.push({

id:doc.id,
...doc.data()

});

});

renderTable();
renderAgenda();
updateDashboard();

});

}

function renderTable(){

const tbody =
document.getElementById('tableBody');

tbody.innerHTML='';

clients.forEach(c=>{

tbody.innerHTML += `

<tr>

<td>${c.nome||'-'}</td>
<td>${c.empresa||'-'}</td>
<td>${c.telefones||'-'}</td>
<td>${c.status||'-'}</td>
<td>${c.retorno||'-'}</td>

<td>

<button
class="btn btn-warning btn-sm"
onclick="editClient('${c.id}')">

Editar

</button>

</td>

</tr>

`;

});

}

function renderAgenda(){

const tbody =
document.getElementById('agendaBody');

tbody.innerHTML='';

clients.forEach(c=>{

tbody.innerHTML += `

<tr>

<td>${c.nome}</td>
<td>${c.telefones}</td>
<td>${c.retorno}</td>

<td>

<a
target="_blank"
href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}"

class="btn btn-success btn-sm">

WhatsApp

</a>

</td>

</tr>

`;

});

}

function updateDashboard(){

document.getElementById('dashTotal').innerText =
clients.length;

}

function addStatus(){

const novo =
prompt('Novo status');

if(!novo) return;

statuses.push(novo);

renderStatuses();

}

function renderStatuses(){

const list =
document.getElementById('statusList');

const select =
document.getElementById('cStatus');

list.innerHTML='';
select.innerHTML='';

statuses.forEach((status,index)=>{

select.innerHTML += `
<option>${status}</option>
`;

list.innerHTML += `

<div class="d-flex justify-content-between align-items-center border rounded p-3 mb-2">

<div>${status}</div>

<button
class="btn btn-danger btn-sm"
onclick="deleteStatus(${index})">

Excluir

</button>

</div>

`;

});

}

function deleteStatus(index){

statuses.splice(index,1);

renderStatuses();

}

function exportBackup(){

const blob =
new Blob(
[JSON.stringify(clients)],
{type:'application/json'}
);

const a =
document.createElement('a');

a.href=
URL.createObjectURL(blob);

a.download='backup-crm.json';

a.click();

}

function exportExcel(){

alert('Implementar SheetJS');

}

function previewImage(event){

const file =
event.target.files[0];

const reader =
new FileReader();

reader.onload=function(e){

document.getElementById('preview').src =
e.target.result;

document.getElementById('preview').style.display='block';

document.getElementById('fotoBase64').value =
e.target.result;

};

reader.readAsDataURL(file);

}

renderStatuses();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
