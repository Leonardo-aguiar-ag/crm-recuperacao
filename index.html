<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Recuperação | Leonardo Aguiar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

:root{

    --primary:#2563eb;
    --primary2:#4f46e5;
    --success:#22c55e;
    --danger:#ef4444;
    --warning:#f59e0b;

    --bg:#f1f5f9;
    --card:#ffffff;
    --card2:#f8fafc;

    --text:#0f172a;
    --textSoft:#64748b;

    --border:#dce3ea;

    --input:#ffffff;

    --shadow:
    0 10px 30px rgba(15,23,42,.06);

    --radius:22px;
}

body.dark-mode{

    --bg:#0b1120;
    --card:#111827;
    --card2:#182131;

    --text:#f1f5f9;
    --textSoft:#94a3b8;

    --border:#273244;

    --input:#0f172a;

    --shadow:
    0 20px 40px rgba(0,0,0,.45);
}

body{

    background:var(--bg);
    color:var(--text);

    font-family:
    Inter,
    Segoe UI,
    sans-serif;

    transition:.25s;
}

*{
    transition:.25s;
}

/* NAVBAR */

.navbar-custom{

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e293b
    );

    border-bottom:
    1px solid rgba(255,255,255,.05);

    backdrop-filter:blur(10px);
}

.navbar-brand{
    font-weight:800;
    font-size:1.2rem;
}

/* CARD */

.card-custom{

    background:var(--card);

    border:
    1px solid var(--border);

    border-radius:var(--radius);

    box-shadow:var(--shadow);
}

/* TABS */

.nav-tabs{

    border:none;
    gap:10px;
}

.nav-tabs .nav-link{

    border:none;

    border-radius:14px;

    color:var(--textSoft);

    font-weight:700;

    padding:12px 20px;
}

.nav-tabs .nav-link.active{

    background:
    linear-gradient(
    135deg,
    var(--primary),
    var(--primary2)
    );

    color:white;

    box-shadow:
    0 10px 25px rgba(37,99,235,.25);
}

/* INPUTS */

.form-control,
.form-select{

    background:var(--input)!important;

    color:var(--text)!important;

    border:
    1px solid var(--border)!important;

    border-radius:16px;

    padding:12px 14px;
}

.form-control::placeholder{
    color:var(--textSoft);
}

.form-control:focus,
.form-select:focus{

    border-color:var(--primary)!important;

    box-shadow:
    0 0 0 4px rgba(37,99,235,.15)!important;
}

.form-label{

    color:var(--textSoft);

    font-weight:700;

    margin-bottom:6px;
}

/* BUTTONS */

.btn{

    border-radius:14px;

    font-weight:700;

    padding:10px 16px;
}

.btn-primary{

    background:
    linear-gradient(
    135deg,
    var(--primary),
    var(--primary2)
    );

    border:none;
}

.btn-success{

    background:
    linear-gradient(
    135deg,
    #16a34a,
    #22c55e
    );

    border:none;
}

.btn-whatsapp{

    background:
    linear-gradient(
    135deg,
    #16a34a,
    #25D366
    );

    color:white;
    border:none;
}

.btn-whatsapp:hover{
    color:white;
}

/* DASH */

.dash-card{

    border-radius:24px;

    padding:24px;

    color:white;

    position:relative;

    overflow:hidden;

    min-height:140px;
}

.dash-card::before{

    content:'';

    position:absolute;

    width:120px;
    height:120px;

    background:
    rgba(255,255,255,.08);

    border-radius:50%;

    right:-20px;
    top:-20px;
}

.dash-card h2{

    font-size:2rem;
    font-weight:800;
}

.dash-icon{

    font-size:2.8rem;
    opacity:.25;
}

/* SECTION */

.section-title{

    color:var(--primary);

    font-weight:800;

    font-size:1rem;

    margin-top:30px;

    margin-bottom:20px;

    padding-bottom:10px;

    border-bottom:
    1px solid var(--border);
}

/* TABLE */

.table{

    color:var(--text)!important;
}

.table thead{

    background:var(--card2)!important;
}

.table-light th{

    background:var(--card2)!important;

    color:var(--text)!important;

    border-color:var(--border)!important;
}

.table td{

    border-color:var(--border)!important;
}

.table-hover tbody tr:hover{

    background:
    rgba(37,99,235,.05)!important;
}

/* ALERT */

.alert-secondary{

    background:var(--card2)!important;

    color:var(--text)!important;

    border:
    1px solid var(--border)!important;
}

/* MODAL */

.modal-content{

    background:var(--card);

    color:var(--text);

    border-radius:20px;

    border:
    1px solid var(--border);
}

/* LOGIN */

#loginOverlay{

    position:fixed;

    inset:0;

    z-index:9999;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #111827
    );
}

.login-box{

    width:100%;
    max-width:420px;

    background:
    rgba(17,24,39,.95);

    border:
    1px solid rgba(255,255,255,.06);

    padding:35px;

    border-radius:28px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.4);
}

.login-box h3{
    color:white;
}

.login-box .form-control{

    background:#0f172a!important;

    color:white!important;

    border:
    1px solid #334155!important;
}

.login-box .form-control::placeholder{
    color:#94a3b8;
}

.img-preview{

    width:100%;

    max-height:260px;

    object-fit:cover;

    border-radius:20px;
}

/* SCROLL */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{

    background:
    linear-gradient(
    180deg,
    #2563eb,
    #4f46e5
    );

    border-radius:20px;
}

@media(max-width:768px){

    .dash-card{
        min-height:auto;
    }

    .navbar-brand{
        font-size:1rem;
    }
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginOverlay">

<div class="login-box">

<h3 class="fw-bold mb-4 text-center">
<i class="bi bi-shield-lock-fill me-2"></i>
CRM Login
</h3>

<input type="email" id="emailInput" class="form-control mb-3" placeholder="Seu e-mail">

<div class="input-group mb-4">

<input type="password" id="passwordInput" class="form-control" placeholder="Sua senha">

<button class="btn btn-outline-light" onclick="togglePassword()">
<i class="bi bi-eye"></i>
</button>

</div>

<button class="btn btn-primary w-100 mb-2" onclick="login()">
Entrar
</button>

<button class="btn btn-outline-light w-100" onclick="register()">
Criar Conta
</button>

<div id="loginError" class="text-danger mt-3 text-center"></div>

</div>

</div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">

<div class="container-fluid">

<span class="navbar-brand">

<i class="bi bi-shield-check me-2"></i>
CRM Recuperação

</span>

<div class="d-flex gap-2">

<button class="btn btn-outline-light btn-sm" onclick="toggleTheme()">
<i class="bi bi-moon-stars-fill"></i>
</button>

<button class="btn btn-danger btn-sm" onclick="logout()">
<i class="bi bi-box-arrow-right"></i>
</button>

</div>

</div>

</nav>

<!-- CONTAINER -->

<div class="container-fluid px-4 pb-5">

<!-- TABS -->

<ul class="nav nav-tabs mb-4">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboard">
<i class="bi bi-grid-fill me-2"></i>
Dashboard
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientes">
<i class="bi bi-person-vcard-fill me-2"></i>
Clientes
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#agenda">
<i class="bi bi-calendar-check-fill me-2"></i>
Agenda
</button>
</li>

</ul>

<div class="tab-content">

<!-- DASHBOARD -->

<div class="tab-pane fade show active" id="dashboard">

<div class="row g-4 mb-4" id="dashboardCards"></div>

</div>

<!-- CLIENTES -->

<div class="tab-pane fade" id="clientes">

<div class="card card-custom p-4">

<!-- PREENCHIMENTO -->

<div class="alert alert-secondary border-0 p-4 mb-4 rounded-4">

<label class="fw-bold mb-3 fs-5 d-flex align-items-center">

<i class="bi bi-lightning-charge-fill text-warning me-2"></i>

Preenchimento Mágico (Copie e Cole do PDF)

</label>

<div class="input-group">

<textarea
id="smartPasteBox"
class="form-control"
rows="3"
placeholder="Cole aqui o texto inteiro do PDF do cliente e clique em Auto-preencher..."
></textarea>

<button
class="btn btn-primary px-4 fw-bold"
onclick="autoFillForm()"
type="button"
>

Auto-preencher

</button>

</div>

</div>

<div class="d-flex justify-content-between align-items-center mb-4">

<h4 class="fw-bold text-primary">

<i class="bi bi-person-vcard-fill me-2"></i>
Ficha do Cliente

</h4>

<button class="btn btn-outline-danger" onclick="resetForm()">

<i class="bi bi-eraser me-2"></i>
Limpar

</button>

</div>

<form id="clientForm">

<input type="hidden" id="clientId">

<!-- DADOS -->

<div class="section-title">

Dados Pessoais & Contato

</div>

<div class="row g-4">

<div class="col-md-4">

<label class="form-label">
Nome do usuário
</label>

<input type="text" id="cNome" class="form-control">

</div>

<div class="col-md-4">

<label class="form-label">
Nome social
</label>

<input type="text" id="cNomeSocial" class="form-control">

</div>

<div class="col-md-4">

<label class="form-label">
CPF do titular
</label>

<input type="text" id="cCPF" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Data de nascimento
</label>

<input type="text" id="cNascimento" class="form-control">

</div>

<div class="col-md-5">

<label class="form-label">
Endereço
</label>

<input type="text" id="cEndereco" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Cidade
</label>

<input type="text" id="cCidade" class="form-control">

</div>

<div class="col-md-1">

<label class="form-label">
UF
</label>

<input type="text" id="cUF" class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">
Telefones cadastrados
</label>

<input type="text" id="cTelefones" class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">
Endereços eletrônicos
</label>

<input type="text" id="cEmails" class="form-control">

</div>

</div>

<!-- EMPRESA -->

<div class="section-title mt-5">

Dados do Plano & Empresa

</div>

<div class="row g-4">

<div class="col-md-6">

<label class="form-label">
Empresa
</label>

<input type="text" id="cEmpresa" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Ade emp
</label>

<input type="text" id="cAdeEmp" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Rede/plano
</label>

<input type="text" id="cRedePlano" class="form-control">

</div>

<div class="col-md-4">

<label class="form-label">
Plano atual
</label>

<input type="text" id="cPlanoAtual" class="form-control">

</div>

<div class="col-md-4">

<label class="form-label">
Acomodação
</label>

<input type="text" id="cAcomodacao" class="form-control">

</div>

<div class="col-md-4">

<label class="form-label">
Situação
</label>

<input type="text" id="cSituacao" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Data da adesão
</label>

<input type="text" id="cAdesao" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Data do cancelamento
</label>

<input type="text" id="cCancelamento" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">
Tempo
</label>

<input type="text" id="cTempo" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label text-warning fw-bold">

<i class="bi bi-calendar-event me-1"></i>

Data para Retorno

</label>

<input type="date" id="cRetorno" class="form-control">

</div>

</div>

<!-- CRM -->

<div class="section-title mt-5">

CRM & Anexos

</div>

<div class="row g-4 align-items-end">

<div class="col-md-4">

<label class="form-label text-primary fw-bold">

Status de Negociação

</label>

<select id="cStatus" class="form-select">

<option>Em negociação</option>
<option>Entrou em contato</option>
<option>Fechou o plano</option>
<option>Não tem interesse</option>

</select>

</div>

<div class="col-md-8">

<label class="form-label">

Anexar Print/Foto da Lista

</label>

<input
type="file"
id="cFoto"
class="form-control"
accept="image/*"
onchange="previewImage(event)"
>

<img
id="fotoPreview"
class="img-preview mt-3"
style="display:none;"
>

<input type="hidden" id="cFotoBase64">

</div>

</div>

<!-- BUTTONS -->

<div class="d-flex justify-content-end gap-3 mt-5">

<button
type="button"
class="btn btn-outline-secondary px-4"
onclick="resetForm()"
>

Cancelar

</button>

<button
type="button"
class="btn btn-success px-5"
onclick="saveClient()"
>

<i class="bi bi-cloud-upload-fill me-2"></i>

Salvar Cliente

</button>

</div>

</form>

</div>

</div>

<!-- AGENDA -->

<div class="tab-pane fade" id="agenda">

<div class="card card-custom p-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h4 class="fw-bold">

<i class="bi bi-calendar-week me-2"></i>

Agenda de Retorno

</h4>

<button class="btn btn-success" onclick="exportToExcel()">

<i class="bi bi-file-earmark-excel me-2"></i>

Exportar Excel

</button>

</div>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-light">

<tr>

<th>Cliente</th>
<th>Telefone</th>
<th>Status</th>
<th>Retorno</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="agendaTableBody"></tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "SUA_API_KEY",
authDomain: "SEU_DOMINIO",
projectId: "SEU_PROJECT_ID"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const auth = firebase.auth();

let clients = [];

/* THEME */

function toggleTheme(){

    document.body.classList.toggle('dark-mode');

    localStorage.setItem(
        'crm-theme',
        document.body.classList.contains('dark-mode')
    );
}

if(localStorage.getItem('crm-theme') === 'true'){

    document.body.classList.add('dark-mode');
}

/* LOGIN */

function togglePassword(){

const input =
document.getElementById('passwordInput');

input.type =
input.type === 'password'
? 'text'
: 'password';
}

function login(){

alert('Login Firebase');
}

function register(){

alert('Cadastro Firebase');
}

function logout(){

alert('Logout');
}

/* AUTO FILL */

function autoFillForm(){

alert('Auto preenchimento');
}

/* RESET */

function resetForm(){

document.getElementById('clientForm').reset();

document.getElementById('fotoPreview').style.display='none';
}

/* PREVIEW */

function previewImage(event){

const file = event.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

const img =
document.getElementById('fotoPreview');

img.src = e.target.result;

img.style.display='block';

document.getElementById('cFotoBase64').value =
e.target.result;
};

reader.readAsDataURL(file);
}
}

/* SAVE */

function saveClient(){

const client = {

nome:
document.getElementById('cNome').value,

cpf:
document.getElementById('cCPF').value,

telefone:
document.getElementById('cTelefones').value,

empresa:
document.getElementById('cEmpresa').value,

status:
document.getElementById('cStatus').value,

retorno:
document.getElementById('cRetorno').value

};

clients.push(client);

renderAgenda();

alert('Cliente salvo!');
}

/* WHATSAPP */

function openWhatsApp(phone){

if(!phone){

alert('Cliente sem telefone');

return;
}

window.open(
`https://wa.me/55${phone}`,
'_blank'
);
}

/* AGENDA */

function renderAgenda(){

const tbody =
document.getElementById('agendaTableBody');

tbody.innerHTML='';

clients.forEach(c=>{

tbody.innerHTML += `

<tr>

<td>
<strong>${c.nome}</strong>
</td>

<td>
${c.telefone}
</td>

<td>

<span class="badge bg-primary">

${c.status}

</span>

</td>

<td>

<strong class="text-warning">

${c.retorno || '-'}

</strong>

</td>

<td>

<div class="d-flex gap-2">

<button
class="btn btn-whatsapp btn-sm"
onclick="openWhatsApp('${c.telefone}')"
>

<i class="bi bi-whatsapp"></i>

</button>

</div>

</td>

</tr>
`;
});
}

/* EXCEL */

function exportToExcel(){

const ws =
XLSX.utils.json_to_sheet(clients);

const wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
'Clientes'
);

XLSX.writeFile(
wb,
'clientes.xlsx'
);
}

</script>

</body>
</html>
