<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CRM Recuperação</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#0f172a;
--card:#111827;
--card2:#1e293b;
--border:#334155;
--primary:#2563eb;
--text:#f8fafc;
--muted:#94a3b8;
}

body{
background:var(--bg);
color:var(--text);
font-family:Segoe UI;
}

.navbar{
background:#020617;
border-bottom:1px solid #1e293b;
}

.card-custom{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.dashboard-card{
padding:25px;
border-radius:20px;
color:white;
}

.form-control,
.form-select{
background:#0f172a;
border:1px solid #334155;
color:white;
border-radius:12px;
padding:12px;
}

.form-control:focus,
.form-select:focus{
background:#0f172a;
color:white;
border-color:var(--primary);
box-shadow:none;
}

.table{
color:white;
}

.table thead{
background:#1e293b;
}

.nav-tabs{
border:none;
}

.nav-tabs .nav-link{
background:#1e293b;
border:none;
color:#cbd5e1;
padding:14px 22px;
margin-right:10px;
border-radius:14px;
font-weight:600;
}

.nav-tabs .nav-link.active{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
}

.login-screen{
position:fixed;
inset:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

.login-box{
width:100%;
max-width:420px;
background:#111827;
padding:35px;
border-radius:20px;
border:1px solid #334155;
}

#preview{
max-width:100%;
border-radius:15px;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="login-screen" id="loginScreen">

<div class="login-box">

<h3 class="mb-4 text-center">
CRM Recuperação
</h3>

<input
type="email"
id="loginEmail"
class="form-control mb-3"
placeholder="Seu email"
/>

<div class="input-group mb-3">

<input
type="password"
id="loginPassword"
class="form-control"
placeholder="Senha"
/>

<button
class="btn btn-outline-light"
onclick="togglePassword()">

<i class="bi bi-eye"></i>

</button>

</div>

<button
class="btn btn-primary w-100 mb-2"
onclick="login()">

Entrar

</button>

<button
class="btn btn-danger w-100 mb-2"
onclick="googleLogin()">

<i class="bi bi-google"></i>
Entrar com Google

</button>

<button
class="btn btn-outline-light w-100 mb-2"
onclick="register()">

Criar Conta

</button>

<button
class="btn btn-link text-light w-100"
onclick="recoverPassword()">

Esqueci minha senha

</button>

<div id="loginError" class="text-danger text-center mt-2"></div>

</div>

</div>

<!-- NAVBAR -->

<nav class="navbar navbar-dark px-4 py-3">

<h4 class="m-0">
CRM Recuperação
</h4>

<div>

<button
class="btn btn-success"
onclick="exportBackup()">

Backup

</button>

</div>

</nav>

<!-- CONTAINER -->

<div class="container-fluid p-4">

<!-- TABS -->

<ul class="nav nav-tabs mb-4">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboardTab">
Dashboard
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientesTab">
Ficha Cliente
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisaTab">
Pesquisar
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#agendaTab">
Agenda
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#configTab">
Configuração
</button>
</li>

</ul>

<div class="tab-content">

<!-- DASHBOARD -->

<div class="tab-pane fade show active" id="dashboardTab">

<div class="row g-4 mb-4">

<div class="col-md-3">
<div class="dashboard-card bg-primary">
<h6>Total Clientes</h6>
<h2 id="dashTotal">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card bg-success">
<h6>Fechados</h6>
<h2 id="dashFechados">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card bg-warning">
<h6>Negociação</h6>
<h2 id="dashNegociacao">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card bg-danger">
<h6>Sem Interesse</h6>
<h2 id="dashSemInteresse">0</h2>
</div>
</div>

</div>

<div class="card card-custom p-4">
<canvas id="crmChart"></canvas>
</div>

</div>

<!-- CLIENTE -->

<div class="tab-pane fade" id="clientesTab">

<div class="card card-custom p-4 mb-4">

<h5 class="mb-3">
Campo mágico
</h5>

<textarea
id="smartPaste"
class="form-control mb-3"
rows="5"></textarea>

<button
class="btn btn-primary"
onclick="autoFill()">

Auto preencher

</button>

</div>

<div class="card card-custom p-4">

<form>

<input type="hidden" id="clientId"/>

<div class="row g-3">

<div class="col-md-4">
<label>Nome do usuário</label>
<input type="text" id="cNome" class="form-control"/>
</div>

<div class="col-md-4">
<label>Nome social</label>
<input type="text" id="cNomeSocial" class="form-control"/>
</div>

<div class="col-md-4">
<label>CPF</label>
<input type="text" id="cCPF" class="form-control"/>
</div>

<div class="col-md-4">
<label>Data nascimento</label>
<input type="text" id="cNascimento" class="form-control"/>
</div>

<div class="col-md-8">
<label>Endereço</label>
<input type="text" id="cEndereco" class="form-control"/>
</div>

<div class="col-md-5">
<label>Cidade</label>
<input type="text" id="cCidade" class="form-control"/>
</div>

<div class="col-md-1">
<label>UF</label>
<input type="text" id="cUF" class="form-control"/>
</div>

<div class="col-md-6">
<label>Empresa</label>
<input type="text" id="cEmpresa" class="form-control"/>
</div>

<div class="col-md-6">
<label>Ade emp</label>
<input type="text" id="cAdeEmp" class="form-control"/>
</div>

<div class="col-md-6">
<label>Rede/plano</label>
<input type="text" id="cRedePlano" class="form-control"/>
</div>

<div class="col-md-6">
<label>Plano atual</label>
<input type="text" id="cPlanoAtual" class="form-control"/>
</div>

<div class="col-md-4">
<label>Acomodação</label>
<input type="text" id="cAcomodacao" class="form-control"/>
</div>

<div class="col-md-4">
<label>Situação</label>
<input type="text" id="cSituacao" class="form-control"/>
</div>

<div class="col-md-4">
<label>Status</label>
<select id="cStatus" class="form-select"></select>
</div>

<div class="col-md-4">
<label>Data adesão</label>
<input type="text" id="cAdesao" class="form-control"/>
</div>

<div class="col-md-4">
<label>Cancelamento</label>
<input type="text" id="cCancelamento" class="form-control"/>
</div>

<div class="col-md-4">
<label>Tempo</label>
<input type="text" id="cTempo" class="form-control"/>
</div>

<div class="col-md-6">
<label>Telefones</label>
<input type="text" id="cTelefones" class="form-control"/>
</div>

<div class="col-md-6">
<label>E-mails</label>
<input type="text" id="cEmails" class="form-control"/>
</div>

<div class="col-md-6">
<label>Agenda retorno</label>
<input type="date" id="cRetorno" class="form-control"/>
</div>

<div class="col-md-6">
<label>Foto</label>
<input type="file" class="form-control" onchange="previewImage(event)"/>
<input type="hidden" id="fotoBase64"/>
<img id="preview"/>
</div>

</div>

<button
type="button"
class="btn btn-success mt-4"
onclick="saveClient()">

Salvar Cliente

</button>

</form>

</div>

</div>

<!-- PESQUISA -->

<div class="tab-pane fade" id="pesquisaTab">

<div class="card card-custom p-4">

<div class="row mb-3">

<div class="col-md-8">

<input
type="text"
id="search"
class="form-control"
placeholder="Pesquisar"
onkeyup="renderTable()"
/>

</div>

</div>

<div class="table-responsive">

<table class="table">

<thead>

<tr>
<th>Cliente</th>
<th>Empresa</th>
<th>Telefone</th>
<th>Status</th>
<th>Agenda</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<!-- AGENDA -->

<div class="tab-pane fade" id="agendaTab">

<div class="card card-custom p-4">

<table class="table">

<thead>

<tr>
<th>Cliente</th>
<th>Telefone</th>
<th>Retorno</th>
<th>WhatsApp</th>
</tr>

</thead>

<tbody id="agendaBody"></tbody>

</table>

</div>

</div>

<!-- CONFIG -->

<div class="tab-pane fade" id="configTab">

<div class="card card-custom p-4">

<div class="d-flex justify-content-between mb-4">

<h4>Status</h4>

<button
class="btn btn-success"
onclick="addStatus()">

Adicionar

</button>

</div>

<div id="statusList"></div>

</div>

</div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
authDomain: "crm-recuperacao.firebaseapp.com",
projectId: "crm-recuperacao",
storageBucket: "crm-recuperacao.firebasestorage.app",
messagingSenderId: "347011763386",
appId: "1:347011763386:web:62073679ac76ef08e1c683",
measurementId: "G-XXZFJXHEF6"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

let clients = [];

let statuses = [
'Em negociação',
'Fechou o plano',
'Não tem interesse'
];

auth.onAuthStateChanged(user=>{

if(user){

currentUser = user;

document.getElementById('loginScreen').style.display='none';

loadClients();

}

});

function togglePassword(){

const input =
document.getElementById('loginPassword');

input.type =
input.type === 'password'
? 'text'
: 'password';

}

function login(){

const email =
document.getElementById('loginEmail').value;

const password =
document.getElementById('loginPassword').value;

auth.signInWithEmailAndPassword(email,password)
.catch(err=>{

document.getElementById('loginError').innerText =
err.message;

});

}

function register(){

const email =
document.getElementById('loginEmail').value;

const password =
document.getElementById('loginPassword').value;

auth.createUserWithEmailAndPassword(email,password);

}

function googleLogin(){

const provider =
new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider);

}

function recoverPassword(){

const email =
document.getElementById('loginEmail').value;

auth.sendPasswordResetEmail(email)
.then(()=>{

alert('Email enviado');

});

}

function saveClient(){

const id =
document.getElementById('clientId').value
|| db.collection('clients').doc().id;

const client = {

userId: currentUser.uid,

nome:
document.getElementById('cNome').value,

empresa:
document.getElementById('cEmpresa').value,

telefones:
document.getElementById('cTelefones').value,

status:
document.getElementById('cStatus').value,

retorno:
document.getElementById('cRetorno').value

};

db.collection('clients')
.doc(id)
.set(client);

}

function loadClients(){

db.collection('clients')
.where('userId','==',currentUser.uid)
.onSnapshot(snapshot=>{

clients=[];

snapshot.forEach(doc=>{

clients.push({
id:doc.id,
...doc.data()
});

});

renderTable();
renderAgenda();
updateDashboard();

});

}

function renderTable(){

const tbody =
document.getElementById('tableBody');

tbody.innerHTML='';

clients.forEach(c=>{

tbody.innerHTML += `

<tr>

<td>${c.nome||'-'}</td>
<td>${c.empresa||'-'}</td>
<td>${c.telefones||'-'}</td>
<td>${c.status||'-'}</td>
<td>${c.retorno||'-'}</td>

<td>

<button
class="btn btn-warning btn-sm"
onclick="editClient('${c.id}')">

Editar

</button>

</td>

</tr>

`;

});

}

function renderAgenda(){

const tbody =
document.getElementById('agendaBody');

tbody.innerHTML='';

clients.forEach(c=>{

tbody.innerHTML += `

<tr>

<td>${c.nome||'-'}</td>

<td>${c.telefones||'-'}</td>

<td>${c.retorno||'-'}</td>

<td>

<a
href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}"
target="_blank"
class="btn btn-success btn-sm">

WhatsApp

</a>

</td>

</tr>

`;

});

}

function updateDashboard(){

document.getElementById('dashTotal').innerText =
clients.length;

document.getElementById('dashFechados').innerText =
clients.filter(c=>c.status==='Fechou o plano').length;

document.getElementById('dashNegociacao').innerText =
clients.filter(c=>c.status==='Em negociação').length;

document.getElementById('dashSemInteresse').innerText =
clients.filter(c=>c.status==='Não tem interesse').length;

}

function addStatus(){

const novo =
prompt('Novo status');

if(!novo) return;

statuses.push(novo);

renderStatuses();

}

function renderStatuses(){

const list =
document.getElementById('statusList');

const select =
document.getElementById('cStatus');

list.innerHTML='';
select.innerHTML='';

statuses.forEach((status,index)=>{

select.innerHTML += `
<option>${status}</option>
`;

list.innerHTML += `

<div class="d-flex justify-content-between align-items-center border rounded p-3 mb-2">

<div>${status}</div>

<div>

<button
class="btn btn-danger btn-sm"
onclick="deleteStatus(${index})">

Excluir

</button>

</div>

</div>

`;

});

}

function deleteStatus(index){

statuses.splice(index,1);

renderStatuses();

}

function editClient(id){

const c =
clients.find(x=>x.id===id);

document.getElementById('clientId').value=c.id;
document.getElementById('cNome').value=c.nome||'';
document.getElementById('cEmpresa').value=c.empresa||'';
document.getElementById('cTelefones').value=c.telefones||'';
document.getElementById('cRetorno').value=c.retorno||'';

}

function exportBackup(){

const blob =
new Blob(
[JSON.stringify(clients)],
{type:'application/json'}
);

const a =
document.createElement('a');

a.href =
URL.createObjectURL(blob);

a.download =
'backup-crm.json';

a.click();

}

function previewImage(event){

const file =
event.target.files[0];

const reader =
new FileReader();

reader.onload=function(e){

document.getElementById('preview').src =
e.target.result;

document.getElementById('preview').style.display='block';

document.getElementById('fotoBase64').value =
e.target.result;

};

reader.readAsDataURL(file);

}

renderStatuses();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
