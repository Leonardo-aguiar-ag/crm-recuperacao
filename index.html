<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Recuperação | Leonardo Aguiar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        :root { --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #212529; --text-muted: #6c757d; --border-color: #ced4da; --input-bg: #ffffff; --input-text: #212529; --section-title: #0A2463; }
        body.dark-mode { --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #f8f9fa; --text-muted: #adb5bd; --border-color: #5c636a; --input-bg: #000000; --input-text: #ffffff; --section-title: #66b2ff; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: 0.3s; margin: 0; padding: 0;}
        .navbar-custom { background-color: #0A2463; color: white; }
        .card-custom { background-color: var(--bg-card); border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .table { color: var(--text-main); }
        .dark-mode .table-light { background-color: #2b2b2b; color: #f8f9fa; }
        .dark-mode .table-light th { background-color: #2b2b2b; border-color: #444; color: #fff;}
        .dark-mode .table-hover tbody tr:hover { background-color: #2a2a2a; color: white;}
        .dark-mode td { border-color: #444; }
        .form-control, .form-select { background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.95rem; padding: 10px 12px; transition: all 0.2s ease-in-out; }
        .dark-mode .form-control::placeholder { color: #8a939b; opacity: 1; }
        .form-control:focus, .form-select:focus { background-color: var(--input-bg); color: var(--input-text); border-color: #FF6B35; box-shadow: 0 0 0 0.25rem rgba(255, 107, 53, 0.25); outline: none; }
        .nav-tabs .nav-link { color: var(--text-muted); font-weight: 600; border: none; padding: 12px 20px; }
        .nav-tabs .nav-link.active { color: #FF6B35; background-color: transparent; border-bottom: 3px solid #FF6B35; }
        .nav-tabs { border-bottom: 2px solid var(--border-color); margin-bottom: 20px; }
        .dash-card { border-radius: 15px; color: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s;}
        .dash-card:hover { transform: translateY(-5px); }
        .dash-icon { font-size: 2.5rem; opacity: 0.5; }
        .form-label { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; margin-top: 0.5rem;}
        .section-title { font-size: 1rem; color: var(--section-title); font-weight: 700; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; margin-top: 20px; margin-bottom: 15px;}
        .img-preview { max-width: 100%; max-height: 300px; object-fit: contain; border-radius: 10px; display: none; margin-top: 10px;}
        .dark-mode .modal-content { background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--border-color); }
        .dark-mode .modal-header, .dark-mode .modal-footer { border-color: var(--border-color); }
        .dark-mode .input-group-text { background-color: var(--input-bg); border-color: var(--border-color); color: var(--text-main);}

        /* Tela de Login */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--bg-card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginOverlay">
    <div class="login-box text-center">
        <h3 class="fw-bold mb-4" style="color: var(--section-title);"><i class="bi bi-shield-lock me-2"></i>CRM Login</h3>
        <input type="email" id="emailInput" class="form-control mb-3" placeholder="Seu E-mail">
        <input type="password" id="passwordInput" class="form-control mb-4" placeholder="Sua Senha">
        <button class="btn btn-primary w-100 mb-2 fw-bold" onclick="login()"><i class="bi bi-box-arrow-in-right me-2"></i>Entrar</button>
        <button class="btn btn-outline-secondary w-100 btn-sm" onclick="register()">Criar Conta</button>
        <div id="loginError" class="text-danger mt-3 small fw-bold"></div>
    </div>
</div>

<nav class="navbar navbar-custom shadow-sm mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold"><i class="bi bi-shield-check me-2"></i>CRM de Recuperação</span>
        <div>
            <span class="me-3 small text-light d-none d-md-inline" id="userEmailDisplay"></span>
            <button class="btn btn-outline-light btn-sm me-2" data-bs-toggle="modal" data-bs-target="#statusModal"><i class="bi bi-tags"></i> Status</button>
            <button class="btn btn-outline-light btn-sm ms-2" onclick="toggleTheme()" id="themeBtn" title="Alternar Modo"><i class="bi bi-moon-fill"></i></button>
            <button class="btn btn-danger btn-sm ms-2" onclick="logout()" title="Sair"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 pb-5">
    
    <ul class="nav nav-tabs" id="crmTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" id="tab-dashboard" data-bs-toggle="tab" data-bs-target="#pane-dashboard" type="button"><i class="bi bi-bar-chart-fill me-2"></i>Dashboard</button></li>
        <li class="nav-item"><button class="nav-link" id="tab-cadastro" data-bs-toggle="tab" data-bs-target="#pane-cadastro" type="button"><i class="bi bi-person-vcard me-2"></i>Ficha do Cliente</button></li>
        <li class="nav-item"><button class="nav-link" id="tab-pesquisa" data-bs-toggle="tab" data-bs-target="#pane-pesquisa" type="button"><i class="bi bi-search me-2"></i>Pesquisar</button></li>
    </ul>

    <div class="tab-content" id="crmTabsContent">
        
        <!-- ABA 1: DASHBOARD -->
        <div class="tab-pane fade show active" id="pane-dashboard">
            <h4 class="mb-4 fw-bold">Visão Geral</h4>
            <div class="row g-4" id="dashboardCards"></div>
        </div>

        <!-- ABA 2: CADASTRAR / EDITAR -->
        <div class="tab-pane fade" id="pane-cadastro">
            <div class="card card-custom p-4">
                
                <div class="alert alert-secondary border-0 p-3 mb-4" style="border-radius: 10px; background-color: var(--input-bg); border: 1px solid var(--border-color) !important;">
                    <label class="fw-bold mb-2"><i class="bi bi-lightning-charge-fill text-warning fs-5 me-1"></i> Preenchimento Mágico (Copie e Cole do PDF)</label>
                    <div class="input-group">
                        <textarea id="smartPasteBox" class="form-control" rows="2" placeholder="Cole aqui o texto inteiro do PDF do cliente e clique em Auto-preencher..."></textarea>
                        <button class="btn btn-primary fw-bold px-4" type="button" onclick="autoFillForm()">Auto-preencher</button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2 mt-4">
                    <h4 class="text-primary fw-bold m-0" id="formTitle">Adicionar Novo Cliente</h4>
                    <button class="btn btn-sm btn-outline-danger" onclick="resetForm()"><i class="bi bi-eraser me-1"></i>Limpar Ficha</button>
                </div>
                
                <form id="clientForm">
                    <input type="hidden" id="clientId">
                    
                    <div class="section-title">Dados Pessoais & Contato</div>
                    <div class="row g-3">
                        <div class="col-md-4"><label class="form-label">Nome do usuário</label><input type="text" id="cNome" class="form-control" required></div>
                        <div class="col-md-4"><label class="form-label">Nome social</label><input type="text" id="cNomeSocial" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label">CPF do titular</label><input type="text" id="cCPF" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Data de nascimento</label><input type="text" id="cNascimento" class="form-control"></div>
                        <div class="col-md-5"><label class="form-label">Endereço</label><input type="text" id="cEndereco" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Cidade</label><input type="text" id="cCidade" class="form-control"></div>
                        <div class="col-md-1"><label class="form-label">UF</label><input type="text" id="cUF" class="form-control" maxlength="2"></div>
                        <div class="col-md-6"><label class="form-label">Telefones cadastrados</label><input type="text" id="cTelefones" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Endereços eletrônicos</label><input type="text" id="cEmails" class="form-control"></div>
                    </div>

                    <div class="section-title mt-4">Dados do Plano & Empresa</div>
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Empresa</label><input type="text" id="cEmpresa" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label">Rede/plano</label><input type="text" id="cRedePlano" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label">Plano atual</label><input type="text" id="cPlanoAtual" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label">Acomodação</label><input type="text" id="cAcomodacao" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label">Situação</label><input type="text" id="cSituacao" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Data da adesão</label><input type="text" id="cAdesao" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Ade emp</label><input type="text" id="cAdeEmp" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Data do cancelamento</label><input type="text" id="cCancelamento" class="form-control"></div>
                        <div class="col-md-3"><label class="form-label">Tempo</label><input type="text" id="cTempo" class="form-control"></div>
                    </div>

                    <div class="section-title mt-4">CRM & Anexos</div>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label text-primary">Status de Negociação</label>
                            <select id="cStatus" class="form-select border-primary text-primary" style="font-weight: bold;"></select>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Anexar Print/Foto da Lista</label>
                            <input type="file" id="cFoto" class="form-control" accept="image/*" onchange="previewImage(event)">
                            <img id="fotoPreview" class="img-preview mt-2 border">
                            <input type="hidden" id="cFotoBase64">
                        </div>
                    </div>

                    <div class="text-end mt-5">
                        <button type="button" class="btn btn-success btn-lg px-5 shadow-sm rounded-pill" onclick="saveClient()">
                            <i class="bi bi-cloud-arrow-up-fill me-2"></i>Salvar na Nuvem
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ABA 3: PESQUISA -->
        <div class="tab-pane fade" id="pane-pesquisa">
            <div class="card card-custom p-4 mb-4">
                <div class="row g-3 align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Buscar por Nome, CPF, Empresa..." onkeyup="renderTable()">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select id="filterStatus" class="form-select" onchange="renderTable()">
                            <option value="ALL">Filtro: Todos os Status</option>
                        </select>
                    </div>
                    <div class="col-md-3 text-end">
                        <span class="badge bg-primary fs-6" id="contadorResultados">0 resultados</span>
                    </div>
                </div>
            </div>

            <div class="card card-custom p-0 overflow-auto">
                <table class="table table-hover align-middle mb-0" style="min-width: 1000px;">
                    <thead class="table-light">
                        <tr>
                            <th class="py-3 px-4">Usuário / CPF</th>
                            <th class="py-3">Empresa / Contatos</th>
                            <th class="py-3">Plano Atual / Acomodação</th>
                            <th class="py-3">Datas (Adesão/Canc.)</th>
                            <th class="py-3">Status CRM</th>
                            <th class="py-3 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="clientTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Modal Foto -->
<div class="modal fade" id="photoModal" tabindex="-1">
    <div class="modal-dialog modal-lg text-center">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Foto Anexada</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body"><img id="viewPhoto" src="" class="img-fluid rounded border"></div>
        </div>
    </div>
</div>

<!-- Modal Status -->
<div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Gerenciar Status</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <input type="text" id="newStatus" class="form-control" placeholder="Novo status...">
                    <button class="btn btn-primary" onclick="addStatus()">Adicionar</button>
                </div>
                <ul class="list-group" id="statusList"></ul>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ----------------------------------------------------
    // CONFIGURAÇÃO FIREBASE
    // ----------------------------------------------------
    const firebaseConfig = {
      apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
      authDomain: "crm-recuperacao.firebaseapp.com",
      projectId: "crm-recuperacao",
      storageBucket: "crm-recuperacao.firebasestorage.app",
      messagingSenderId: "347011763386",
      appId: "1:347011763386:web:158c1ca6f512a1cde1c683",
      measurementId: "G-1XHHFXHN4G"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // ----------------------------------------------------
    // ESTADO
    // ----------------------------------------------------
    let clients = [];
    let statuses = ['Em negociação', 'Entrou em contato', 'Fechou o plano', 'Não tem interesse'];
    const cardColors = ['#0A2463', '#3E92CC', '#25D366', '#DC3545', '#FFC107', '#6F42C1', '#17A2B8'];

    // ----------------------------------------------------
    // AUTENTICAÇÃO
    // ----------------------------------------------------
    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('userEmailDisplay').innerText = user.email;
            loadDataFromFirebase(); // Inicia a sincronização
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('userEmailDisplay').innerText = '';
        }
    });

    function login() {
        const e = document.getElementById('emailInput').value;
        const p = document.getElementById('passwordInput').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => {
            document.getElementById('loginError').innerText = "Erro ao entrar. Verifique os dados.";
        });
    }

    function register() {
        const e = document.getElementById('emailInput').value;
        const p = document.getElementById('passwordInput').value;
        if(p.length < 6) return alert("A senha deve ter pelo menos 6 caracteres.");
        auth.createUserWithEmailAndPassword(e, p).then(() => {
            alert("Conta criada com sucesso!");
        }).catch(err => {
            document.getElementById('loginError').innerText = err.message;
        });
    }

    function logout() { auth.signOut(); }

    // ----------------------------------------------------
    // SINCRONIZAÇÃO EM TEMPO REAL (FIRESTORE)
    // ----------------------------------------------------
    function loadDataFromFirebase() {
        // Escuta os clientes
        db.collection("clients").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            clients = [];
            snapshot.forEach((doc) => {
                clients.push({ id: doc.id, ...doc.data() });
            });
            renderTable();
            updateDashboard();
        });

        // Escuta as configurações de status
        db.collection("config").doc("statuses").onSnapshot((doc) => {
            if(doc.exists && doc.data().list) {
                statuses = doc.data().list;
            }
            updateStatusSelects();
            renderStatusList();
            updateDashboard();
        });
    }

    // ----------------------------------------------------
    // TEMA DARK
    // ----------------------------------------------------
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('crm_theme', isDark ? 'dark' : 'light');
        document.getElementById('themeBtn').innerHTML = isDark ? '<i class="bi bi-sun-fill text-warning"></i>' : '<i class="bi bi-moon-fill"></i>';
    }
    if(localStorage.getItem('crm_theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('themeBtn').innerHTML = '<i class="bi bi-sun-fill text-warning"></i>';
    }

    // ----------------------------------------------------
    // PREENCHIMENTO MÁGICO
    // ----------------------------------------------------
    function autoFillForm() {
        const text = document.getElementById('smartPasteBox').value;
        if(!text) return;

        const extract = (regex) => { const match = text.match(regex); return match ? match[1].trim() : ''; };

        document.getElementById('cNome').value = extract(/Nome(?: do usuário)?:\s*([^\n]+)/i);
        document.getElementById('cNomeSocial').value = extract(/Nome social:\s*([^\n]+)/i);
        document.getElementById('cCPF').value = extract(/CPF(?: do titular)?:\s*([^\n]+)/i);
        document.getElementById('cNascimento').value = extract(/Data de nascimento:\s*([^\n]+)/i);
        document.getElementById('cEndereco').value = extract(/Endereço:\s*([^\n]+)/i);
        
        let cidadeUf = extract(/Cidade\/Estado:\s*([^\n]+)/i);
        if (cidadeUf && cidadeUf.includes('-')) {
            let parts = cidadeUf.split('-');
            document.getElementById('cCidade').value = parts[0].trim();
            document.getElementById('cUF').value = parts[1].trim();
        } else {
            document.getElementById('cCidade').value = extract(/Cidade:\s*([^|\n]+)/i);
            document.getElementById('cUF').value = extract(/UF:\s*([^\n]+)/i) || extract(/Estado:\s*([^\n]+)/i);
        }

        document.getElementById('cEmpresa').value = extract(/Empresa(?: \(Vínculo PJ\))?:\s*([^\n]+)/i);
        document.getElementById('cTelefones').value = extract(/Telefones(?: cadastrado[s]?)?:\s*([^\n]+)/i) || extract(/Fone(?: \/ Número de telefone)?:\s*([^\n]+)/i);
        document.getElementById('cEmails').value = extract(/Endereços eletrônicos:\s*([^\n]+)/i) || extract(/E-mails:\s*([^\n]+)/i);
        document.getElementById('cRedePlano').value = extract(/Rede[\s/]plano:\s*([^\n]+)/i) || extract(/Plano Cancelado:\s*([^\n]+)/i);
        document.getElementById('cPlanoAtual').value = extract(/(?:Atual|Plano atual):\s*([^\n]+)/i);
        document.getElementById('cAcomodacao').value = extract(/Acomodação:\s*([^\n]+)/i);
        document.getElementById('cSituacao').value = extract(/Situação:\s*([^\n]+)/i);
        document.getElementById('cAdesao').value = extract(/Data da adesão:\s*([^\n]+)/i) || extract(/Adesão:\s*([^\n]+)/i);
        document.getElementById('cAdeEmp').value = extract(/Ade emp:\s*([^\n]+)/i);
        document.getElementById('cCancelamento').value = extract(/Data do cancelamento:\s*([^\n]+)/i);
        document.getElementById('cTempo').value = extract(/Tempo:\s*([^\n]+)/i);

        document.getElementById('smartPasteBox').value = '';
    }

    // ----------------------------------------------------
    // FUNÇÕES CRUD E UI
    // ----------------------------------------------------
    function updateDashboard() {
        const dashContainer = document.getElementById('dashboardCards');
        dashContainer.innerHTML = createDashCard('Total de Clientes', clients.length, '#343A40', 'bi-people-fill');
        statuses.forEach((status, index) => {
            const count = clients.filter(c => c.status === status).length;
            const color = cardColors[index % cardColors.length];
            let icon = 'bi-funnel-fill';
            if(status.toLowerCase().includes('fechou')) icon = 'bi-check-circle-fill';
            if(status.toLowerCase().includes('negociação')) icon = 'bi-chat-dots-fill';
            if(status.toLowerCase().includes('não')) icon = 'bi-x-circle-fill';
            dashContainer.innerHTML += createDashCard(status, count, color, icon);
        });
    }
    function createDashCard(title, count, color, icon) {
        return `<div class="col-md-3 col-sm-6"><div class="dash-card d-flex justify-content-between align-items-center border-0" style="background-color: ${color};">
                <div><h6 class="text-uppercase mb-1 opacity-75" style="font-size: 0.8rem;">${title}</h6><h2 class="mb-0 fw-bold">${count}</h2></div>
                <div class="dash-icon"><i class="bi ${icon}"></i></div></div></div>`;
    }

    function updateStatusSelects() {
        const filterSelect = document.getElementById('filterStatus');
        const formSelect = document.getElementById('cStatus');
        filterSelect.innerHTML = '<option value="ALL">Filtro: Todos os Status</option>';
        statuses.forEach(s => filterSelect.innerHTML += `<option value="${s}">${s}</option>`);
        formSelect.innerHTML = '';
        statuses.forEach(s => formSelect.innerHTML += `<option value="${s}">${s}</option>`);
    }

    function addStatus() { 
        const val = document.getElementById('newStatus').value.trim(); 
        if(val && !statuses.includes(val)) { 
            const newStatuses = [...statuses, val];
            db.collection("config").doc("statuses").set({ list: newStatuses });
            document.getElementById('newStatus').value = ''; 
        } 
    }
    
    function deleteStatus(index) { 
        const newStatuses = [...statuses];
        newStatuses.splice(index, 1);
        db.collection("config").doc("statuses").set({ list: newStatuses });
    }
    
    function renderStatusList() { 
        const list = document.getElementById('statusList'); list.innerHTML = ''; 
        statuses.forEach((s, i) => { list.innerHTML += `<li class="list-group-item d-flex justify-content-between align-items-center bg-transparent text-inherit border-secondary">${s} <button class="btn btn-sm btn-danger" onclick="deleteStatus(${i})"><i class="bi bi-trash"></i></button></li>`; }); 
    }

    function resetForm() {
        document.getElementById('clientForm').reset();
        document.getElementById('clientId').value = '';
        document.getElementById('fotoPreview').style.display = 'none';
        document.getElementById('cFotoBase64').value = '';
        document.getElementById('smartPasteBox').value = '';
        document.getElementById('formTitle').innerText = 'Adicionar Novo Cliente';
    }

    function editClient(id) {
        const c = clients.find(c => c.id === id); if (!c) return;
        document.getElementById('clientId').value = c.id;
        document.getElementById('cNome').value = c.nome || '';
        document.getElementById('cNomeSocial').value = c.nomeSocial || '';
        document.getElementById('cCPF').value = c.cpf || '';
        document.getElementById('cNascimento').value = c.nascimento || '';
        document.getElementById('cEndereco').value = c.endereco || '';
        document.getElementById('cCidade').value = c.cidade || '';
        document.getElementById('cUF').value = c.uf || '';
        document.getElementById('cTelefones').value = c.telefones || '';
        document.getElementById('cEmails').value = c.emails || '';
        document.getElementById('cEmpresa').value = c.empresa || '';
        document.getElementById('cRedePlano').value = c.redePlano || '';
        document.getElementById('cPlanoAtual').value = c.planoAtual || '';
        document.getElementById('cAcomodacao').value = c.acomodacao || '';
        document.getElementById('cSituacao').value = c.situacao || '';
        document.getElementById('cAdesao').value = c.adesao || '';
        document.getElementById('cAdeEmp').value = c.adeEmp || '';
        document.getElementById('cCancelamento').value = c.cancelamento || '';
        document.getElementById('cTempo').value = c.tempo || '';
        document.getElementById('cStatus').value = c.status || statuses[0];

        if (c.foto) { document.getElementById('fotoPreview').src = c.foto; document.getElementById('fotoPreview').style.display = 'block'; document.getElementById('cFotoBase64').value = c.foto; } 
        else { document.getElementById('fotoPreview').style.display = 'none'; document.getElementById('cFotoBase64').value = ''; }
        
        document.getElementById('formTitle').innerText = 'Editando Ficha do Cliente';
        bootstrap.Tab.getOrCreateInstance(document.querySelector('#tab-cadastro')).show();
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) { const reader = new FileReader(); reader.onload = function(e) { document.getElementById('fotoPreview').src = e.target.result; document.getElementById('fotoPreview').style.display = 'block'; document.getElementById('cFotoBase64').value = e.target.result; }; reader.readAsDataURL(file); }
    }

    function saveClient() {
        const id = document.getElementById('clientId').value || db.collection('clients').doc().id;
        const nome = document.getElementById('cNome').value;
        if(!nome) { alert("O Nome do usuário é obrigatório."); return; }

        const client = { 
            nome, 
            nomeSocial: document.getElementById('cNomeSocial').value, 
            cpf: document.getElementById('cCPF').value, 
            nascimento: document.getElementById('cNascimento').value, 
            endereco: document.getElementById('cEndereco').value, 
            cidade: document.getElementById('cCidade').value, 
            uf: document.getElementById('cUF').value, 
            telefones: document.getElementById('cTelefones').value, 
            emails: document.getElementById('cEmails').value, 
            empresa: document.getElementById('cEmpresa').value, 
            redePlano: document.getElementById('cRedePlano').value, 
            planoAtual: document.getElementById('cPlanoAtual').value, 
            acomodacao: document.getElementById('cAcomodacao').value, 
            situacao: document.getElementById('cSituacao').value, 
            adesao: document.getElementById('cAdesao').value, 
            adeEmp: document.getElementById('cAdeEmp').value, 
            cancelamento: document.getElementById('cCancelamento').value, 
            tempo: document.getElementById('cTempo').value, 
            status: document.getElementById('cStatus').value, 
            foto: document.getElementById('cFotoBase64').value,
            createdAt: document.getElementById('clientId').value ? firebase.firestore.FieldValue.serverTimestamp() : new Date() // Mantem a ordem
        };

        const btn = document.querySelector('button[onclick="saveClient()"]');
        btn.disabled = true;
        btn.innerHTML = 'Salvando na Nuvem...';

        db.collection("clients").doc(id).set(client, { merge: true }).then(() => {
            resetForm();
            bootstrap.Tab.getOrCreateInstance(document.querySelector('#tab-pesquisa')).show();
        }).catch(err => alert("Erro ao salvar: " + err.message))
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-cloud-arrow-up-fill me-2"></i>Salvar na Nuvem';
        });
    }

    function deleteClient(id) { 
        if(confirm("Tem certeza que deseja apagar a ficha definitivamente na nuvem?")) { 
            db.collection("clients").doc(id).delete();
        } 
    }
    
    function changeClientStatus(id, newStatus) { 
        db.collection("clients").doc(id).update({ status: newStatus });
    }
    
    function showPhoto(base64) { 
        document.getElementById('viewPhoto').src = base64; 
        new bootstrap.Modal(document.getElementById('photoModal')).show(); 
    }

    function renderTable() {
        const tbody = document.getElementById('clientTableBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filter = document.getElementById('filterStatus').value;
        tbody.innerHTML = '';
        
        const filtered = clients.filter(c => { 
            const matchesSearch = Object.values(c).join(' ').toLowerCase().includes(search); 
            const matchesStatus = filter === 'ALL' || c.status === filter; 
            return matchesSearch && matchesStatus; 
        });
        
        document.getElementById('contadorResultados').innerText = `${filtered.length} resultado(s)`;
        
        filtered.forEach(c => {
            let statusOptions = statuses.map(s => `<option value="${s}" ${c.status === s ? 'selected' : ''}>${s}</option>`).join('');
            let photoBtn = c.foto ? `<button class="btn btn-sm btn-info text-white me-1" onclick="showPhoto('${c.foto}')" title="Ver Anexo"><i class="bi bi-image"></i></button>` : '';
            tbody.innerHTML += `<tr>
                <td class="px-4"><strong>${c.nome}</strong><br><small class="text-muted">CPF: ${c.cpf || '-'}</small></td>
                <td>${c.empresa || '-'}<br><small class="text-muted"><i class="bi bi-telephone"></i> ${c.telefones || '-'}</small></td>
                <td><span class="badge bg-secondary">${c.planoAtual || c.redePlano || '-'}</span><br><small class="text-muted">${c.acomodacao || '-'}</small></td>
                <td><small>Adesão: ${c.adesao || '-'}</small><br><small class="text-danger fw-bold">Canc: ${c.cancelamento || '-'}</small></td>
                <td><select class="form-select form-select-sm border-primary" style="font-weight: 600;" onchange="changeClientStatus('${c.id}', this.value)">${statusOptions}</select></td>
                <td class="text-center"><div class="d-inline-flex">${photoBtn}<button class="btn btn-sm btn-warning text-dark me-1" onclick="editClient('${c.id}')"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-danger" onclick="deleteClient('${c.id}')"><i class="bi bi-trash"></i></button></div></td>
            </tr>`;
        });
    }
</script>
</body>
</html>
