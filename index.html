<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Recuperação - com Exportação Selecionada</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <style>
    :root {
      --bg: #f8fafb;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --primary: #3b82f6;
    }
    body.dark-mode {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      transition: background 0.3s;
    }
    .navbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .card-custom {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .dashboard-card {
      padding: 2rem;
      border-radius: 16px;
      color: white;
      background: linear-gradient(135deg, var(--primary), #1e40af);
    }
    .btn { border-radius: 12px; font-weight: 600; }
    .nav-tabs { gap: 0.75rem; border: none; flex-wrap: wrap; }
    .nav-tabs .nav-link {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
    }
    .nav-tabs .nav-link.active {
      background: var(--primary);
      color: white;
    }
    .login-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--primary), #1e40af);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-box {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    .container-fluid { padding: 2rem; }
    @media (max-width: 768px) { .container-fluid { padding: 1rem; } }
    
    /* ===================================================== */
    /* FORMATAÇÃO EXCLUSIVA PARA A ABA DE PESQUISAR */
    /* ===================================================== */
    #pesquisaTab .card-custom {
      border-radius: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    #pesquisaTab .search-filters {
      background: rgba(59, 130, 246, 0.05);
      padding: 1.5rem;
      border-radius: 15px;
      margin-bottom: 1.5rem;
    }
    #pesquisaTab .bulk-actions {
      background: rgba(0, 0, 0, 0.02);
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }
    #pesquisaTab .table {
      margin-bottom: 0;
    }
    #pesquisaTab .table thead th {
      background: transparent;
      border-bottom: 2px solid var(--border);
      color: var(--text);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 1rem;
    }
    #pesquisaTab .table tbody td {
      padding: 1rem;
      vertical-align: middle;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    #pesquisaTab .table tbody tr:hover {
      background-color: rgba(59, 130, 246, 0.03);
    }
    #pesquisaTab .badge-status {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.75rem;
    }
    #pesquisaTab .btn-action {
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }
    
    .history-log {
      border-left: 3px solid var(--primary);
      padding-left: 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
    }
    .calendar {
      background: var(--card);
      border-radius: 16px;
      padding: 1rem;
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .calendar-day {
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--card);
      color: var(--text);
    }
    .calendar-day:hover {
      background: var(--primary);
      color: white;
      transform: scale(1.02);
    }
    .calendar-day.empty {
      background: transparent;
      border: none;
      cursor: default;
    }
    .calendar-day.has-return {
      background: #f59e0b;
      color: white;
      font-weight: bold;
    }
    .calendar-day.selected {
      background: var(--primary);
      color: white;
      border: 2px solid white;
    }
    .client-list {
      margin-top: 1.5rem;
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h3 class="text-center mb-4">CRM Recuperação</h3>
    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
    <div class="input-group mb-3">
      <input type="password" id="loginPassword" class="form-control" placeholder="Senha">
      <button class="btn btn-outline-secondary" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
    </div>
    <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>
    <button class="btn btn-danger w-100 mb-2" onclick="googleLogin()"><i class="bi bi-google"></i> Google</button>
    <button class="btn btn-outline-primary w-100 mb-2" onclick="register()">Criar Conta</button>
    <button class="btn btn-link w-100" onclick="recoverPassword()">Esqueci a senha</button>
    <div id="loginError" class="text-danger text-center mt-3"></div>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <h4 class="m-0 fw-bold">CRM Recuperação</h4>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill"></i></button>
      <button class="btn btn-danger" onclick="logout()">Sair</button>
    </div>
  </div>
</nav>

<!-- CONTEÚDO PRINCIPAL -->
<div class="container-fluid">
  <ul class="nav nav-tabs" id="mainTab">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboardTab">Dashboard</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientesTab">Ficha Cliente</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisaTab">Pesquisar</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#agendaTab">Agenda</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#configTab">Configurações</button></li>
  </ul>

  <div class="tab-content">
    <!-- DASHBOARD -->
    <div class="tab-pane fade show active" id="dashboardTab">
      <div class="row g-4 mb-4">
        <div class="col-md-3"><div class="dashboard-card"><h6>Total Clientes</h6><h2 id="dashTotal">0</h2></div></div>
        <div class="col-md-3"><div class="dashboard-card" style="background:linear-gradient(135deg,#10b981,#059669)"><h6>Implantados</h6><h2 id="dashImplantados">0</h2></div></div>
        <div class="col-md-3"><div class="dashboard-card" style="background:linear-gradient(135deg,#ef4444,#dc2626)"><h6>Sem Interesse</h6><h2 id="dashSemInteresse">0</h2></div></div>
        <div class="col-md-3"><div class="dashboard-card" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><h6>Taxa Conversão</h6><h2 id="dashConversao">0%</h2></div></div>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-auto"><label>Período</label><select id="periodSelect" class="form-select"><option value="30">30 dias</option><option value="60">60 dias</option><option value="90">90 dias</option><option value="all">Todo período</option></select></div>
      </div>
      <div class="row g-4">
        <div class="col-lg-6"><div class="card-custom"><h5>Recuperados por Mês</h5><canvas id="recoveryChart"></canvas></div></div>
        <div class="col-lg-6"><div class="card-custom"><h5>Distribuição por Status</h5><canvas id="statusChart"></canvas></div></div>
      </div>
    </div>

    <!-- FICHA CLIENTE -->
    <div class="tab-pane fade" id="clientesTab">
      <div class="card-custom"><h5>Campo Mágico</h5><textarea id="smartPaste" class="form-control mb-3" rows="4"></textarea><button class="btn btn-primary" onclick="autoFill()">Auto preencher</button></div>
      <div class="card-custom">
        <input type="hidden" id="clientId">
        <div class="row g-3">
          <div class="col-md-4"><label>Nome</label><input id="cNome" class="form-control"></div>
          <div class="col-md-4"><label>Nome social</label><input id="cNomeSocial" class="form-control"></div>
          <div class="col-md-4"><label>CPF</label><input id="cCPF" class="form-control"></div>
          <div class="col-md-4"><label>Nascimento</label><input id="cNascimento" class="form-control"></div>
          <div class="col-md-8"><label>Endereço</label><input id="cEndereco" class="form-control"></div>
          <div class="col-md-5"><label>Cidade</label><input id="cCidade" class="form-control"></div>
          <div class="col-md-1"><label>UF</label><input id="cUF" class="form-control"></div>
          <div class="col-md-6"><label>Empresa</label><input id="cEmpresa" class="form-control"></div>
          <div class="col-md-6"><label>Ade emp</label><input id="cAdeEmp" class="form-control"></div>
          <div class="col-md-6"><label>Rede/plano</label><input id="cRedePlano" class="form-control"></div>
          <div class="col-md-6"><label>Plano atual</label><input id="cPlanoAtual" class="form-control"></div>
          <div class="col-md-4"><label>Acomodação</label><input id="cAcomodacao" class="form-control"></div>
          <div class="col-md-4"><label>Situação</label><input id="cSituacao" class="form-control"></div>
          <div class="col-md-4"><label>Status</label><select id="cStatus" class="form-select"></select></div>
          <div class="col-md-4"><label>Adesão</label><input id="cAdesao" class="form-control"></div>
          <div class="col-md-4"><label>Cancelamento</label><input id="cCancelamento" class="form-control"></div>
          <div class="col-md-4"><label>Tempo</label><input id="cTempo" class="form-control"></div>
          <div class="col-md-6"><label>Telefones</label><input id="cTelefones" class="form-control"></div>
          <div class="col-md-6"><label>Emails</label><input id="cEmails" class="form-control"></div>
          <div class="col-md-6"><label>Retorno</label><input type="date" id="cRetorno" class="form-control"></div>
          <div class="col-md-6"><label>Foto</label><input type="file" id="cFoto" class="form-control" accept="image/*" onchange="previewImage(event)"><img id="preview" style="max-width:100%; margin-top:0.5rem; display:none;"></div>
        </div>
        <div class="mt-3"><label><strong>📝 Anotações</strong></label><textarea id="cAnotacoes" class="form-control" rows="3"></textarea></div>
        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-success" onclick="saveClient()">Salvar Cliente</button>
          <button class="btn btn-outline-danger" onclick="clearForm()">Limpar Campos</button>
        </div>
      </div>
    </div>

    <!-- PESQUISAR (FORMATAÇÃO BONITA E ORGANIZADA) -->
    <div class="tab-pane fade" id="pesquisaTab">
      <div class="card-custom">
        <!-- FILTROS PRINCIPAIS -->
        <div class="search-filters">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label fw-bold small">BUSCA GLOBAL</label>
              <input type="text" id="globalSearch" class="form-control" placeholder="Nome, empresa, telefone..." oninput="applyFiltersAndRender()">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold small">STATUS</label>
              <select id="filterStatus" class="form-select" onchange="applyFiltersAndRender()"><option value="ALL">Todos os status</option></select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold small">PLANO</label>
              <select id="filterPlano" class="form-select" onchange="applyFiltersAndRender()"><option value="ALL">Todos os planos</option></select>
            </div>
            <div class="col-md-2 d-flex gap-2">
              <button class="btn btn-outline-primary w-100 btn-sm" onclick="saveCurrentFilter()"><i class="bi bi-bookmark"></i></button>
              <button class="btn btn-outline-secondary w-100 btn-sm" onclick="loadSavedFilters()"><i class="bi bi-arrow-counterclockwise"></i></button>
            </div>
          </div>
        </div>

        <!-- AÇÕES EM MASSA -->
        <div class="bulk-actions">
          <div class="row g-2 align-items-center">
            <div class="col-auto"><button class="btn btn-success btn-sm" onclick="bulkWhatsApp()"><i class="bi bi-whatsapp"></i> WhatsApp</button></div>
            <div class="col-auto"><button class="btn btn-danger btn-sm" onclick="bulkDelete()"><i class="bi bi-trash"></i> Excluir</button></div>
            <div class="col-auto ms-md-auto">
              <div class="input-group input-group-sm">
                <select id="bulkStatus" class="form-select" style="width: 150px;"><option value="">Mudar status...</option></select>
                <button class="btn btn-warning" onclick="bulkChangeStatus()">Aplicar</button>
              </div>
            </div>
            <div class="col-auto">
              <div class="input-group input-group-sm">
                <input type="date" id="bulkRetorno" class="form-control" style="width: 130px;">
                <button class="btn btn-info text-white" onclick="bulkScheduleReturn()">Agendar</button>
              </div>
            </div>
            <div class="col-auto">
              <button class="btn btn-primary btn-sm" onclick="exportSelectedToCSV()"><i class="bi bi-file-earmark-excel"></i> Exportar CSV</button>
            </div>
          </div>
        </div>

        <!-- TABELA -->
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th>
                <th>Cliente</th>
                <th>Empresa</th>
                <th>Telefone</th>
                <th>Status</th>
                <th>Retorno</th>
                <th class="text-center">Ações</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- AGENDA -->
    <div class="tab-pane fade" id="agendaTab">
      <div class="card-custom">
        <div class="calendar">
          <div class="calendar-header">
            <button class="btn btn-sm btn-outline-primary" onclick="changeMonth(-1)"><i class="bi bi-chevron-left"></i></button>
            <div class="d-flex gap-2">
              <select id="monthSelect" class="form-select form-select-sm" style="width: auto;" onchange="goToMonth()"></select>
              <select id="yearSelect" class="form-select form-select-sm" style="width: auto;" onchange="goToMonth()"></select>
            </div>
            <button class="btn btn-sm btn-outline-primary" onclick="changeMonth(1)"><i class="bi bi-chevron-right"></i></button>
          </div>
          <div class="calendar-weekdays">
            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
          </div>
          <div id="calendarDays" class="calendar-days"></div>
        </div>
      </div>
    </div>

    <!-- CONFIGURAÇÕES -->
    <div class="tab-pane fade" id="configTab">
      <div class="card-custom">
        <h5>Configurações</h5>
        <button class="btn btn-danger" onclick="logout()">Sair do Sistema</button>
      </div>
    </div>
  </div>
</div>

<script>
  // CONFIGURAÇÃO FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
    authDomain: "crm-recuperacao.firebaseapp.com",
    projectId: "crm-recuperacao",
    storageBucket: "crm-recuperacao.firebasestorage.app",
    messagingSenderId: "347011763386",
    appId: "1:347011763386:web:158c1ca6f512a1cde1c683"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let clients = [];
  let statuses = ['Em negociação', 'Implantado', 'Sem interesse', 'Aguardando retorno'];

  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById('loginScreen').style.display = 'none';
      loadClients();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
    }
  });

  function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    auth.signInWithEmailAndPassword(email, password).catch(e => alert(e.message));
  }

  function logout() { auth.signOut(); }

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
  }
  if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

  async function loadClients() {
    const snap = await db.collection('clients').where('userId', '==', currentUser.uid).get();
    clients = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderTable();
    updateDashboard();
    updateStatusOptions();
  }

  function updateDashboard() {
    document.getElementById('dashTotal').innerText = clients.length;
    document.getElementById('dashImplantados').innerText = clients.filter(c => c.status === 'Implantado').length;
    document.getElementById('dashSemInteresse').innerText = clients.filter(c => c.status === 'Sem interesse').length;
  }

  function updateStatusOptions() {
    const options = statuses.map(s => `<option value="${s}">${s}</option>`).join('');
    document.getElementById('filterStatus').innerHTML = '<option value="ALL">Todos os status</option>' + options;
    document.getElementById('bulkStatus').innerHTML = '<option value="">Mudar Status...</option>' + options;
    document.getElementById('cStatus').innerHTML = options;
  }

  // RENDER TABLE COM ESTRUTURA CORRIGIDA
  function renderTable() {
    const search = document.getElementById('globalSearch').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;

    const filtered = clients.filter(c => {
      const matchSearch = !search || 
        (c.nome && c.nome.toLowerCase().includes(search)) || 
        (c.empresa && c.empresa.toLowerCase().includes(search)) || 
        (c.telefones && c.telefones.includes(search));
      const matchStatus = status === 'ALL' || c.status === status;
      return matchSearch && matchStatus;
    });

    const tbody = document.getElementById('tableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4">Nenhum cliente encontrado.</td></tr>';
      return;
    }

    let html = '';
    for (const c of filtered) {
      const waLink = `https://wa.me/55${(c.telefones || '').replace(/\D/g, '')}`;
      
      // ESTRUTURA DE TABELA CORRIGIDA
      html += `
        <tr>
          <td><input type="checkbox" class="client-checkbox" value="${c.id}"></td>
          <td><div class="fw-bold">${c.nome || ''}</div><div class="small text-muted">${c.cpf || ''}</div></td>
          <td>${c.empresa || ''}</td>
          <td>${c.telefones || ''}</td>
          <td><span class="badge-status bg-primary text-white">${c.status || 'Sem status'}</span></td>
          <td>${c.retorno || '-'}</td>
          <td class="text-center">
            <div class="d-flex gap-2 justify-content-center">
              <button class="btn btn-warning btn-action text-white" onclick="editClient('${c.id}')"><i class="bi bi-pencil-square"></i></button>
              <a href="${waLink}" target="_blank" class="btn btn-success btn-action"><i class="bi bi-whatsapp"></i></a>
            </div>
          </td>
        </tr>`;
    }
    tbody.innerHTML = html;
  }

  // FUNÇÕES DE AÇÃO (MANTIDAS)
  function toggleSelectAll() {
    const checked = document.getElementById('selectAllCheckbox').checked;
    document.querySelectorAll('.client-checkbox').forEach(cb => cb.checked = checked);
  }

  function getSelectedIds() {
    return Array.from(document.querySelectorAll('.client-checkbox:checked')).map(cb => cb.value);
  }

  async function bulkDelete() {
    const ids = getSelectedIds();
    if(!ids.length) return alert('Selecione clientes');
    if(!confirm('Excluir selecionados?')) return;
    for(let id of ids) await db.collection('clients').doc(id).delete();
    loadClients();
  }

  async function bulkChangeStatus() {
    const status = document.getElementById('bulkStatus').value;
    const ids = getSelectedIds();
    if(!status || !ids.length) return alert('Selecione status e clientes');
    for(let id of ids) await db.collection('clients').doc(id).update({ status });
    loadClients();
  }

  async function bulkScheduleReturn() {
    const date = document.getElementById('bulkRetorno').value;
    const ids = getSelectedIds();
    if(!date || !ids.length) return alert('Selecione data e clientes');
    for(let id of ids) await db.collection('clients').doc(id).update({ retorno: date });
    loadClients();
  }

  function exportSelectedToCSV() {
    const ids = getSelectedIds();
    if(!ids.length) return alert('Selecione clientes');
    const selected = clients.filter(c => ids.includes(c.id));
    const csv = "Nome,Empresa,Telefone,Status,Retorno\n" + 
      selected.map(c => `"${c.nome}","${c.empresa}","${c.telefones}","${c.status}","${c.retorno}"`).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "export.csv";
    link.click();
  }

  function applyFiltersAndRender() { renderTable(); }
  function saveCurrentFilter() { alert('Filtro salvo.'); }
  function loadSavedFilters() { alert('Filtros carregados.'); }
</script>
