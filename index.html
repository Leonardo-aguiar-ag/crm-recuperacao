<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Recuperação Premium</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

:root{

--primary:#2563eb;
--primary2:#4f46e5;

--success:#22c55e;
--danger:#ef4444;
--warning:#f59e0b;

--bg:#eef2ff;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#dbe4ee;

--shadow:
0 10px 35px rgba(0,0,0,.08);
}

body.dark-mode{

--bg:#020617;
--card:#0f172a;
--text:#f8fafc;
--muted:#94a3b8;
--border:#1e293b;
}

body{

background:var(--bg);
color:var(--text);

font-family:
Segoe UI,
sans-serif;

transition:.3s;
}

/* NAVBAR */

.navbar-custom{

background:
linear-gradient(
135deg,
#0f172a,
#1e293b
);
}

/* CARD */

.card-custom{

background:var(--card);

border:
1px solid var(--border);

border-radius:24px;

box-shadow:var(--shadow);
}

/* LOGIN */

#loginOverlay{

position:fixed;
inset:0;

background:
linear-gradient(
135deg,
#0f172a,
#111827
);

display:flex;
justify-content:center;
align-items:center;

z-index:9999;
}

.login-box{

background:
rgba(15,23,42,.95);

padding:40px;

border-radius:30px;

width:100%;
max-width:420px;

border:
1px solid rgba(255,255,255,.05);

box-shadow:
0 20px 40px rgba(0,0,0,.4);
}

.login-box h3{

color:white;
}

.login-box .form-control{

background:#020617!important;

border:
1px solid #1e293b!important;

color:white!important;
}

/* INPUT */

.form-control,
.form-select{

background:var(--card)!important;

border:
1px solid var(--border)!important;

color:var(--text)!important;

border-radius:14px;

padding:12px;
}

.form-control:focus,
.form-select:focus{

border-color:
var(--primary)!important;

box-shadow:
0 0 0 4px rgba(37,99,235,.15)!important;
}

/* BUTTON */

.btn{

border-radius:14px;

font-weight:700;
}

/* TABS */

.nav-tabs{

border:none;
gap:10px;
}

.nav-tabs .nav-link{

border:none;

border-radius:14px;

padding:12px 18px;

font-weight:700;

color:var(--muted);
}

.nav-tabs .nav-link.active{

background:
linear-gradient(
135deg,
var(--primary),
var(--primary2)
);

color:white;
}

/* DASH */

.dash-card{

padding:24px;

border-radius:24px;

color:white;

overflow:hidden;

position:relative;
}

.dash-card h2{

font-size:2rem;
font-weight:800;
}

.dash-icon{

font-size:3rem;
opacity:.2;
}

/* TABLE */

.table{

color:var(--text)!important;
}

.table th,
.table td{

border-color:
var(--border)!important;
}

.table-hover tbody tr:hover{

background:
rgba(37,99,235,.06);
}

/* TITLES */

.section-title{

font-size:1rem;

font-weight:800;

color:var(--primary);

margin-top:35px;
margin-bottom:20px;

padding-bottom:10px;

border-bottom:
1px solid var(--border);
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginOverlay">

<div class="login-box">

<h3 class="fw-bold text-center mb-4">

<i class="bi bi-shield-lock-fill me-2"></i>

CRM Login

</h3>

<div class="mb-3">

<label class="form-label text-light">
E-mail
</label>

<input
type="email"
id="emailInput"
class="form-control"
placeholder="Digite seu e-mail"
>

</div>

<div class="mb-2">

<label class="form-label text-light">
Senha
</label>

<div class="input-group">

<input
type="password"
id="passwordInput"
class="form-control"
placeholder="Digite sua senha"
>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword()"
>

<i
class="bi bi-eye-fill"
id="eyeIcon"
></i>

</button>

</div>

</div>

<div class="text-end mb-4">

<a
href="#"
onclick="recoverPassword(); return false;"
style="
color:#60a5fa;
font-size:14px;
text-decoration:none;
font-weight:700;
"
>

<i class="bi bi-key-fill me-1"></i>

Esqueci minha senha

</a>

</div>

<button
class="btn btn-primary w-100 mb-3"
onclick="login()"
>

<i class="bi bi-box-arrow-in-right me-2"></i>

Entrar

</button>

<button
class="btn btn-outline-light w-100"
onclick="register()"
>

<i class="bi bi-person-plus-fill me-2"></i>

Criar Conta

</button>

<div
id="loginError"
class="mt-4 text-center fw-bold"
></div>

</div>

</div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">

<div class="container-fluid">

<span class="navbar-brand fw-bold">

<i class="bi bi-shield-check me-2"></i>

CRM Recuperação Premium

</span>

<div class="d-flex gap-2">

<button
class="btn btn-outline-light btn-sm"
onclick="toggleTheme()"
>

<i class="bi bi-moon-stars-fill"></i>

</button>

<button
class="btn btn-danger btn-sm"
onclick="logout()"
>

<i class="bi bi-box-arrow-right"></i>

</button>

</div>

</div>

</nav>

<div class="container-fluid px-4 pb-5">

<ul class="nav nav-tabs mb-4">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboard">
<i class="bi bi-bar-chart-fill me-2"></i>
Dashboard
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientes">
<i class="bi bi-person-vcard-fill me-2"></i>
Clientes
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisa">
<i class="bi bi-search me-2"></i>
Pesquisar
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#agenda">
<i class="bi bi-calendar-check-fill me-2"></i>
Agenda
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#config">
<i class="bi bi-gear-fill me-2"></i>
Configurações
</button>
</li>

</ul>

<div class="tab-content">

<!-- DASHBOARD -->

<div class="tab-pane fade show active" id="dashboard">

<div class="row g-4 mb-4">

<div class="col-md-3">
<div class="dash-card" style="background:linear-gradient(135deg,#2563eb,#4f46e5)">
<div class="d-flex justify-content-between">
<div>
<small>Total Clientes</small>
<h2 id="totalClientes">0</h2>
</div>
<div class="dash-icon">
<i class="bi bi-people-fill"></i>
</div>
</div>
</div>
</div>

<div class="col-md-3">
<div class="dash-card" style="background:linear-gradient(135deg,#16a34a,#22c55e)">
<div class="d-flex justify-content-between">
<div>
<small>Fechados</small>
<h2 id="fechados">0</h2>
</div>
<div class="dash-icon">
<i class="bi bi-check-circle-fill"></i>
</div>
</div>
</div>
</div>

<div class="col-md-3">
<div class="dash-card" style="background:linear-gradient(135deg,#f59e0b,#f97316)">
<div class="d-flex justify-content-between">
<div>
<small>Negociação</small>
<h2 id="negociacao">0</h2>
</div>
<div class="dash-icon">
<i class="bi bi-chat-dots-fill"></i>
</div>
</div>
</div>
</div>

<div class="col-md-3">
<div class="dash-card" style="background:linear-gradient(135deg,#ef4444,#dc2626)">
<div class="d-flex justify-content-between">
<div>
<small>Sem Interesse</small>
<h2 id="semInteresse">0</h2>
</div>
<div class="dash-icon">
<i class="bi bi-x-circle-fill"></i>
</div>
</div>
</div>
</div>

</div>

<div class="card card-custom p-4">
<canvas id="crmChart" height="100"></canvas>
</div>

</div>

<!-- CLIENTES -->

<div class="tab-pane fade" id="clientes">

<div class="card card-custom p-4">

<!-- PREENCHIMENTO MÁGICO -->

<div class="card card-custom p-4 mb-4">

<div class="d-flex align-items-center mb-3">

<div
class="me-3 d-flex align-items-center justify-content-center"
style="
width:55px;
height:55px;
border-radius:18px;
background:linear-gradient(135deg,#f59e0b,#f97316);
color:white;
font-size:24px;
box-shadow:0 10px 25px rgba(245,158,11,.25);
"
>
<i class="bi bi-lightning-charge-fill"></i>
</div>

<div>

<h5 class="fw-bold mb-1">
Preenchimento Mágico
</h5>

<small style="color:var(--muted);">
Cole o texto do PDF para preencher automaticamente a ficha
</small>

</div>

</div>

<div class="row g-3">

<div class="col-lg-10">

<textarea
id="smartPasteBox"
class="form-control"
rows="4"
placeholder="Cole aqui o texto inteiro do PDF do cliente..."
style="
resize:none;
font-size:15px;
border-radius:18px;
padding:18px;
"
></textarea>

</div>

<div class="col-lg-2 d-grid">

<button
type="button"
class="btn btn-primary fw-bold"
onclick="autoFillForm()"
style="
border-radius:18px;
font-size:18px;
background:linear-gradient(135deg,#2563eb,#4f46e5);
border:none;
box-shadow:0 10px 25px rgba(37,99,235,.25);
"
>

<i class="bi bi-stars me-2"></i>

Auto-preencher

</button>

</div>

</div>

</div>

<form id="clientForm">

<div class="section-title">
Dados do Cliente
</div>

<div class="row g-4">

<div class="col-md-4">
<label>Nome do usuário</label>
<input type="text" id="cNome" class="form-control">
</div>

<div class="col-md-4">
<label>Nome social</label>
<input type="text" id="cNomeSocial" class="form-control">
</div>

<div class="col-md-4">
<label>CPF do titular</label>
<input type="text" id="cCPF" class="form-control">
</div>

<div class="col-md-3">
<label>Data de nascimento</label>
<input type="text" id="cNascimento" class="form-control">
</div>

<div class="col-md-5">
<label>Endereço</label>
<input type="text" id="cEndereco" class="form-control">
</div>

<div class="col-md-3">
<label>Cidade</label>
<input type="text" id="cCidade" class="form-control">
</div>

<div class="col-md-1">
<label>UF</label>
<input type="text" id="cUF" class="form-control">
</div>

<div class="col-md-6">
<label>Empresa</label>
<input type="text" id="cEmpresa" class="form-control">
</div>

<div class="col-md-3">
<label>Ade emp</label>
<input type="text" id="cAdeEmp" class="form-control">
</div>

<div class="col-md-3">
<label>Rede/plano</label>
<input type="text" id="cRedePlano" class="form-control">
</div>

<div class="col-md-4">
<label>Plano atual</label>
<input type="text" id="cPlanoAtual" class="form-control">
</div>

<div class="col-md-4">
<label>Acomodação</label>
<input type="text" id="cAcomodacao" class="form-control">
</div>

<div class="col-md-4">
<label>Situação</label>
<input type="text" id="cSituacao" class="form-control">
</div>

<div class="col-md-3">
<label>Data da adesão</label>
<input type="text" id="cAdesao" class="form-control">
</div>

<div class="col-md-3">
<label>Data do cancelamento</label>
<input type="text" id="cCancelamento" class="form-control">
</div>

<div class="col-md-3">
<label>Tempo</label>
<input type="text" id="cTempo" class="form-control">
</div>

<div class="col-md-3">
<label>Data para retorno</label>
<input type="date" id="cRetorno" class="form-control">
</div>

<div class="col-md-6">
<label>Telefones cadastrados</label>
<input type="text" id="cTelefones" class="form-control">
</div>

<div class="col-md-6">
<label>Endereços eletrônicos</label>
<input type="text" id="cEmails" class="form-control">
</div>

<div class="col-md-4">

<label>Status</label>

<select id="cStatus" class="form-select">

<option>Em negociação</option>
<option>Fechou o plano</option>
<option>Entrou em contato</option>
<option>Não tem interesse</option>

</select>

</div>

</div>

<div class="text-end mt-5">

<button
type="button"
class="btn btn-success px-5"
onclick="saveClient()"
>

Salvar Cliente

</button>

</div>

</form>

</div>

</div>

</div>

</div>

<script>

function autoFillForm(){

const text =
document
.getElementById('smartPasteBox')
.value;

if(!text){

alert(
'Cole o texto do PDF primeiro.'
);

return;
}

const extract = (regex)=>{

const match =
text.match(regex);

return match ?
match[1].trim() :
'';
};

cNome.value =
extract(/Nome(?: do usuário)?:\s*([^\n]+)/i);

cNomeSocial.value =
extract(/Nome social:\s*([^\n]+)/i);

cCPF.value =
extract(/CPF(?: do titular)?:\s*([^\n]+)/i);

cNascimento.value =
extract(/Data de nascimento:\s*([^\n]+)/i);

cEndereco.value =
extract(/Endereço:\s*([^\n]+)/i);

cCidade.value =
extract(/Cidade:\s*([^\n]+)/i);

cUF.value =
extract(/UF:\s*([^\n]+)/i);

cEmpresa.value =
extract(/Empresa:\s*([^\n]+)/i);

cAdeEmp.value =
extract(/Ade emp:\s*([^\n]+)/i);

cRedePlano.value =
extract(/Rede\/plano:\s*([^\n]+)/i);

cPlanoAtual.value =
extract(/Plano atual:\s*([^\n]+)/i);

cAcomodacao.value =
extract(/Acomodação:\s*([^\n]+)/i);

cSituacao.value =
extract(/Situação:\s*([^\n]+)/i);

cAdesao.value =
extract(/Data da adesão:\s*([^\n]+)/i);

cCancelamento.value =
extract(/Data do cancelamento:\s*([^\n]+)/i);

cTempo.value =
extract(/Tempo:\s*([^\n]+)/i);

cTelefones.value =
extract(/Telefones cadastrados:\s*([^\n]+)/i);

cEmails.value =
extract(/Endereços eletrônicos:\s*([^\n]+)/i);

document
.getElementById('smartPasteBox')
.value = '';

alert(
'Ficha preenchida automaticamente!'
);

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
