<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Recuperação Premium</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

:root{
    --bg:#f3f6fb;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --primary:#2563eb;
    --primary2:#1d4ed8;
    --border:#dbe3ef;
    --success:#16a34a;
}

body.dark-mode{
    --bg:#0f172a;
    --card:#111827;
    --text:#f8fafc;
    --muted:#94a3b8;
    --primary:#3b82f6;
    --primary2:#2563eb;
    --border:#1e293b;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI;
    transition:.3s;
}

.navbar-custom{
    background:linear-gradient(90deg,#0f172a,#1e293b);
    padding:14px;
}

.card-custom{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.form-control,
.form-select{
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:14px;
    min-height:48px;
}

.form-control:focus,
.form-select:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 .2rem rgba(37,99,235,.2);
}

.form-label{
    font-weight:700;
    margin-bottom:6px;
}

.section-title{
    font-size:18px;
    font-weight:800;
    margin-top:35px;
    margin-bottom:20px;
    border-left:5px solid var(--primary);
    padding-left:14px;
}

.table{
    color:var(--text);
}

.dark-mode .table{
    color:#fff;
}

.dark-mode .table-light{
    background:#172033;
}

.dark-mode td,
.dark-mode th{
    border-color:#1e293b;
}

.nav-tabs .nav-link{
    border:none;
    color:var(--muted);
    font-weight:700;
}

.nav-tabs .nav-link.active{
    background:none;
    color:var(--primary);
    border-bottom:3px solid var(--primary);
}

.btn{
    border-radius:14px;
    font-weight:700;
}

.dash-card{
    border-radius:24px;
    color:white;
    padding:24px;
    position:relative;
    overflow:hidden;
}

.dash-card i{
    position:absolute;
    right:20px;
    top:20px;
    font-size:60px;
    opacity:.15;
}

.login-box{
    width:100%;
    max-width:420px;
    background:#111827;
    border-radius:24px;
    padding:35px;
    border:1px solid #1f2937;
}

#loginOverlay{
    position:fixed;
    inset:0;
    background:#020617;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
}

.text-muted{
    color:var(--muted)!important;
}

.smart-box{
    background:linear-gradient(135deg,#ffffff,#edf4ff);
    border:2px dashed #93c5fd;
    border-radius:22px;
    padding:20px;
}

.dark-mode .smart-box{
    background:#172033;
    border-color:#2563eb;
}

textarea{
    resize:none;
}

.img-preview{
    width:100%;
    max-height:250px;
    object-fit:contain;
    border-radius:18px;
    margin-top:10px;
    border:1px solid var(--border);
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginOverlay">

<div class="login-box">

<h3 class="text-center text-white fw-bold mb-4">
<i class="bi bi-shield-lock-fill me-2"></i>
CRM Login
</h3>

<div class="mb-3">
<label class="form-label text-light">
E-mail
</label>

<input type="email" id="emailInput" class="form-control">
</div>

<div class="mb-2">

<label class="form-label text-light">
Senha
</label>

<div class="input-group">

<input type="password" id="passwordInput" class="form-control">

<button class="btn btn-outline-secondary" id="togglePasswordBtn">

<i class="bi bi-eye-fill" id="eyeIcon"></i>

</button>

</div>

</div>

<div class="text-end mb-4">

<a href="#" onclick="recoverPassword(); return false;" style="color:#60a5fa;font-weight:700;text-decoration:none;">
Esqueci minha senha
</a>

</div>

<button class="btn btn-primary w-100 mb-3" onclick="login()">
Entrar
</button>

<button class="btn btn-light w-100 mb-3" onclick="googleLogin()">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="20" class="me-2">
Entrar com Google
</button>

<button class="btn btn-outline-light w-100" onclick="register()">
Criar Conta
</button>

<div id="loginError" class="text-center mt-4 fw-bold"></div>

</div>

</div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-custom mb-4">

<div class="container-fluid">

<span class="navbar-brand text-white fw-bold">

<i class="bi bi-shield-check me-2"></i>

CRM Recuperação

</span>

<div class="d-flex gap-2">

<button class="btn btn-outline-light btn-sm" onclick="toggleTheme()">

<i class="bi bi-moon-stars-fill"></i>

</button>

<button class="btn btn-danger btn-sm" onclick="logout()">

<i class="bi bi-box-arrow-right"></i>

</button>

</div>

</div>

</nav>

<!-- CONTAINER -->

<div class="container-fluid px-4 pb-5">

<ul class="nav nav-tabs mb-4">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboard">
Dashboard
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientes">
Cadastrar Cliente
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisa">
Pesquisar / Editar
</button>
</li>

</ul>

<div class="tab-content">

<!-- DASHBOARD -->

<div class="tab-pane fade show active" id="dashboard">

<div class="row g-4 mb-4">

<div class="col-md-3">
<div class="dash-card bg-primary">
<h6>Total Clientes</h6>
<h1 id="dashTotal">0</h1>
<i class="bi bi-people-fill"></i>
</div>
</div>

<div class="col-md-3">
<div class="dash-card bg-success">
<h6>Fechados</h6>
<h1 id="dashFechados">0</h1>
<i class="bi bi-check-circle-fill"></i>
</div>
</div>

<div class="col-md-3">
<div class="dash-card bg-warning">
<h6>Negociação</h6>
<h1 id="dashNegociacao">0</h1>
<i class="bi bi-chat-dots-fill"></i>
</div>
</div>

<div class="col-md-3">
<div class="dash-card bg-danger">
<h6>Sem Interesse</h6>
<h1 id="dashSemInteresse">0</h1>
<i class="bi bi-x-circle-fill"></i>
</div>
</div>

</div>

</div>

<!-- CADASTRO -->

<div class="tab-pane fade" id="clientes">

<div class="card-custom p-4">

<div class="smart-box mb-4">

<h4 class="fw-bold mb-3">

⚡ Preenchimento Mágico (Copie e Cole do PDF)

</h4>

<div class="input-group">

<textarea id="smartPasteBox" class="form-control" rows="3" placeholder="Cole aqui o texto do PDF do cliente..."></textarea>

<button class="btn btn-primary px-4" onclick="autoFillForm()">

Auto-preencher

</button>

</div>

</div>

<form id="clientForm">

<input type="hidden" id="clientId">

<div class="section-title">
Dados do Cliente
</div>

<div class="row g-3">

<div class="col-md-4">
<label class="form-label">Nome do usuário</label>
<input type="text" id="cNome" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Nome social</label>
<input type="text" id="cNomeSocial" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">CPF do titular</label>
<input type="text" id="cCPF" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Data de nascimento</label>
<input type="text" id="cNascimento" class="form-control">
</div>

<div class="col-md-5">
<label class="form-label">Endereço</label>
<input type="text" id="cEndereco" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Cidade</label>
<input type="text" id="cCidade" class="form-control">
</div>

<div class="col-md-1">
<label class="form-label">UF</label>
<input type="text" id="cUF" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Empresa</label>
<input type="text" id="cEmpresa" class="form-control">
</div>

<div class="col-md-2">
<label class="form-label">Ade emp</label>
<input type="text" id="cAdeEmp" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Rede/plano</label>
<input type="text" id="cRedePlano" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Plano atual</label>
<input type="text" id="cPlanoAtual" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Acomodação</label>
<input type="text" id="cAcomodacao" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Situação</label>
<input type="text" id="cSituacao" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Data da adesão</label>
<input type="text" id="cAdesao" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Data do cancelamento</label>
<input type="text" id="cCancelamento" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Tempo</label>
<input type="text" id="cTempo" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Telefones cadastrados</label>
<input type="text" id="cTelefones" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Endereços eletrônicos</label>
<input type="text" id="cEmails" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Status</label>

<select id="cStatus" class="form-select">

<option>Em negociação</option>
<option>Entrou em contato</option>
<option>Fechou o plano</option>
<option>Não tem interesse</option>

</select>

</div>

<div class="col-md-4">
<label class="form-label">Agenda de retorno</label>
<input type="date" id="cRetorno" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Foto</label>
<input type="file" class="form-control" onchange="previewImage(event)">
<img id="fotoPreview" class="img-preview d-none">
<input type="hidden" id="cFotoBase64">
</div>

</div>

<div class="text-end mt-5">

<button type="button" class="btn btn-success px-5 py-3" onclick="saveClient()">

<i class="bi bi-save-fill me-2"></i>

Salvar Cliente

</button>

</div>

</form>

</div>

</div>

<!-- PESQUISA -->

<div class="tab-pane fade" id="pesquisa">

<div class="card-custom p-4 mb-4">

<div class="row g-3">

<div class="col-md-8">

<input type="text" id="searchInput" class="form-control" placeholder="Pesquisar cliente..." onkeyup="renderTable()">

</div>

<div class="col-md-4">

<button class="btn btn-success w-100" onclick="exportExcel()">

<i class="bi bi-file-earmark-excel-fill me-2"></i>

Exportar Excel

</button>

</div>

</div>

</div>

<div class="card-custom p-0 overflow-auto">

<table class="table align-middle table-hover mb-0">

<thead class="table-light">

<tr>

<th>Cliente</th>
<th>Empresa</th>
<th>Status</th>
<th>Retorno</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="clientTableBody"></tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const firebaseConfig = {

apiKey: "SUA_API_KEY",
authDomain: "SEU_AUTH_DOMAIN",
projectId: "SEU_PROJECT_ID",
storageBucket: "SEU_STORAGE_BUCKET",
messagingSenderId: "SEU_SENDER_ID",
appId: "SEU_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let clients = [];

document.getElementById('togglePasswordBtn').addEventListener('click',()=>{

const input = document.getElementById('passwordInput');
const icon = document.getElementById('eyeIcon');

if(input.type === 'password'){
input.type='text';
icon.classList.replace('bi-eye-fill','bi-eye-slash-fill');
}else{
input.type='password';
icon.classList.replace('bi-eye-slash-fill','bi-eye-fill');
}

});

function login(){

auth.signInWithEmailAndPassword(

emailInput.value,
passwordInput.value

).catch(err=>{

loginError.innerHTML='Erro ao entrar';

});

}

function register(){

auth.createUserWithEmailAndPassword(

emailInput.value,
passwordInput.value

).catch(err=>{

loginError.innerHTML=err.message;

});

}

function googleLogin(){

const provider = new firebase.auth.GoogleAuthProvider();

auth.signInWithPopup(provider).catch(err=>{

loginError.innerHTML='Erro login Google';

});

}

function recoverPassword(){

if(!emailInput.value){

loginError.innerHTML='Digite o e-mail';
return;

}

auth.sendPasswordResetEmail(emailInput.value)

.then(()=>{

alert('E-mail enviado');

})

.catch(()=>{

loginError.innerHTML='Erro redefinição';

});

}

function logout(){

auth.signOut();

}

auth.onAuthStateChanged(user=>{

if(user){

loginOverlay.style.display='none';

loadClients();

}else{

loginOverlay.style.display='flex';

}

});

function toggleTheme(){

document.body.classList.toggle('dark-mode');

localStorage.setItem(

'theme',
document.body.classList.contains('dark-mode')

);

}

if(localStorage.getItem('theme')==='true'){

document.body.classList.add('dark-mode');

}

function previewImage(event){

const file = event.target.files[0];

const reader = new FileReader();

reader.onload = function(e){

fotoPreview.src = e.target.result;

fotoPreview.classList.remove('d-none');

cFotoBase64.value = e.target.result;

}

reader.readAsDataURL(file);

}

function saveClient(){

const id = clientId.value || db.collection('clients').doc().id;

const client = {

nome:cNome.value,
nomeSocial:cNomeSocial.value,
cpf:cCPF.value,
nascimento:cNascimento.value,
endereco:cEndereco.value,
cidade:cCidade.value,
uf:cUF.value,
empresa:cEmpresa.value,
adeEmp:cAdeEmp.value,
redePlano:cRedePlano.value,
planoAtual:cPlanoAtual.value,
acomodacao:cAcomodacao.value,
situacao:cSituacao.value,
adesao:cAdesao.value,
cancelamento:cCancelamento.value,
tempo:cTempo.value,
telefones:cTelefones.value,
emails:cEmails.value,
status:cStatus.value,
retorno:cRetorno.value,
foto:cFotoBase64.value,
userId:auth.currentUser.uid

};

db.collection('clients').doc(id).set(client)

.then(()=>{

alert('Cliente salvo');

clientForm.reset();

fotoPreview.classList.add('d-none');

});

}

function loadClients(){

db.collection('clients')

.where('userId','==',auth.currentUser.uid)

.onSnapshot(snapshot=>{

clients=[];

snapshot.forEach(doc=>{

clients.push({

id:doc.id,
...doc.data()

});

});

renderTable();
updateDashboard();

});

}

function renderTable(){

const search = searchInput.value.toLowerCase();

clientTableBody.innerHTML='';

clients.filter(c=>{

return JSON.stringify(c).toLowerCase().includes(search);

})

.forEach(c=>{

clientTableBody.innerHTML += `

<tr>

<td>

<strong>${c.nome||''}</strong>

<br>

<small>${c.cpf||''}</small>

</td>

<td>

${c.empresa||''}

</td>

<td>

<span class="badge bg-primary">

${c.status||''}

</span>

</td>

<td>

${c.retorno||'-'}

</td>

<td>

<div class="d-flex gap-2">

<button class="btn btn-warning btn-sm" onclick="editClient('${c.id}')">

<i class="bi bi-pencil-fill"></i>

</button>

<button class="btn btn-success btn-sm" onclick="openWhatsapp('${c.telefones||''}')">

<i class="bi bi-whatsapp"></i>

</button>

<button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')">

<i class="bi bi-trash-fill"></i>

</button>

</div>

</td>

</tr>

`;

});

}

function editClient(id){

const c = clients.find(x=>x.id===id);

clientId.value=id;
cNome.value=c.nome||'';
cNomeSocial.value=c.nomeSocial||'';
cCPF.value=c.cpf||'';
cNascimento.value=c.nascimento||'';
cEndereco.value=c.endereco||'';
cCidade.value=c.cidade||'';
cUF.value=c.uf||'';
cEmpresa.value=c.empresa||'';
cAdeEmp.value=c.adeEmp||'';
cRedePlano.value=c.redePlano||'';
cPlanoAtual.value=c.planoAtual||'';
cAcomodacao.value=c.acomodacao||'';
cSituacao.value=c.situacao||'';
cAdesao.value=c.adesao||'';
cCancelamento.value=c.cancelamento||'';
cTempo.value=c.tempo||'';
cTelefones.value=c.telefones||'';
cEmails.value=c.emails||'';
cStatus.value=c.status||'';
cRetorno.value=c.retorno||'';

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function deleteClient(id){

if(confirm('Excluir cliente?')){

db.collection('clients').doc(id).delete();

}

}

function openWhatsapp(numero){

numero = numero.replace(/\D/g,'');

window.open(

`https://wa.me/55${numero}`,

'_blank'

);

}

function updateDashboard(){

dashTotal.innerHTML = clients.length;

dashFechados.innerHTML = clients.filter(c=>c.status==='Fechou o plano').length;

dashNegociacao.innerHTML = clients.filter(c=>c.status==='Em negociação').length;

dashSemInteresse.innerHTML = clients.filter(c=>c.status==='Não tem interesse').length;

}

function exportExcel(){

let csv = 'Nome,Empresa,Telefone,Status\n';

clients.forEach(c=>{

csv += `"${c.nome}","${c.empresa}","${c.telefones}","${c.status}"\n`;

});

const blob = new Blob([csv], {type:'text/csv'});

const a = document.createElement('a');

a.href = URL.createObjectURL(blob);

a.download = 'clientes.csv';

a.click();

}

function autoFillForm(){

const text = smartPasteBox.value;

function extract(regex){

const match = text.match(regex);

return match ? match[1].trim() : '';

}

cNome.value = extract(/Nome(?: do usuário)?:\s*([^\n]+)/i);

cNomeSocial.value = extract(/Nome social:\s*([^\n]+)/i);

cCPF.value = extract(/CPF(?: do titular)?:\s*([^\n]+)/i);

cNascimento.value = extract(/Data de nascimento:\s*([^\n]+)/i);

cEndereco.value = extract(/Endereço:\s*([^\n]+)/i);

cCidade.value = extract(/Cidade:\s*([^\n]+)/i);

cUF.value = extract(/UF:\s*([^\n]+)/i);

cEmpresa.value = extract(/Empresa:\s*([^\n]+)/i);

cAdeEmp.value = extract(/Ade emp:\s*([^\n]+)/i);

cRedePlano.value = extract(/Rede\/plano:\s*([^\n]+)/i);

cPlanoAtual.value = extract(/Plano atual:\s*([^\n]+)/i);

cAcomodacao.value = extract(/Acomodação:\s*([^\n]+)/i);

cSituacao.value = extract(/Situação:\s*([^\n]+)/i);

cAdesao.value = extract(/Data da adesão:\s*([^\n]+)/i);

cCancelamento.value = extract(/Data do cancelamento:\s*([^\n]+)/i);

cTempo.value = extract(/Tempo:\s*([^\n]+)/i);

cTelefones.value = extract(/Telefones cadastrados:\s*([^\n]+)/i);

cEmails.value = extract(/Endereços eletrônicos:\s*([^\n]+)/i);

smartPasteBox.value='';

}

</script>

</body>
</html>
