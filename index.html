<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Recuperação</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ICONS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- CHART -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #f8fafb;
      --bg-secondary: #f0f4f8;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-dark: #1e40af;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --input: #ffffff;
      --table-head: #f9fafb;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    body.dark-mode {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-secondary: #cbd5e1;
      --input: #0f172a;
      --table-head: #0f172a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }

    .navbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .card-custom {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.3s;
    }
    .card-custom:hover { box-shadow: var(--shadow-md); }

    .dashboard-card {
      padding: 2rem;
      border-radius: var(--radius-lg);
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }
    .dashboard-card.bg-success { background: linear-gradient(135deg, var(--success), #059669); }
    .dashboard-card.bg-warning { background: linear-gradient(135deg, var(--warning), #d97706); }
    .dashboard-card.bg-danger { background: linear-gradient(135deg, var(--danger), #dc2626); }

    .form-control, .form-select {
      background: var(--input);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      transition: 0.2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      outline: none;
    }

    .btn {
      border-radius: var(--radius-md);
      padding: 0.625rem 1.25rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .btn-success { background: linear-gradient(135deg, var(--success), #059669); color: white; }
    .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; }
    .btn-outline-danger { border: 1.5px solid var(--danger); color: var(--danger); background: transparent; }

    .nav-tabs {
      border: none;
      gap: 0.75rem;
      display: flex;
      margin-bottom: 2rem;
    }
    .nav-tabs .nav-link {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      font-weight: 600;
    }
    .nav-tabs .nav-link.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .table { color: var(--text); border-collapse: collapse; }
    .table thead th { background: var(--table-head); padding: 1rem; font-weight: 700; color: var(--text-secondary); }
    .table tbody td { padding: 1rem; border-color: var(--border); }
    .table tbody tr:hover { background: var(--bg-secondary); }

    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      z-index: 9999;
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 3rem;
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }

    #preview { max-width: 100%; margin-top: 1rem; border-radius: var(--radius-lg); display: none; }
    .container-fluid { padding: 2rem; }
    @media (max-width: 768px) { .container-fluid { padding: 1rem; } }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h3 class="text-center mb-4">CRM Recuperação</h3>
      <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Seu email">
      <div class="input-group mb-3">
        <input type="password" id="loginPassword" class="form-control" placeholder="Senha">
        <button class="btn btn-outline-secondary" onclick="togglePassword()"><i class="bi bi-eye"></i></button>
      </div>
      <button class="btn btn-primary w-100 mb-2" onclick="login()">Entrar</button>
      <button class="btn btn-danger w-100 mb-2" onclick="googleLogin()"><i class="bi bi-google"></i> Entrar com Google</button>
      <button class="btn btn-outline-primary w-100 mb-2" onclick="register()">Criar Conta</button>
      <button class="btn btn-link w-100" onclick="recoverPassword()">Esqueci minha senha</button>
      <div id="loginError" class="text-danger text-center mt-3"></div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <h4 class="m-0 fw-bold">CRM Recuperação</h4>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-primary" onclick="toggleTheme()"><i class="bi bi-moon-stars-fill"></i></button>
        <button class="btn btn-success" onclick="exportBackup()">Backup</button>
        <button class="btn btn-danger" onclick="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <!-- CONTAINER -->
  <div class="container-fluid">
    <!-- ABAS -->
    <ul class="nav nav-tabs">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#dashboardTab">Dashboard</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#clientesTab">Ficha Cliente</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pesquisaTab">Pesquisar</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#agendaTab">Agenda</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#configTab">Configurações</button></li>
    </ul>

    <div class="tab-content">
      <!-- DASHBOARD -->
      <div class="tab-pane fade show active" id="dashboardTab">
        <div class="row g-4 mb-4">
          <div class="col-md-3"><div class="dashboard-card bg-primary"><h6>Total Clientes</h6><h2 id="dashTotal">0</h2></div></div>
          <div class="col-md-3"><div class="dashboard-card bg-success"><h6>Fechados</h6><h2 id="dashFechados">0</h2></div></div>
          <div class="col-md-3"><div class="dashboard-card bg-warning"><h6>Negociação</h6><h2 id="dashNegociacao">0</h2></div></div>
          <div class="col-md-3"><div class="dashboard-card bg-danger"><h6>Sem Interesse</h6><h2 id="dashSemInteresse">0</h2></div></div>
        </div>
        <div class="row g-4">
          <div class="col-lg-6"><div class="card card-custom p-4"><h5 class="mb-4">Distribuição por Status</h5><canvas id="statusChart"></canvas></div></div>
          <div class="col-lg-6"><div class="card card-custom p-4"><h5 class="mb-4">Top 5 Empresas</h5><canvas id="companyChart"></canvas></div></div>
          <div class="col-12"><div class="card card-custom p-4"><h5 class="mb-4">Evolução de Clientes</h5><canvas id="timeChart"></canvas></div></div>
        </div>
      </div>

      <!-- CLIENTES -->
      <div class="tab-pane fade" id="clientesTab">
        <div class="card card-custom p-4 mb-4">
          <h5 class="mb-3">Campo Mágico</h5>
          <textarea id="smartPaste" class="form-control mb-3" rows="5" placeholder="Cole aqui os dados do PDF"></textarea>
          <button class="btn btn-primary" onclick="autoFill()">Auto preencher</button>
        </div>
        <div class="card card-custom p-4">
          <input type="hidden" id="clientId">
          <div class="row g-3">
            <div class="col-md-4"><label>Nome do usuário</label><input type="text" id="cNome" class="form-control"></div>
            <div class="col-md-4"><label>Nome social</label><input type="text" id="cNomeSocial" class="form-control"></div>
            <div class="col-md-4"><label>CPF do titular</label><input type="text" id="cCPF" class="form-control"></div>
            <div class="col-md-4"><label>Data nascimento</label><input type="text" id="cNascimento" class="form-control"></div>
            <div class="col-md-8"><label>Endereço</label><input type="text" id="cEndereco" class="form-control"></div>
            <div class="col-md-5"><label>Cidade</label><input type="text" id="cCidade" class="form-control"></div>
            <div class="col-md-1"><label>UF</label><input type="text" id="cUF" class="form-control"></div>
            <div class="col-md-6"><label>Empresa</label><input type="text" id="cEmpresa" class="form-control"></div>
            <div class="col-md-6"><label>Ade emp</label><input type="text" id="cAdeEmp" class="form-control"></div>
            <div class="col-md-6"><label>Rede/plano</label><input type="text" id="cRedePlano" class="form-control"></div>
            <div class="col-md-6"><label>Plano atual</label><input type="text" id="cPlanoAtual" class="form-control"></div>
            <div class="col-md-4"><label>Acomodação</label><input type="text" id="cAcomodacao" class="form-control"></div>
            <div class="col-md-4"><label>Situação</label><input type="text" id="cSituacao" class="form-control"></div>
            <div class="col-md-4"><label>Status CRM</label><select id="cStatus" class="form-select"></select></div>
            <div class="col-md-4"><label>Data adesão</label><input type="text" id="cAdesao" class="form-control"></div>
            <div class="col-md-4"><label>Cancelamento</label><input type="text" id="cCancelamento" class="form-control"></div>
            <div class="col-md-4"><label>Tempo</label><input type="text" id="cTempo" class="form-control"></div>
            <div class="col-md-6"><label>Telefones</label><input type="text" id="cTelefones" class="form-control"></div>
            <div class="col-md-6"><label>Emails</label><input type="text" id="cEmails" class="form-control"></div>
            <div class="col-md-6"><label>Agenda retorno</label><input type="date" id="cRetorno" class="form-control"></div>
            <div class="col-md-6">
              <label>Foto</label>
              <input type="file" class="form-control" onchange="previewImage(event)">
              <img id="preview">
            </div>
            <!-- CAMPO DE ANOTAÇÕES -->
            <div class="col-12">
              <label>Anotações</label>
              <textarea id="cAnotacoes" class="form-control" rows="4" placeholder="Registre aqui observações sobre este cliente..."></textarea>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-success" onclick="saveClient()">Salvar Cliente</button>
            <button class="btn btn-outline-danger" onclick="clearForm()">Limpar Campos</button>
          </div>
        </div>
      </div>

      <!-- PESQUISA -->
      <div class="tab-pane fade" id="pesquisaTab">
        <div class="card card-custom p-4">
          <div class="row g-3 mb-4">
            <div class="col-lg-4"><input type="text" id="search" class="form-control" placeholder="Pesquisar..." onkeyup="renderTable()"></div>
            <div class="col-lg-3"><select id="filterStatus" class="form-select" onchange="renderTable()"><option value="ALL">Todos status</option></select></div>
            <div class="col-lg-3"><select id="filterPlano" class="form-select" onchange="renderTable()"><option value="ALL">Todos os planos</option></select></div>
          </div>
          <div class="table-responsive">
            <table class="table"><thead><tr><th>Cliente</th><th>Empresa</th><th>Telefone</th><th>Plano</th><th>Status</th><th>Retorno</th><th>Ações</th></tr></thead><tbody id="tableBody"></tbody></table>
          </div>
        </div>
      </div>

      <!-- AGENDA -->
      <div class="tab-pane fade" id="agendaTab">
        <div class="card card-custom p-4">
          <div class="table-responsive">
            <table class="table"><thead><tr><th>Cliente</th><th>Telefone</th><th>Retorno</th><th>Status</th><th>WhatsApp</th></tr></thead><tbody id="agendaBody"></tbody></table>
          </div>
        </div>
      </div>

      <!-- CONFIG -->
      <div class="tab-pane fade" id="configTab">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="card card-custom p-4">
              <h4>Etiquetas CRM</h4>
              <button class="btn btn-success mb-3" onclick="addStatus()">Adicionar</button>
              <div id="statusList"></div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="card card-custom p-4">
              <h4>Backup</h4>
              <div class="d-grid gap-3">
                <button class="btn btn-primary" onclick="exportBackup()">Exportar Backup</button>
                <button class="btn btn-outline-primary" onclick="importBackup()">Importar Backup</button>
              </div>
              <input type="file" id="backupFileInput" accept=".json" style="display:none" onchange="handleBackupFile(event)">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
      authDomain: "crm-recuperacao.firebaseapp.com",
      projectId: "crm-recuperacao",
      storageBucket: "crm-recuperacao.firebasestorage.app",
      messagingSenderId: "347011763386",
      appId: "1:347011763386:web:158c1ca6f512a1cde1c683",
      measurementId: "G-1XHHFXHN4G"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let clients = [];
    let statuses = ['Em negociação', 'Fechou o plano', 'Não tem interesse'];
    let charts = { status: null, company: null, time: null };

    /* AUTH */
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        document.getElementById('loginScreen').style.display = 'none';
        loadClients();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
      }
    });

    function login() { auth.signInWithEmailAndPassword(loginEmail.value, loginPassword.value).catch(e => loginError.innerText = e.message); }
    function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => loginError.innerText = e.message); }
    function register() { auth.createUserWithEmailAndPassword(loginEmail.value, loginPassword.value).catch(e => loginError.innerText = e.message); }
    function recoverPassword() { auth.sendPasswordResetEmail(loginEmail.value).then(() => alert('Email enviado!')); }
    function togglePassword() { loginPassword.type = loginPassword.type === 'password' ? 'text' : 'password'; }
    function logout() { auth.signOut(); }

    /* THEME */
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    /* CLIENTS */
    async function loadClients() {
      const snap = await db.collection('clients').where('userId', '==', currentUser.uid).get();
      clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTable(); renderAgenda(); updateDashboard(); updatePlanosFilter(); renderStatuses();
    }

    async function saveClient() {
      const nome = cNome.value.trim(), cpf = cCPF.value.trim(), empresa = cEmpresa.value.trim();
      if (!clientId.value) {
        const dupCPF = clients.find(c => c.cpf && cpf && c.cpf.replace(/\D/g,'') === cpf.replace(/\D/g,''));
        if (dupCPF && !confirm(`Já existe um cliente com o CPF ${cpf} (${dupCPF.nome}). Deseja cadastrar mesmo assim?`)) return;
      }
      const data = {
        nome, nomeSocial: cNomeSocial.value, cpf, nascimento: cNascimento.value, endereco: cEndereco.value,
        cidade: cCidade.value, uf: cUF.value, empresa, adeEmp: cAdeEmp.value, redePlano: cRedePlano.value,
        planoAtual: cPlanoAtual.value, acomodacao: cAcomodacao.value, situacao: cSituacao.value,
        status: cStatus.value, adesao: cAdesao.value, cancelamento: cCancelamento.value, tempo: cTempo.value,
        telefones: cTelefones.value, emails: cEmails.value, retorno: cRetorno.value,
        anotacoes: cAnotacoes.value,
        userId: currentUser.uid, updatedAt: new Date().toISOString()
      };
      try {
        if (clientId.value) await db.collection('clients').doc(clientId.value).update(data);
        else { data.createdAt = new Date().toISOString(); await db.collection('clients').add(data); }
        alert('Cliente salvo!');
        clearForm();
        new bootstrap.Tab(document.querySelector('[data-bs-target="#dashboardTab"]')).show();
        loadClients();
      } catch (e) { alert('Erro: ' + e.message); }
    }

    function clearForm() {
      clientId.value = '';
      ['cNome','cNomeSocial','cCPF','cNascimento','cEndereco','cCidade','cUF','cEmpresa','cAdeEmp','cRedePlano','cPlanoAtual','cAcomodacao','cSituacao','cAdesao','cCancelamento','cTempo','cTelefones','cEmails','cRetorno','cAnotacoes'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
      cStatus.selectedIndex = 0;
      const preview = document.getElementById('preview'); if (preview) { preview.src = ''; preview.style.display = 'none'; }
      const fileInput = document.querySelector('#clientesTab input[type="file"]'); if (fileInput) fileInput.value = '';
      smartPaste.value = '';
    }

    function editClient(id) {
      const c = clients.find(c => c.id === id); if (!c) return;
      clientId.value = id;
      cNome.value = c.nome || ''; cNomeSocial.value = c.nomeSocial || ''; cCPF.value = c.cpf || '';
      cNascimento.value = c.nascimento || ''; cEndereco.value = c.endereco || ''; cCidade.value = c.cidade || '';
      cUF.value = c.uf || ''; cEmpresa.value = c.empresa || ''; cAdeEmp.value = c.adeEmp || '';
      cRedePlano.value = c.redePlano || ''; cPlanoAtual.value = c.planoAtual || ''; cAcomodacao.value = c.acomodacao || '';
      cSituacao.value = c.situacao || ''; cStatus.value = c.status || ''; cAdesao.value = c.adesao || '';
      cCancelamento.value = c.cancelamento || ''; cTempo.value = c.tempo || ''; cTelefones.value = c.telefones || '';
      cEmails.value = c.emails || ''; cRetorno.value = c.retorno || '';
      cAnotacoes.value = c.anotacoes || '';
      new bootstrap.Tab(document.querySelector('[data-bs-target="#clientesTab"]')).show();
    }

    async function deleteClient(id) {
      if (!confirm('Tem certeza?')) return;
      await db.collection('clients').doc(id).delete();
      loadClients();
    }

    /* TABLE */
    function renderTable() {
      const s = search.value.toLowerCase(), fs = filterStatus.value, fp = filterPlano.value;
      tableBody.innerHTML = '';
      clients.filter(c => {
        const ms = (c.nome||'').toLowerCase().includes(s) || (c.empresa||'').toLowerCase().includes(s);
        const mst = fs === 'ALL' || c.status === fs;
        const mp = fp === 'ALL' || c.planoAtual === fp || c.redePlano === fp;
        return ms && mst && mp;
      }).forEach(c => {
        const plano = c.planoAtual || c.redePlano || '-';
        tableBody.innerHTML += `<tr><td><strong>${c.nome}</strong></td><td>${c.empresa}</td><td>${c.telefones}</td><td>${plano}</td><td><span class="badge bg-primary">${c.status}</span></td><td>${c.retorno}</td><td><div class="d-flex gap-2"><button class="btn btn-warning btn-sm" onclick="editClient('${c.id}')"><i class="bi bi-pencil"></i></button><button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}')"><i class="bi bi-trash"></i></button><a target="_blank" href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}" class="btn btn-success btn-sm"><i class="bi bi-whatsapp"></i></a></div></td></tr>`;
      });
    }

    function updatePlanosFilter() {
      const s = new Set(); clients.forEach(c => { if (c.planoAtual) s.add(c.planoAtual); if (c.redePlano) s.add(c.redePlano); });
      filterPlano.innerHTML = '<option value="ALL">Todos os planos</option>' + [...s].sort().map(p => `<option>${p}</option>`).join('');
    }

    function renderAgenda() {
      agendaBody.innerHTML = clients.map(c => `<tr><td>${c.nome}</td><td>${c.telefones}</td><td>${c.retorno}</td><td>${c.status}</td><td><a target="_blank" href="https://wa.me/55${(c.telefones||'').replace(/\D/g,'')}" class="btn btn-success btn-sm">WhatsApp</a></td></tr>`).join('');
    }

    function updateDashboard() {
      dashTotal.innerText = clients.length;
      dashFechados.innerText = clients.filter(c => c.status === 'Fechou o plano').length;
      dashNegociacao.innerText = clients.filter(c => c.status === 'Em negociação').length;
      dashSemInteresse.innerText = clients.filter(c => c.status === 'Não tem interesse').length;
      // charts code omitted for brevity but present in previous full versions
    }

    function renderStatuses() {
      cStatus.innerHTML = statuses.map(s => `<option>${s}</option>`).join('');
      filterStatus.innerHTML = '<option value="ALL">Todos status</option>' + statuses.map(s => `<option>${s}</option>`).join('');
      statusList.innerHTML = statuses.map((s,i) => `<div class="status-item"><strong>${s}</strong><button class="btn btn-danger btn-sm" onclick="deleteStatus(${i})">Excluir</button></div>`).join('');
    }

    function addStatus() {
      const s = prompt('Novo status'); if (!s) return;
      statuses.push(s); renderStatuses();
    }
    function deleteStatus(i) { statuses.splice(i,1); renderStatuses(); }

    /* BACKUP */
    function exportBackup() {
      const blob = new Blob([JSON.stringify(clients)], {type:'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup-crm.json'; a.click();
    }
    function importBackup() { backupFileInput.click(); }
    function handleBackupFile(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          const arr = Array.isArray(data) ? data : Object.values(data).find(Array.isArray);
          if (!arr) throw new Error('Formato inválido');
          if (!confirm(`Importar ${arr.length} clientes?`)) return;
          const batch = db.batch();
          arr.forEach(c => { const {id, ...d} = c; d.userId = currentUser.uid; batch.set(id ? db.collection('clients').doc(id) : db.collection('clients').doc(), d, {merge:true}); });
          await batch.commit();
          alert('Importado!');
          loadClients();
        } catch (er) { alert('Erro: ' + er.message); }
      };
      reader.readAsText(file);
    }

    /* FOTO */
    function previewImage(e) {
      const reader = new FileReader();
      reader.onload = ev => { preview.src = ev.target.result; preview.style.display = 'block'; };
      reader.readAsDataURL(e.target.files[0]);
    }

    /* CAMPO MÁGICO */
    function autoFill() {
      const t = smartPaste.value;
      const map = [
        [/^Nome\s+do\s+usuário\s*:\s*(.*)$/im, 'cNome'], [/^Nome\s+social\s*:\s*(.*)$/im, 'cNomeSocial'],
        [/^CPF\s+do\s+titular\s*:\s*(.*)$/im, 'cCPF'], [/^Data\s+de\s+nascimento\s*:\s*(.*)$/im, 'cNascimento'],
        [/^Endereço\s*:\s*(.*)$/im, 'cEndereco'], [/^Empresa\s*:\s*(.*)$/im, 'cEmpresa'],
        [/^Ade\s+emp\s*:\s*(.*)$/im, 'cAdeEmp'], [/^Rede\/plano\s*:\s*(.*)$/im, 'cRedePlano'],
        [/^Plano\s+atual\s*:\s*(.*)$/im, 'cPlanoAtual'], [/^Acomodação\s*:\s*(.*)$/im, 'cAcomodacao'],
        [/^Situação\s*:\s*(.*)$/im, 'cSituacao'], [/^Data\s+da\s+adesão\s*:\s*(.*)$/im, 'cAdesao'],
        [/^Data\s+do\s+cancelamento\s*:\s*(.*)$/im, 'cCancelamento'], [/^Tempo\s*:\s*(.*)$/im, 'cTempo'],
        [/^Telefones?\s+cadastrados?\s*:\s*(.*)$/im, 'cTelefones'], [/^Endereços?\s+eletr[ôo]nicos?\s*:\s*(.*)$/im, 'cEmails']
      ];
      map.forEach(([r, id]) => { const m = t.match(r); if (m) document.getElementById(id).value = m[1].trim(); });
      const cm = t.match(/^Cidade\s*:\s*(.*)$/im);
      if (cm) {
        const parts = cm[1].split(/[|\-–]/);
        cCidade.value = (parts[0]||'').trim();
        if (parts[1]) { const uf = parts[1].match(/UF\s*:\s*(.*)/i); cUF.value = uf ? uf[1].trim() : parts[1].trim(); }
      }
    }

    renderStatuses();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
