<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRM Recuperação | Leonardo Aguiar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

:root{
    --bg:#f4f7fb;
    --card:#ffffff;
    --text:#1f2937;
    --border:#dbe2ea;
    --primary:#0A2463;
    --secondary:#3E92CC;
    --success:#25D366;
    --danger:#dc3545;
    --warning:#ffc107;
    --input:#ffffff;
}

body.dark-mode{
    --bg:#0f1115;
    --card:#1a1d24;
    --text:#f1f5f9;
    --border:#2d3440;
    --input:#232833;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:.3s;
    font-family:Segoe UI;
}

.navbar-custom{
    background:linear-gradient(135deg,#0A2463,#123b97);
}

.card-custom{
    background:var(--card);
    border-radius:20px;
    border:1px solid var(--border);
    box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.form-control,
.form-select{
    background:var(--input);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:12px;
    min-height:48px;
}

.form-control:focus,
.form-select:focus{
    border-color:#3E92CC;
    box-shadow:0 0 0 .2rem rgba(62,146,204,.2);
    background:var(--input);
    color:var(--text);
}

.dark-mode .table{
    color:#fff;
}

.dark-mode .table-light{
    background:#232833 !important;
    color:#fff !important;
}

.dark-mode .table-light th{
    background:#232833 !important;
    color:#fff !important;
}

.dark-mode td{
    border-color:#2d3440 !important;
}

.nav-tabs{
    border:none;
    gap:10px;
}

.nav-tabs .nav-link{
    border:none;
    border-radius:12px;
    color:var(--text);
    font-weight:600;
    padding:12px 20px;
}

.nav-tabs .nav-link.active{
    background:#0A2463;
    color:#fff;
}

.section-title{
    font-weight:700;
    font-size:1rem;
    margin-top:25px;
    margin-bottom:15px;
    color:#3E92CC;
}

.login-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(5px);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.login-box{
    width:100%;
    max-width:420px;
    background:var(--card);
    border-radius:25px;
    padding:35px;
    border:1px solid var(--border);
}

.dashboard-card{
    border-radius:20px;
    color:#fff;
    padding:25px;
    position:relative;
    overflow:hidden;
}

.dashboard-card i{
    position:absolute;
    right:20px;
    bottom:20px;
    font-size:3rem;
    opacity:.2;
}

.btn{
    border-radius:12px;
}

.table td{
    vertical-align:middle;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div class="login-overlay" id="loginOverlay">

<div class="login-box">

<h3 class="fw-bold text-center mb-4">
<i class="bi bi-shield-lock-fill"></i>
 CRM Recuperação
</h3>

<input type="email"
id="emailInput"
class="form-control mb-3"
placeholder="Seu e-mail">

<div class="input-group mb-3">

<input type="password"
id="passwordInput"
class="form-control"
placeholder="Sua senha">

<button class="btn btn-outline-secondary"
id="togglePasswordBtn">

<i class="bi bi-eye-fill"
id="eyeIcon"></i>

</button>

</div>

<button class="btn btn-primary w-100 mb-2"
onclick="login()">

<i class="bi bi-box-arrow-in-right"></i>
 Entrar

</button>

<button class="btn btn-success w-100 mb-2"
onclick="googleLogin()">

<i class="bi bi-google"></i>
 Entrar com Google

</button>

<button class="btn btn-outline-primary w-100 mb-3"
onclick="register()">

Criar conta

</button>

<div class="text-center">

<a href="#"
onclick="recoverPassword()"
class="small text-decoration-none">

Esqueci minha senha

</a>

</div>

<div id="loginError"
class="text-danger text-center mt-3 small fw-bold"></div>

</div>

</div>

<!-- NAVBAR -->

<nav class="navbar navbar-custom navbar-dark mb-4">

<div class="container-fluid">

<span class="navbar-brand fw-bold">
<i class="bi bi-shield-check"></i>
 CRM Recuperação
</span>

<div>

<button class="btn btn-outline-light btn-sm me-2"
onclick="toggleTheme()">

<i class="bi bi-moon-fill"></i>

</button>

<button class="btn btn-danger btn-sm"
onclick="logout()">

<i class="bi bi-box-arrow-right"></i>

</button>

</div>

</div>

</nav>

<!-- CONTEÚDO -->

<div class="container-fluid px-4 pb-5">

<ul class="nav nav-tabs mb-4">

<li class="nav-item">
<button class="nav-link active"
data-bs-toggle="tab"
data-bs-target="#dashboard">

Dashboard
</button>
</li>

<li class="nav-item">
<button class="nav-link"
data-bs-toggle="tab"
data-bs-target="#clientes">

Clientes
</button>
</li>

</ul>

<div class="tab-content">

<!-- DASHBOARD -->

<div class="tab-pane fade show active"
id="dashboard">

<div class="row g-4 mb-4">

<div class="col-md-3">
<div class="dashboard-card"
style="background:#0A2463">

<h6>Total Clientes</h6>
<h1 id="totalClientes">0</h1>

<i class="bi bi-people-fill"></i>

</div>
</div>

<div class="col-md-3">
<div class="dashboard-card"
style="background:#25D366">

<h6>Fechados</h6>
<h1 id="fechados">0</h1>

<i class="bi bi-check-circle-fill"></i>

</div>
</div>

<div class="col-md-3">
<div class="dashboard-card"
style="background:#ffc107">

<h6>Negociação</h6>
<h1 id="negociacao">0</h1>

<i class="bi bi-chat-dots-fill"></i>

</div>
</div>

<div class="col-md-3">
<div class="dashboard-card"
style="background:#dc3545">

<h6>Sem Interesse</h6>
<h1 id="semInteresse">0</h1>

<i class="bi bi-x-circle-fill"></i>

</div>
</div>

</div>

</div>

<!-- CLIENTES -->

<div class="tab-pane fade"
id="clientes">

<div class="card card-custom p-4">

<div class="row g-3">

<div class="col-md-4">
<label>Nome do usuário</label>
<input type="text" id="cNome" class="form-control">
</div>

<div class="col-md-4">
<label>Nome social</label>
<input type="text" id="cNomeSocial" class="form-control">
</div>

<div class="col-md-4">
<label>CPF do titular</label>
<input type="text" id="cCPF" class="form-control">
</div>

<div class="col-md-3">
<label>Data de nascimento</label>
<input type="text" id="cNascimento" class="form-control">
</div>

<div class="col-md-5">
<label>Endereço</label>
<input type="text" id="cEndereco" class="form-control">
</div>

<div class="col-md-3">
<label>Cidade</label>
<input type="text" id="cCidade" class="form-control">
</div>

<div class="col-md-1">
<label>UF</label>
<input type="text" id="cUF" class="form-control">
</div>

<div class="col-md-4">
<label>Empresa</label>
<input type="text" id="cEmpresa" class="form-control">
</div>

<div class="col-md-4">
<label>Ade emp</label>
<input type="text" id="cAdeEmp" class="form-control">
</div>

<div class="col-md-4">
<label>Rede/plano</label>
<input type="text" id="cRedePlano" class="form-control">
</div>

<div class="col-md-4">
<label>Plano atual</label>
<input type="text" id="cPlanoAtual" class="form-control">
</div>

<div class="col-md-4">
<label>Acomodação</label>
<input type="text" id="cAcomodacao" class="form-control">
</div>

<div class="col-md-4">
<label>Situação</label>
<input type="text" id="cSituacao" class="form-control">
</div>

<div class="col-md-4">
<label>Data da adesão</label>
<input type="text" id="cAdesao" class="form-control">
</div>

<div class="col-md-4">
<label>Data do cancelamento</label>
<input type="text" id="cCancelamento" class="form-control">
</div>

<div class="col-md-4">
<label>Tempo</label>
<input type="text" id="cTempo" class="form-control">
</div>

<div class="col-md-6">
<label>Telefones cadastrados</label>
<input type="text" id="cTelefones" class="form-control">
</div>

<div class="col-md-6">
<label>Endereços eletrônicos</label>
<input type="text" id="cEmails" class="form-control">
</div>

<div class="col-md-4">
<label>Status</label>

<select id="cStatus" class="form-select">

<option>Em negociação</option>
<option>Entrou em contato</option>
<option>Fechou o plano</option>
<option>Não tem interesse</option>

</select>

</div>

<div class="col-md-4">
<label>Data retorno</label>
<input type="date" id="cRetorno" class="form-control">
</div>

<div class="col-md-4">

<label>&nbsp;</label>

<button class="btn btn-success w-100"
onclick="saveClient()">

<i class="bi bi-save-fill"></i>
 Salvar Cliente

</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBif04HjzzagJFkaOQGtrsodkMEpEwPBbs",
  authDomain: "crm-recuperacao.firebaseapp.com",
  projectId: "crm-recuperacao",
  storageBucket: "crm-recuperacao.firebasestorage.app",
  messagingSenderId: "347011763386",
  appId: "1:347011763386:web:62073679ac76ef08e1c683",
  measurementId: "G-XXZFJXHEF6"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let clients = [];

function login(){

    const email =
    document.getElementById('emailInput').value;

    const senha =
    document.getElementById('passwordInput').value;

    auth.signInWithEmailAndPassword(email, senha)

    .catch((error)=>{

        document.getElementById('loginError')
        .innerHTML = error.message;

    });

}

function register(){

    const email =
    document.getElementById('emailInput').value;

    const senha =
    document.getElementById('passwordInput').value;

    auth.createUserWithEmailAndPassword(email, senha)

    .then(()=>{

        alert('Conta criada');

    })

    .catch((error)=>{

        document.getElementById('loginError')
        .innerHTML = error.message;

    });

}

function googleLogin(){

    const provider =
    new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)

    .catch((error)=>{

        document.getElementById('loginError')
        .innerHTML = error.message;

    });

}

function recoverPassword(){

    const email =
    document.getElementById('emailInput').value;

    if(!email){

        alert('Digite o e-mail');

        return;
    }

    auth.sendPasswordResetEmail(email)

    .then(()=>{

        alert('E-mail enviado');

    })

    .catch((error)=>{

        alert(error.message);

    });

}

function logout(){

    auth.signOut();

}

auth.onAuthStateChanged((user)=>{

    if(user){

        document.getElementById('loginOverlay')
        .style.display='none';

        loadClients();

    }else{

        document.getElementById('loginOverlay')
        .style.display='flex';

    }

});

document
.getElementById('togglePasswordBtn')
.addEventListener('click',()=>{

    const input =
    document.getElementById('passwordInput');

    const icon =
    document.getElementById('eyeIcon');

    if(input.type==='password'){

        input.type='text';

        icon.classList.remove('bi-eye-fill');
        icon.classList.add('bi-eye-slash-fill');

    }else{

        input.type='password';

        icon.classList.remove('bi-eye-slash-fill');
        icon.classList.add('bi-eye-fill');

    }

});

function toggleTheme(){

    document.body.classList.toggle('dark-mode');

}

function saveClient(){

    const user = auth.currentUser;

    if(!user) return;

    const client = {

        nome:document.getElementById('cNome').value,
        nomeSocial:document.getElementById('cNomeSocial').value,
        cpf:document.getElementById('cCPF').value,
        nascimento:document.getElementById('cNascimento').value,
        endereco:document.getElementById('cEndereco').value,
        cidade:document.getElementById('cCidade').value,
        uf:document.getElementById('cUF').value,
        empresa:document.getElementById('cEmpresa').value,
        adeEmp:document.getElementById('cAdeEmp').value,
        redePlano:document.getElementById('cRedePlano').value,
        planoAtual:document.getElementById('cPlanoAtual').value,
        acomodacao:document.getElementById('cAcomodacao').value,
        situacao:document.getElementById('cSituacao').value,
        adesao:document.getElementById('cAdesao').value,
        cancelamento:document.getElementById('cCancelamento').value,
        tempo:document.getElementById('cTempo').value,
        telefones:document.getElementById('cTelefones').value,
        emails:document.getElementById('cEmails').value,
        status:document.getElementById('cStatus').value,
        retorno:document.getElementById('cRetorno').value,
        uid:user.uid,
        createdAt:new Date()

    };

    db.collection('clients')
    .add(client)

    .then(()=>{

        alert('Cliente salvo');

        document.querySelectorAll('input').forEach(i=>i.value='');

    });

}

function loadClients(){

    const user = auth.currentUser;

    db.collection('clients')

    .where('uid','==',user.uid)

    .onSnapshot((snapshot)=>{

        clients=[];

        snapshot.forEach((doc)=>{

            clients.push(doc.data());

        });

        updateDashboard();

    });

}

function updateDashboard(){

    document.getElementById('totalClientes')
    .innerHTML = clients.length;

    document.getElementById('fechados')
    .innerHTML =
    clients.filter(c=>c.status==='Fechou o plano').length;

    document.getElementById('negociacao')
    .innerHTML =
    clients.filter(c=>c.status==='Em negociação').length;

    document.getElementById('semInteresse')
    .innerHTML =
    clients.filter(c=>c.status==='Não tem interesse').length;

}

</script>

</body>
</html>
